<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velox Metrics Center</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b1120;--bg-card:#111827;--bg-card-hover:#1a2332;
  --border:#1e293b;--text:#e2e8f0;--text-muted:#94a3b8;
  --accent:#f97316;--accent2:#ef4444;--green:#22c55e;--blue:#3b82f6;
  --red:#ef4444;--yellow:#eab308;--purple:#a855f7;
  --radius:8px;--shadow:0 4px 24px rgba(0,0,0,.4);
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--bg-card);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;height:56px;gap:16px;position:sticky;top:0;z-index:100}
header .logo{font-weight:700;font-size:18px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
nav{display:flex;gap:4px}
nav button{padding:8px 16px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;border-radius:var(--radius);font-size:14px;transition:all .15s}
nav button:hover{background:var(--bg-card-hover);color:var(--text)}
nav button.active{background:var(--bg-card-hover);color:var(--accent);font-weight:600}
main{padding:24px;max-width:1280px;margin:0 auto}
.page{display:none}
.page.active{display:block}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:all .15s}
.card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:var(--shadow)}
.card h3{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:8px}
.card .val{font-size:28px;font-weight:700;line-height:1.2}
.card .sub{font-size:12px;color:var(--text-muted);margin-top:4px}
.section{margin-bottom:24px}
.section h2{font-size:16px;margin-bottom:12px;color:var(--text);font-weight:600}
table{width:100%;border-collapse:collapse;background:var(--bg-card);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
th,td{padding:10px 14px;text-align:left;font-size:13px;border-bottom:1px solid var(--border)}
th{background:#0f172a;color:var(--text-muted);font-weight:600;text-transform:uppercase;font-size:11px;letter-spacing:.5px;cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg-card-hover)}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.badge-good{background:rgba(34,197,94,.15);color:var(--green)}
.badge-warn{background:rgba(234,179,8,.15);color:var(--yellow)}
.badge-bad{background:rgba(239,68,68,.15);color:var(--red)}
.badge-info{background:rgba(59,130,246,.15);color:var(--blue)}
input,select{background:var(--bg-card);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:var(--radius);font-size:14px;width:100%;max-width:400px;transition:border-color .15s}
input:focus,select:focus{outline:none;border-color:var(--accent)}
button.btn{background:var(--accent);color:#fff;border:none;padding:10px 20px;border-radius:var(--radius);cursor:pointer;font-size:14px;font-weight:600;transition:all .15s}
button.btn:hover{opacity:.9;transform:translateY(-1px)}
button.btn-sm{padding:6px 14px;font-size:12px}
.loading{text-align:center;padding:40px;color:var(--text-muted)}
.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:var(--radius);padding:16px;color:var(--red);margin:16px 0}
.waterfall{margin:16px 0}
.wf-row{display:flex;align-items:center;gap:12px;padding:6px 0}
.wf-label{width:180px;font-size:12px;color:var(--text-muted);text-align:right;flex-shrink:0}
.wf-bar{height:28px;border-radius:4px;display:flex;align-items:center;padding:0 8px;font-size:11px;font-weight:600;min-width:40px;position:relative;transition:all .2s}
.wf-bar:hover{filter:brightness(1.2)}
.wf-ms{font-size:11px;color:var(--text-muted);white-space:nowrap;margin-left:8px}
.chart-container{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin:16px 0;overflow-x:auto}
svg text{fill:var(--text-muted);font-size:11px}
.job-form{display:flex;gap:8px;margin-bottom:20px;align-items:center}
.job-form input{flex:1}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty-state svg{margin-bottom:16px;opacity:.3}
.trend-table{margin-top:16px}
.regression{color:var(--red)}
.improvement{color:var(--green)}
.neutral{color:var(--text-muted)}
@media(max-width:768px){.cards{grid-template-columns:repeat(2,1fr)}nav button{padding:6px 10px;font-size:12px}}
</style>
</head>
<body>
<header>
  <span class="logo">◈ Velox Metrics Center</span>
  <nav>
    <button onclick="switchTab('overview')" id="tab-overview" class="active">Overview</button>
    <button onclick="switchTab('jobdetail')" id="tab-jobdetail">Job Detail</button>
    <button onclick="switchTab('workers')" id="tab-workers">Workers</button>
    <button onclick="switchTab('trends')" id="tab-trends">Phase Trends</button>
  </nav>
  <span style="flex:1"></span>
  <span style="font-size:12px;color:var(--text-muted)" id="last-update"></span>
</header>
<main>

<!-- ======================== OVERVIEW ======================== -->
<div id="page-overview" class="page active">
  <div class="cards" id="overview-cards"></div>
  <div class="section">
    <h2>Top Slow Phases</h2>
    <table><thead><tr><th>Phase</th><th>Avg MS</th><th>P95 MS</th><th>Samples</th></tr></thead>
    <tbody id="overview-phases"></tbody></table>
  </div>
  <div class="section">
    <h2>Top Slow Workers</h2>
    <table><thead><tr><th>Worker</th><th>Jobs</th><th>Avg MS</th><th>P95 MS</th><th>Error Rate</th></tr></thead>
    <tbody id="overview-workers"></tbody></table>
  </div>
  <div class="section">
    <h2>Top Errors</h2>
    <table><thead><tr><th>Error Code</th><th>Count</th></tr></thead>
    <tbody id="overview-errors"></tbody></table>
  </div>
</div>

<!-- ======================== JOB DETAIL ======================= -->
<div id="page-jobdetail" class="page">
  <div class="job-form">
    <input type="text" id="job-id-input" placeholder="Enter Job ID..." onkeydown="if(event.key==='Enter')loadJobDetail()">
    <button class="btn" onclick="loadJobDetail()">Load</button>
  </div>
  <div id="job-detail-content"></div>
</div>

<!-- ======================== WORKERS ======================= -->
<div id="page-workers" class="page">
  <div class="section">
    <h2>Worker Performance</h2>
    <table><thead><tr>
      <th onclick="sortWorkers('worker_id')">Worker ▾</th>
      <th onclick="sortWorkers('worker_name')">Name</th>
      <th onclick="sortWorkers('status')">Status</th>
      <th onclick="sortWorkers('job_count')">Jobs</th>
      <th onclick="sortWorkers('success_rate')">Success %</th>
      <th onclick="sortWorkers('avg_ms')">Avg MS</th>
      <th onclick="sortWorkers('p95_ms')">P95 MS</th>
    </tr></thead>
    <tbody id="workers-tbody"></tbody></table>
  </div>
</div>

<!-- ======================== PHASE TRENDS ===================== -->
<div id="page-trends" class="page">
  <div class="job-form">
    <select id="phase-select">
      <option value="engine.segment_build">engine.segment_build</option>
      <option value="engine.asset_download">engine.asset_download</option>
      <option value="engine.concat">engine.concat</option>
      <option value="pipeline.compile">pipeline.compile</option>
      <option value="pipeline.render">pipeline.render</option>
      <option value="pipeline.resolve">pipeline.resolve</option>
      <option value="pipeline.validate">pipeline.validate</option>
      <option value="native.total">native.total</option>
    </select>
    <input type="text" id="trend-executor" placeholder="Executor (optional)" style="max-width:250px">
    <button class="btn" onclick="loadPhaseTrends()">Load</button>
  </div>
  <div id="trends-content"></div>
</div>

</main>
<script>
let currentTab='overview',workerData=[],workerSort={col:'avg_ms',asc:true};

function switchTab(tab){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  currentTab=tab;
  if(tab==='overview')loadOverview();
  if(tab==='workers')loadWorkers();
}

async function api(url){const r=await fetch(url);if(!r.ok)throw new Error(r.status+' '+r.statusText);return r.json()}
function fmt(v,d){return typeof v==='number'?v.toFixed(d??0):(v||'—')}
function pct(v){return typeof v==='number'?v.toFixed(1)+'%':'—'}
function ms(v){return v>=1000?(v/1000).toFixed(1)+'s':fmt(v,0)+'ms'}

// ── OVERVIEW ──
async function loadOverview(){
  const c=document.getElementById('overview-cards');
  const p=document.getElementById('overview-phases');
  const w=document.getElementById('overview-workers');
  const e=document.getElementById('overview-errors');
  c.innerHTML='<div class="loading">Loading…</div>';
  try{
    const d=await api('/api/observability/overview');
    c.innerHTML='';
    const cards=[
      ['Jobs Completed 24h',d.jobs_completed_24h,'var(--green)'],
      ['Jobs Failed 24h',d.jobs_failed_24h,'var(--red)'],
      ['Error Rate',pct(d.error_rate),'var(--yellow)'],
      ['P95 Render',ms(d.p95_render_ms),'var(--blue)'],
      ['Active Workers',d.active_workers,'var(--purple)'],
      ['Queue Depth',d.queue_depth,'var(--accent)']];
    cards.forEach(([l,v,cl])=>{const el=document.createElement('div');el.className='card';el.innerHTML='<h3>'+l+'</h3><div class="val" style="color:'+cl+'">'+v+'</div>';c.appendChild(el)});
    p.innerHTML=(d.top_slow_phases||[]).map(x=>'<tr><td>'+x.phase+'</td><td>'+ms(x.avg_ms)+'</td><td>'+ms(x.p95_ms)+'</td><td>'+x.samples+'</td></tr>').join('')||'<tr><td colspan="4" class="empty-state">No data</td></tr>';
    w.innerHTML=(d.top_slow_workers||[]).map(x=>'<tr><td>'+x.worker_id+'</td><td>'+x.job_count+'</td><td>'+ms(x.avg_ms)+'</td><td>'+ms(x.p95_ms)+'</td><td>'+pct(x.error_rate)+'</td></tr>').join('')||'<tr><td colspan="5" class="empty-state">No data</td></tr>';
    e.innerHTML=(d.top_errors||[]).map(x=>'<tr><td><span class="badge badge-bad">'+x.error_code+'</span></td><td>'+x.count+'</td></tr>').join('')||'<tr><td colspan="2" class="empty-state">No errors</td></tr>';
    document.getElementById('last-update').textContent='Updated: '+new Date().toLocaleTimeString();
  }catch(err){c.innerHTML='<div class="error">'+err.message+'</div>'}
}

// ── JOB DETAIL ──
async function loadJobDetail(){
  const jid=document.getElementById('job-id-input').value.trim();
  const el=document.getElementById('job-detail-content');
  if(!jid){el.innerHTML='<div class="error">Enter a Job ID</div>';return}
  el.innerHTML='<div class="loading">Loading…</div>';
  try{
    const d=await api('/api/observability/jobs/'+encodeURIComponent(jid));
    let h='<div class="cards">';
    h+=card('Task',d.task_id);
    h+=card('Status','<span class="badge '+(d.task_status==='SUCCEEDED'?'badge-good':'badge-bad')+'">'+d.task_status+'</span>',true);
    h+=card('Attempts',d.attempt_count);
    h+=card('Wall Time',ms(d.total_wall_time_ms));
    h+=card('CPU Time',ms(d.cpu_time_ms));
    h+=card('Peak RSS',(d.peak_rss_bytes/1048576).toFixed(1)+' MB');
    h+='</div>';

    // Waterfall
    h+='<div class="section"><h2>Phase Waterfall</h2><div class="chart-container"><div class="waterfall">';
    const phases=d.phase_totals||{};
    const maxMs=Math.max(1,...Object.values(phases));
    const colors=['#f97316','#ef4444','#3b82f6','#22c55e','#a855f7','#eab308','#ec4899','#14b8a6'];
    let ci=0;
    for(const [phase,msVal] of Object.entries(phases)){
      const wPct=Math.max(2,(msVal/maxMs)*100);
      h+='<div class="wf-row"><span class="wf-label">'+phase+'</span><div class="wf-bar" style="width:'+wPct+'%;background:'+colors[ci%colors.length]+'">'+ms(msVal)+'</div></div>';
      ci++;
    }
    h+='</div></div></div>';

    // Attempts
    h+='<div class="section"><h2>Attempts ('+d.attempts.length+')</h2><table><thead><tr><th>#</th><th>ID</th><th>Status</th><th>Worker</th><th>Duration</th><th>Breakdown</th></tr></thead><tbody>';
    d.attempts.forEach(a=>{
      const bd=Object.entries(a.phase_breakdown||{}).map(([p,v])=>p+': '+ms(v)).join(', ');
      h+='<tr><td>'+a.attempt_number+'</td><td style="font-family:monospace;font-size:11px">'+a.attempt_id.substring(0,8)+'…</td><td><span class="badge '+(a.status==='SUCCEEDED'?'badge-good':a.status==='FAILED'?'badge-bad':'badge-warn')+'">'+a.status+'</span></td><td>'+a.worker_id+'</td><td>'+ms(a.duration_ms)+'</td><td style="font-size:11px;max-width:300px">'+bd+'</td></tr>';
    });
    h+='</tbody></table></div>';
    el.innerHTML=h;
  }catch(err){el.innerHTML='<div class="error">'+err.message+'</div>'}
}

function card(label,value,html){return '<div class="card"><h3>'+label+'</h3><div class="val">'+(html?value:fmt(value))+'</div></div>'}

// ── WORKERS ──
async function loadWorkers(){
  const el=document.getElementById('workers-tbody');
  el.innerHTML='<tr><td colspan="7" class="loading">Loading…</td></tr>';
  try{
    const d=await api('/api/observability/workers');
    workerData=d||[];
    renderWorkers();
  }catch(err){el.innerHTML='<tr><td colspan="7" class="error">'+err.message+'</td></tr>'}
}

function sortWorkers(col){
  if(workerSort.col===col)workerSort.asc=!workerSort.asc;
  else{workerSort.col=col;workerSort.asc=true}
  workerData.sort((a,b)=>{let va=a[col],vb=b[col];if(typeof va==='string')va=va.toLowerCase(),vb=(vb||'').toLowerCase();const cmp=va<vb?-1:va>vb?1:0;return workerSort.asc?cmp:-cmp});
  renderWorkers();
}

function renderWorkers(){
  const el=document.getElementById('workers-tbody');
  el.innerHTML=workerData.map(w=>'<tr><td style="font-family:monospace;font-size:11px">'+w.worker_id+'</td><td>'+w.worker_name+'</td><td><span class="badge '+(w.status==='online'||w.status==='idle'?'badge-good':w.status==='busy'?'badge-info':'badge-warn')+'">'+w.status+'</span></td><td>'+w.job_count+'</td><td>'+pct(w.success_rate)+'</td><td>'+ms(w.avg_ms)+'</td><td>'+ms(w.p95_ms)+'</td></tr>').join('')||'<tr><td colspan="7" class="empty-state">No workers</td></tr>';
}

// ── PHASE TRENDS ──
async function loadPhaseTrends(){
  const el=document.getElementById('trends-content');
  const phase=document.getElementById('phase-select').value;
  const exec=document.getElementById('trend-executor').value.trim();
  el.innerHTML='<div class="loading">Loading…</div>';
  try{
    const params=new URLSearchParams({phase});
    if(exec)params.set('executor',exec);
    const d=await api('/api/observability/phases/trends?'+params);
    let h='<div class="cards">';
    h+=card('Phase',d.phase);
    h+=card('Samples',d.samples);
    h+=card('Avg',ms(d.avg_ms));
    h+=card('P95',ms(d.p95_ms));
    h+=card('Trend','<span class="badge '+(d.trend==='improving'?'badge-good':'badge-info')+'">'+d.trend+'</span>',true);
    h+='</div>';

    // Bar chart
    if(d.daily_points&&d.daily_points.length>0){
      h+='<div class="section"><h2>Daily Trend</h2><div class="chart-container">';
      h+=renderBarChart(d.daily_points);
      h+='</div></div>';
    }
    el.innerHTML=h;
  }catch(err){el.innerHTML='<div class="error">'+err.message+'</div>'}
}

function renderBarChart(points){
  const w=Math.min(800,points.length*80),h=220,pad={t:20,r:20,b:40,l:60};
  const maxV=Math.max(1,...points.map(p=>Math.max(p.avg_ms,p.p95_ms)));
  let svg='<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'">';
  // Y axis
  for(let i=0;i<=4;i++){
    const y=pad.t+(h-pad.t-pad.b)*(1-i/4);
    svg+='<line x1="'+pad.l+'" y1="'+y+'" x2="'+(w-pad.r)+'" y2="'+y+'" stroke="var(--border)" stroke-width="1"/>';
    svg+='<text x="'+(pad.l-8)+'" y="'+(y+4)+'" text-anchor="end">'+ms(maxV*i/4)+'</text>';
  }
  const bw=Math.min(30,(w-pad.l-pad.r)/points.length/3);
  points.forEach((p,i)=>{
    const x=pad.l+(w-pad.l-pad.r)*(i+0.5)/points.length;
    const ah=(p.avg_ms/maxV)*(h-pad.t-pad.b);
    const ph=(p.p95_ms/maxV)*(h-pad.t-pad.b);
    svg+='<rect x="'+(x-bw-4)+'" y="'+(h-pad.b-ah)+'" width="'+bw+'" height="'+ah+'" fill="var(--blue)" opacity="0.7" rx="2"><title>Avg: '+ms(p.avg_ms)+'</title></rect>';
    svg+='<rect x="'+(x+4)+'" y="'+(h-pad.b-ph)+'" width="'+bw+'" height="'+ph+'" fill="var(--accent)" opacity="0.7" rx="2"><title>P95: '+ms(p.p95_ms)+'</title></rect>';
    svg+='<text x="'+x+'" y="'+(h-8)+'" text-anchor="middle">'+p.date+'</text>';
  });
  // Legend
  svg+='<rect x="'+(w-170)+'" y="8" width="12" height="12" fill="var(--blue)" opacity="0.7" rx="2"/>';
  svg+='<text x="'+(w-154)+'" y="18" font-size="11">Avg</text>';
  svg+='<rect x="'+(w-110)+'" y="8" width="12" height="12" fill="var(--accent)" opacity="0.7" rx="2"/>';
  svg+='<text x="'+(w-94)+'" y="18" font-size="11">P95</text>';
  svg+='</svg>';
  return svg;
}

// ── INIT ──
loadOverview();
</script>
</body>
</html>
