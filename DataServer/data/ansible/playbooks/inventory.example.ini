[workers]
# ─────────────────────────────────────────────────────────────
# Inventory example — copy to inventory.ini and fill in values.
# DO NOT commit inventory.ini (it is in .gitignore).
#
# Each worker points at its reachable public IP/DNS. The master
# terminates the worker's gRPC control stream on port 9000 (TLS);
# the worker authenticates against VELOX_ALLOWED_WORKERS via its
# declared worker_id, not its IP. See deploy/velox-server.env.example.
# ─────────────────────────────────────────────────────────────

host_57_129_132_133 ansible_host=WORKER_PUBLIC_IP ansible_user=pierone
host_149_56_131_97  ansible_host=WORKER_PUBLIC_IP ansible_user=pierone
host_51_222_204_158 ansible_host=WORKER_PUBLIC_IP ansible_user=pierone

[workers:vars]
# Prefer SSH keys over passwords. Set ssh_private_key_file if needed.
