---
# ============================================================
# UPDATE WORKERS — Aggiorna codice worker su computer remoti
# ============================================================
# Fasi esplicite: SSH precheck, sudo precheck, bundle, deploy, verify.
# sudo viene eseguito in modalità non interattiva per restare compatibile
# con sudo classico e sudo-rs e per fallire prima di toccare il release tree.
# ============================================================

- name: Update workers
  hosts: velox_workers
  gather_facts: false
  become: true
  vars:
    velox_dir: "/opt/velox"
    master_url: "{{ master_url | default('http://127.0.0.1:8000') }}"
    ansible_become_method: sudo
    ansible_become_flags: "-n"

  tasks:
    # ── PRECHECK SSH (nessuna escalation) ─────────────────────
    - name: Update | Precheck SSH connection
      ansible.builtin.ping:
      become: false

    # ── PRECHECK SUDO (nessun prompt interattivo) ─────────────
    - name: Update | Precheck passwordless sudo
      ansible.builtin.command:
        argv:
          - sudo
          - -n
          - true
      become: false
      changed_when: false
      failed_when: false
      register: sudo_precheck

    - name: Update | Require non-interactive sudo
      ansible.builtin.assert:
        that:
          - sudo_precheck.rc == 0
        fail_msg: >-
          Non-interactive sudo is unavailable for {{ ansible_user | default('the SSH user') }}.
          Configure passwordless sudo for the deployment account; interactive prompts are
          deliberately unsupported by the worker deploy pipeline.
      become: false

    - name: Update | Verify master_url
      ansible.builtin.assert:
        that:
          - master_url | length > 0
        fail_msg: "master_url non impostato — impossibile scaricare bundle"
      become: false

    - name: Update | Verify local bundle on controller
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../../../../DataServer/data/worker_downloads/worker_code_linux_x86_64.zip"
      delegate_to: localhost
      become: false
      run_once: true
      register: local_bundle_zip

    # ── BUILD BINARIO GO SULLA MACCHINA DI CONTROLLO ─────────
    - name: Update | Build Go worker agent on controller
      ansible.builtin.shell: |
        set -euo pipefail
        AGENT_DIR="{{ playbook_dir }}/../../../../RemoteCodex/native/worker-agent-go"
        BINARY="$AGENT_DIR/bin/velox-worker-agent"

        if [ -f "$BINARY" ]; then
          NEWER=$(find "$AGENT_DIR" -name '*.go' -newer "$BINARY" -print -quit 2>/dev/null)
          if [ -z "$NEWER" ]; then
            echo "SKIP: binary up-to-date"
            exit 0
          fi
        fi

        cd "$AGENT_DIR"
        make agent
        echo "BUILT"
      args:
        executable: /bin/bash
      delegate_to: localhost
      become: false
      run_once: true
      register: agent_build
      changed_when: "'BUILT' in (agent_build.stdout | default(''))"

    # ── ACQUIRE BUNDLE ────────────────────────────────────────
    - name: Update | Copy local bundle to worker
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../../../DataServer/data/worker_downloads/worker_code_linux_x86_64.zip"
        dest: "/tmp/velox_worker_update.zip"
        mode: "0644"
      when: local_bundle_zip.stat.exists | default(false)
      register: bundle_download

    - name: Update | Download worker bundle from master
      ansible.builtin.get_url:
        url: "{{ master_url }}/api/worker/bundle?platform=linux&arch=x86_64"
        dest: "/tmp/velox_worker_update.zip"
        timeout: 120
        force: true
      when: not (local_bundle_zip.stat.exists | default(false))
      register: bundle_download
      failed_when: false

    - name: Update | Inspect downloaded bundle
      ansible.builtin.stat:
        path: "/tmp/velox_worker_update.zip"
      register: bundle_stat

    - name: "Update | Fallback: download bundle with curl"
      ansible.builtin.shell: |
        set -euo pipefail
        curl -sf --max-time 120 "{{ master_url }}/api/worker/bundle?platform=linux&arch=x86_64" \
          -o /tmp/velox_worker_update.zip
      args:
        executable: /bin/bash
      when: bundle_download is failed or not bundle_stat.stat.exists or bundle_stat.stat.size == 0
      register: bundle_fallback
      failed_when: false

    - name: Update | Validate acquired bundle
      ansible.builtin.stat:
        path: "/tmp/velox_worker_update.zip"
      register: bundle_final
      failed_when: not bundle_final.stat.exists or bundle_final.stat.size == 0

    # ── DEPLOY + VERIFY + CONDITIONAL ROLLBACK ───────────────
    - name: Update | Deploy worker release
      ansible.builtin.include_tasks:
        file: tasks/deploy_worker_release.yml
      vars:
        bundle_zip_path: "/tmp/velox_worker_update.zip"
        reinject_agent_src: "{{ playbook_dir }}/../../../../RemoteCodex/native/worker-agent-go/bin/velox-worker-agent"
        reinject_scripts_dir: "{{ playbook_dir }}/../../../../RemoteCodex/scripts"
      when: bundle_final.stat is defined and bundle_final.stat.exists and bundle_final.stat.size > 0

    # ── CLEANUP ───────────────────────────────────────────────
    - name: Update | Remove temporary bundle
      ansible.builtin.file:
        path: "/tmp/velox_worker_update.zip"
        state: absent
      when: bundle_final.stat is defined and bundle_final.stat.exists
