# ============================================================
# SHARED — C++ ENGINE SMOKE TEST (NO EXTERNAL DEPENDENCIES)
# ============================================================
# Generates a black frame with FFmpeg, renders a 1-second segment
# with the C++ engine, and validates the output MP4 with ffprobe.
# No Drive, AI, TTS, or external services used.
#
# Required vars:
#   inventory_hostname  — set automatically by Ansible
# ============================================================

- name: SmokeCpp | Run native C++ render smoke test
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "velox-worker-{{ inventory_hostname }}"
      - bash
      - -lc
      - |
        set -Eeuo pipefail

        TEST_DIR=/tmp/velox-cpp-smoke
        rm -rf "$TEST_DIR"
        mkdir -p "$TEST_DIR"

        ffmpeg -hide_banner -loglevel error \
          -f lavfi \
          -i color=c=black:s=1280x720 \
          -frames:v 1 \
          "$TEST_DIR/frame.jpg"

        /usr/local/bin/velox_video_engine \
          --build-scene-segment \
          --image "$TEST_DIR/frame.jpg" \
          --duration 1 \
          --out "$TEST_DIR/output.mp4"

        test -s "$TEST_DIR/output.mp4"

        DURATION="$(ffprobe -v error \
          -show_entries format=duration \
          -of default=noprint_wrappers=1:nokey=1 \
          "$TEST_DIR/output.mp4")"

        awk -v duration="$DURATION" \
          'BEGIN { exit !(duration > 0.5) }'

        CODEC="$(ffprobe -v error \
          -select_streams v:0 \
          -show_entries stream=codec_name \
          -of default=noprint_wrappers=1:nokey=1 \
          "$TEST_DIR/output.mp4")"

        echo "SMOKE_OK: codec=$CODEC duration=${DURATION}s"

        rm -rf "$TEST_DIR"
  register: _smoke_cpp
  changed_when: false

- name: SmokeCpp | Assert render passed
  ansible.builtin.assert:
    that:
      - _smoke_cpp.rc == 0
      - "'SMOKE_OK' in _smoke_cpp.stdout"
    fail_msg: >-
      C++ smoke render failed on {{ inventory_hostname }}:
      {{ _smoke_cpp.stdout | default('') }}
      {{ _smoke_cpp.stderr | default('') }}

- name: SmokeCpp | Log result
  ansible.builtin.debug:
    msg: "✅ C++ smoke render OK: {{ _smoke_cpp.stdout | default('') }}"
