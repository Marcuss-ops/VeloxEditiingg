# ============================================================
# SHARED — VERIFY CANONICAL WORKER POST-DEPLOY (BLOCKING)
# ============================================================
# All checks derive unit/container/worker identity from the same canonical
# facts populated by canonical_worker_runtime.yml.
# ============================================================

- name: Verify | Resolve canonical verification facts
  ansible.builtin.set_fact:
    velox_worker_identity: "{{ velox_worker_identity | default(worker_id | default(inventory_hostname)) }}"
    velox_worker_unit_name: "{{ velox_worker_unit_name | default('velox-worker-' ~ inventory_hostname ~ '.service') }}"
    velox_worker_container_name: "{{ velox_worker_container_name | default('velox-worker-' ~ inventory_hostname) }}"

- name: Verify | Read canonical worker systemd service
  ansible.builtin.systemd:
    name: "{{ velox_worker_unit_name }}"
  register: _worker_service

- name: Verify | Assert canonical service is active and running
  ansible.builtin.assert:
    that:
      - _worker_service.status.ActiveState == "active"
      - _worker_service.status.SubState == "running"
    fail_msg: >-
      {{ velox_worker_unit_name }} is not operational:
      ActiveState={{ _worker_service.status.ActiveState | default('unknown') }},
      SubState={{ _worker_service.status.SubState | default('unknown') }}

- name: Verify | Inspect canonical Docker container
  ansible.builtin.command:
    argv:
      - docker
      - inspect
      - "{{ velox_worker_container_name }}"
  register: _worker_container
  changed_when: false

- name: Verify | Assert canonical container exists
  ansible.builtin.assert:
    that:
      - _worker_container.rc == 0
    fail_msg: "Docker container {{ velox_worker_container_name }} not found"

- name: Verify | Check image entrypoint
  ansible.builtin.command:
    argv:
      - docker
      - image
      - inspect
      - "{{ _worker_image_tag | default('velox-worker:latest') }}"
      - --format
      - "{{ '{{json .Config.Entrypoint}}' }}"
  register: _image_entrypoint
  changed_when: false

- name: Verify | Assert canonical entrypoint
  ansible.builtin.assert:
    that:
      - "'/usr/local/bin/worker-entrypoint.sh' in _image_entrypoint.stdout"
    fail_msg: >-
      Worker image entrypoint is not worker-entrypoint.sh:
      {{ _image_entrypoint.stdout | default('unknown') }}

- name: Verify | Check C++ engine binary
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ velox_worker_container_name }}"
      - bash
      - -lc
      - >-
        test -x /usr/local/bin/velox_video_engine &&
        ! ldd /usr/local/bin/velox_video_engine | grep -q 'not found' &&
        /usr/local/bin/velox_video_engine --help >/dev/null
  register: _cpp_engine
  changed_when: false

- name: Verify | Assert C++ engine operational
  ansible.builtin.assert:
    that:
      - _cpp_engine.rc == 0
    fail_msg: >-
      C++ engine /usr/local/bin/velox_video_engine is not operational in
      {{ velox_worker_container_name }} (rc={{ _cpp_engine.rc }})

- name: Verify | Health endpoint with retries
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ velox_worker_health_port }}/health"
    status_code: 200
    timeout: 10
  register: _worker_health
  retries: 12
  delay: 5
  until: _worker_health.status == 200

- name: Verify | Assert health identity and registration
  ansible.builtin.assert:
    that:
      - _worker_health.json is defined
      - _worker_health.json.status | default('') == 'ok'
      - _worker_health.json.registered | default(false) | bool
      - _worker_health.json.worker_id | default('') == velox_worker_identity
    fail_msg: >-
      Worker health does not match canonical identity {{ velox_worker_identity }}:
      {{ _worker_health.json | default({}) }}

- name: Verify | Heartbeat snapshot on master
  ansible.builtin.uri:
    url: "{{ master_verify_url | default(master_url) }}/api/v1/workers/status"
    method: GET
    return_content: true
    status_code: 200
    timeout: 10
  register: _workers_status
  delegate_to: localhost
  become: false
  retries: 12
  delay: 5
  until: _workers_status.status == 200
  ignore_errors: true

- name: Verify | Worker list fallback on master
  ansible.builtin.uri:
    url: "{{ master_verify_url | default(master_url) }}/api/v1/workers"
    method: GET
    return_content: true
    status_code: 200
    timeout: 10
  register: _workers_list
  delegate_to: localhost
  become: false
  retries: 12
  delay: 5
  until: _workers_list.status == 200
  ignore_errors: true

- name: Verify | Assert canonical worker is registered on master
  ansible.builtin.assert:
    that:
      - >-
        (_workers_status.status | default(0) == 200) or
        (_workers_list.status | default(0) == 200)
      - >-
        (
          (_workers_status.json | default({})).workers
          | default([])
          | selectattr('worker_id', 'equalto', velox_worker_identity)
          | list
          | length
        ) > 0 or (
          (_workers_list.json | default({})).workers
          | default([])
          | selectattr('worker_id', 'equalto', velox_worker_identity)
          | list
          | length
        ) > 0
    fail_msg: >-
      Worker {{ velox_worker_identity }} is not registered on master
      (status endpoint={{ _workers_status.status | default('error') }},
      list endpoint={{ _workers_list.status | default('error') }})

- name: Verify | Log canonical verification success
  ansible.builtin.debug:
    msg: >-
      {{ velox_worker_identity }} verified through {{ velox_worker_unit_name }}:
      systemd active, one container running, canonical entrypoint, C++ engine,
      local health, and master registration all confirmed.
