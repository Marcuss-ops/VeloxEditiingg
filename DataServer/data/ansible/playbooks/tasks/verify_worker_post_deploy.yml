# ============================================================
# SHARED — VERIFY CANONICAL WORKER POST-DEPLOY (BLOCKING)
# ============================================================
# All checks derive unit/container/worker identity from the same canonical
# facts populated by canonical_worker_runtime.yml.
# ============================================================

- name: Verify | Resolve canonical verification facts
  ansible.builtin.set_fact:
    velox_worker_identity: "{{ velox_worker_identity | default(worker_id | default(inventory_hostname)) }}"
    velox_worker_unit_name: "{{ velox_worker_unit_name | default('velox-worker-' ~ inventory_hostname ~ '.service') }}"
    velox_worker_container_name: "{{ velox_worker_container_name | default('velox-worker-' ~ inventory_hostname) }}"

- name: Verify | Read canonical worker systemd service
  ansible.builtin.systemd:
    name: "{{ velox_worker_unit_name }}"
  register: _worker_service

- name: Verify | Assert canonical service is active and running
  ansible.builtin.assert:
    that:
      - _worker_service.status.ActiveState == "active"
      - _worker_service.status.SubState == "running"
    fail_msg: >-
      {{ velox_worker_unit_name }} is not operational:
      ActiveState={{ _worker_service.status.ActiveState | default('unknown') }},
      SubState={{ _worker_service.status.SubState | default('unknown') }}

# ── HOSTILE-ISOLATION ASSERT: only canonical + watchdog may be active ──
# A worker host must have exactly one runtime `velox-worker*.service`
# unit. The canonical unit is the one the deploy just (re)started; the
# watchdog is an exempt `oneshot` sibling that re-arms the canonical
# unit. `velox-worker@*.service` template units are exempt too: the
# canonical runtime never uses templates. Any OTHER unit in `active`,
# `activating` or `failed` state means a hostile or stale unit is
# competing for the worker's Docker container name and would silently
# corrupt the runtime.
- name: Verify | List all active velox-worker*.service units (excluding template instances)
  ansible.builtin.shell: |
    systemctl list-units 'velox-worker*.service' \
      --state=active,activating,failed \
      --plain --no-legend 2>/dev/null \
      | awk '$1 !~ /^velox-worker@/ {print $1}' || true
  register: _active_worker_units
  changed_when: false

- name: Verify | Assert only canonical and watchdog worker units are active
  ansible.builtin.assert:
    that:
      - >-
        {{
          _active_worker_units.stdout_lines | default([])
          | difference([velox_worker_unit_name, 'velox-worker-watchdog.service'])
          | length
        }} == 0
    fail_msg: >-
      Stray active velox-worker*.service unit(s) detected. A worker host
      must run only {{ velox_worker_unit_name }} (the canonical unit) and
      velox-worker-watchdog.service (the oneshot re-armer). Offenders:
      {{ _active_worker_units.stdout | default('') }}

# ── HOSTILE-ISOLATION ASSERT: non-canonical unit files must be masked ──
# Masked units (symlink to /dev/null) CANNOT be started. A disabled unit,
# in contrast, is only one `systemctl start` away from running. We require
# that any non-canonical `velox-worker*.service` unit file be in state
# `masked` (or absent) so the hostile-cleanup contract enforced at
# deploy time is also enforced at verify time. Filter is pushed into
# awk (not Jinja) so the output is already a clean list of offenders.
- name: Verify | List non-canonical velox-worker*.service unit files that are NOT masked
  ansible.builtin.shell: |
    systemctl list-unit-files 'velox-worker*.service' \
      --no-legend --no-pager 2>/dev/null \
      | awk '$1 !~ /^({{ velox_worker_unit_name }}|velox-worker-watchdog\.service)$/ && $2 != "masked" {print $1, $2}' \
      || true
  register: _unmasked_non_canonical
  changed_when: false

- name: Verify | Assert no non-canonical worker unit file is unmasked
  ansible.builtin.assert:
    that:
      - _unmasked_non_canonical.stdout | default('') == ''
    fail_msg: >-
      Non-canonical velox-worker*.service unit file(s) found in unmasked
      state (must be 'masked' or absent). Run canonical_worker_runtime.yml
      to re-hostile-cleanup. Offenders:
      {{ _unmasked_non_canonical.stdout | default('') }}

- name: Verify | Inspect canonical Docker container
  ansible.builtin.command:
    argv:
      - docker
      - inspect
      - "{{ velox_worker_container_name }}"
  register: _worker_container
  changed_when: false

- name: Verify | Assert canonical container exists
  ansible.builtin.assert:
    that:
      - _worker_container.rc == 0
    fail_msg: "Docker container {{ velox_worker_container_name }} not found"

- name: Verify | Check image entrypoint
  ansible.builtin.command:
    argv:
      - docker
      - image
      - inspect
      - "{{ _worker_image_tag | default('velox-worker:latest') }}"
      - --format
      - "{{ '{{json .Config.Entrypoint}}' }}"
  register: _image_entrypoint
  changed_when: false

- name: Verify | Assert canonical entrypoint
  ansible.builtin.assert:
    that:
      - "'/usr/local/bin/worker-entrypoint.sh' in _image_entrypoint.stdout"
    fail_msg: >-
      Worker image entrypoint is not worker-entrypoint.sh:
      {{ _image_entrypoint.stdout | default('unknown') }}

- name: Verify | Check C++ engine binary
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ velox_worker_container_name }}"
      - bash
      - -lc
      - >-
        test -x /usr/local/bin/velox_video_engine &&
        ! ldd /usr/local/bin/velox_video_engine | grep -q 'not found' &&
        /usr/local/bin/velox_video_engine --help >/dev/null
  register: _cpp_engine
  changed_when: false

- name: Verify | Assert C++ engine operational
  ansible.builtin.assert:
    that:
      - _cpp_engine.rc == 0
    fail_msg: >-
      C++ engine /usr/local/bin/velox_video_engine is not operational in
      {{ velox_worker_container_name }} (rc={{ _cpp_engine.rc }})

- name: Verify | Health endpoint with retries
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ velox_worker_health_port }}/health"
    status_code: 200
    timeout: 10
  register: _worker_health
  retries: 12
  delay: 5
  until: _worker_health.status == 200

- name: Verify | Assert health identity and registration
  ansible.builtin.assert:
    that:
      - _worker_health.json is defined
      - _worker_health.json.status | default('') == 'ok'
      - _worker_health.json.registered | default(false) | bool
      - _worker_health.json.worker_id | default('') == velox_worker_identity
    fail_msg: >-
      Worker health does not match canonical identity {{ velox_worker_identity }}:
      {{ _worker_health.json | default({}) }}

- name: Verify | Heartbeat snapshot on master
  ansible.builtin.uri:
    url: "{{ master_verify_url | default(master_url) }}/api/v1/workers/status"
    method: GET
    return_content: true
    status_code: 200
    timeout: 10
  register: _workers_status
  delegate_to: localhost
  become: false
  retries: 12
  delay: 5
  until: _workers_status.status == 200
  ignore_errors: true

- name: Verify | Worker list fallback on master
  ansible.builtin.uri:
    url: "{{ master_verify_url | default(master_url) }}/api/v1/workers"
    method: GET
    return_content: true
    status_code: 200
    timeout: 10
  register: _workers_list
  delegate_to: localhost
  become: false
  retries: 12
  delay: 5
  until: _workers_list.status == 200
  ignore_errors: true

- name: Verify | Assert canonical worker is registered on master
  ansible.builtin.assert:
    that:
      - >-
        (_workers_status.status | default(0) == 200) or
        (_workers_list.status | default(0) == 200)
      - >-
        (
          (_workers_status.json | default({})).workers
          | default([])
          | selectattr('worker_id', 'equalto', velox_worker_identity)
          | list
          | length
        ) > 0 or (
          (_workers_list.json | default({})).workers
          | default([])
          | selectattr('worker_id', 'equalto', velox_worker_identity)
          | list
          | length
        ) > 0
    fail_msg: >-
      Worker {{ velox_worker_identity }} is not registered on master
      (status endpoint={{ _workers_status.status | default('error') }},
      list endpoint={{ _workers_list.status | default('error') }})

# ── RUNTIME ISOLATION CONTRACT (P0.4) ───────────────────────────
# The worker host is read-only under /app (the release checkout) and
# writable under {{ velox_worker_runtime_container_dir }} (the canonical
# runtime mount, backed by the host's /var/lib/velox/workers/<host>/).
# Mutable state — worker_state.json + .tmp, cache, blobs, assets_cache —
# MUST live under the runtime dir. These four checks pin that contract.

# Check 1: /app/RemoteCodex is read-only inside the container.
# Inherits :ro from the /app mount. A `touch` here MUST fail.
- name: Verify | Assert /app/RemoteCodex is read-only inside container
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ velox_worker_container_name }}"
      - sh
      - -c
      - "touch /app/RemoteCodex/x && echo WRITABLE_BAD || echo READONLY_OK"
  register: _app_readonly_probe
  changed_when: false
  failed_when: false

- name: Verify | Assert Check 1 passed (READONLY_OK)
  ansible.builtin.assert:
    that:
      - "'READONLY_OK' in (_app_readonly_probe.stdout | default(''))"
      - "'WRITABLE_BAD' not in (_app_readonly_probe.stdout | default(''))"
    fail_msg: >-
      /app/RemoteCodex is WRITABLE inside the container — the read-only
      contract is broken. Stdout was: {{ _app_readonly_probe.stdout | default('') }}

# Check 2: the runtime work dir is writable inside the container.
# Container path: {{ velox_worker_runtime_container_dir }}/work ==
# host path: /var/lib/velox/workers/<host>/work. A `touch` here MUST succeed.
- name: Verify | Assert runtime work dir is writable inside container
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ velox_worker_container_name }}"
      - sh
      - -c
      - "touch {{ velox_worker_runtime_container_dir }}/work/x && echo WRITABLE_OK && rm -f {{ velox_worker_runtime_container_dir }}/work/x"
  register: _runtime_writable_probe
  changed_when: false
  failed_when: false

- name: Verify | Assert Check 2 passed (WRITABLE_OK)
  ansible.builtin.assert:
    that:
      - "'WRITABLE_OK' in (_runtime_writable_probe.stdout | default(''))"
    fail_msg: >-
      {{ velox_worker_runtime_container_dir }}/work is NOT writable inside
      the container — the runtime mount contract is broken. Stdout was:
      {{ _runtime_writable_probe.stdout | default('') }}

# Check 3 + 4: graceful restart forces worker_state.json flush AND
# the unit stays active. Combining them: restart the canonical unit,
# wait for it to come back active, then look for worker_state.json
# in the canonical runtime dir. The persistence loop calls
# saveLocalState() on SIGTERM (stop signal) before the process exits,
# so the file must land at the canonical path after a clean restart.
#
# BUT: the persistence loop also has a 30s ticker
# (case <-ticker.C: _ = w.saveLocalState()) which fires regardless
# of any signal handler. To make Check 3 robust against (a) a worker
# that lacks a SIGTERM handler, OR (b) a deploy that runs <30s after
# the worker's first start, we first wait for the 30s ticker to fire
# at least once. The wait probes the canonical host path; once the
# file exists, the restart in Check 4 is purely a liveness smoke
# test (not a save-flush trigger). This decouples the P0.4 path
# contract from any signal-handler assumption.
- name: Verify | Wait for worker_state.json to land at canonical runtime path (30s ticker)
  ansible.builtin.command:
    argv:
      - test
      - -f
      - "{{ velox_worker_runtime_host_dir }}/worker_state.json"
  register: _worker_state_probe
  retries: 12
  delay: 3
  until: _worker_state_probe.rc == 0
  changed_when: false
  failed_when: false

- name: Verify | Assert worker_state.json exists at canonical runtime path (pre-restart)
  ansible.builtin.assert:
    that:
      - _worker_state_probe.rc == 0
    fail_msg: >-
      worker_state.json did not land at the canonical runtime path
      {{ velox_worker_runtime_host_dir }}/worker_state.json within ~36s
      of worker startup. The worker is not persisting to StateDir
      (env VELOX_STATE_DIR={{ velox_worker_runtime_container_dir }}).
      This means the P0.4 path-move failed: state writes are going
      to /opt/velox (read-only) or some other non-canonical path.

- name: Verify | Restart canonical unit to confirm liveness survives
  ansible.builtin.systemd:
    name: "{{ velox_worker_unit_name }}"
    state: restarted
  changed_when: false

- name: Verify | Wait for canonical unit to come back active
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - "{{ velox_worker_unit_name }}"
  register: _post_restart_active
  retries: 12
  delay: 3
  until: _post_restart_active.stdout | default('') == 'active'
  changed_when: false
  failed_when: false

- name: Verify | Assert Check 4 passed (unit active after restart)
  ansible.builtin.assert:
    that:
      - _post_restart_active.stdout | default('') == 'active'
    fail_msg: >-
      {{ velox_worker_unit_name }} did not return to 'active' after restart.
      systemctl is-active → {{ _post_restart_active.stdout | default('unknown') }}.

- name: Verify | Re-check worker_state.json survives restart
  ansible.builtin.command:
    argv:
      - test
      - -f
      - "{{ velox_worker_runtime_host_dir }}/worker_state.json"
  register: _post_restart_state_probe
  changed_when: false
  failed_when: false

- name: Verify | Assert worker_state.json still at canonical runtime path (post-restart)
  ansible.builtin.assert:
    that:
      - _post_restart_state_probe.rc == 0
    fail_msg: >-
      worker_state.json disappeared from the canonical runtime path
      after restart. The bind-mount may not be persisting state, OR
      the worker is overwriting it on a non-canonical path. ls
      {{ velox_worker_runtime_host_dir }}/ :
