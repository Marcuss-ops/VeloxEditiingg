# ============================================================
# SHARED — BUNDLE ATOMIC DEPLOY
# ============================================================
# Extracts a worker bundle zip into a staging directory, verifies
# the layout, and performs an atomic swap into current/.
#
# Required vars:
#   velox_dir         — base worker directory (e.g. /opt/velox)
#   bundle_zip_path   — path to the bundle .zip file on the worker
#
# Flow:
#   1. Clean staging (current.new)
#   2. Extract bundle → staging
#   3. Flatten legacy refactored/ layout if present
#   4. Verify Dockerfile exists
#   5. Atomic swap: current → current.old → current.new → current
# ============================================================

- name: BundleDeploy | Clean staging directory
  ansible.builtin.file:
    path: "{{ velox_dir }}/current.new"
    state: absent

- name: BundleDeploy | Create staging directory
  ansible.builtin.file:
    path: "{{ velox_dir }}/current.new"
    state: directory
    mode: "0755"

- name: BundleDeploy | Extract bundle into staging
  ansible.builtin.unarchive:
    src: "{{ bundle_zip_path }}"
    dest: "{{ velox_dir }}/current.new"
    remote_src: yes
    mode: "0755"
  register: _bundle_extract
  failed_when: false

- name: BundleDeploy | Fail if extraction failed
  ansible.builtin.fail:
    msg: "Failed to extract bundle {{ bundle_zip_path }} — rc={{ _bundle_extract.rc }}"
  when: _bundle_extract.rc | default(0) != 0

- name: BundleDeploy | Flatten legacy refactored layout in staging
  ansible.builtin.shell: |
    set -euo pipefail
    if [ -d "{{ velox_dir }}/current.new/refactored" ]; then
      shopt -s dotglob nullglob
      mv -f "{{ velox_dir }}/current.new/refactored"/* "{{ velox_dir }}/current.new"/ || true
      rm -rf "{{ velox_dir }}/current.new/refactored"
    fi
  args:
    executable: /bin/bash
  changed_when: false

- name: BundleDeploy | Remove legacy refactored tree if still present
  ansible.builtin.file:
    path: "{{ velox_dir }}/current.new/refactored"
    state: absent

- name: BundleDeploy | Verify Dockerfile in staging
  ansible.builtin.stat:
    path: "{{ velox_dir }}/current.new/RemoteCodex/native/worker-agent-go/Dockerfile"
  register: _bundle_dockerfile

- name: BundleDeploy | Fail if bundle layout missing
  ansible.builtin.fail:
    msg: "Bundle layout mancante: nessun Dockerfile in {{ velox_dir }}/current.new"
  when: not _bundle_dockerfile.stat.exists

- name: BundleDeploy | Atomic swap
  ansible.builtin.shell: |
    set -euo pipefail
    rm -rf "{{ velox_dir }}/current.old"
    if [ -d "{{ velox_dir }}/current" ]; then
      mv "{{ velox_dir }}/current" "{{ velox_dir }}/current.old"
    fi
    mv "{{ velox_dir }}/current.new" "{{ velox_dir }}/current"
    rm -rf "{{ velox_dir }}/current.old"
  args:
    executable: /bin/bash

- name: BundleDeploy | Log success
  ansible.builtin.debug:
    msg: "✅ Bundle deployed atomically to {{ velox_dir }}/current"
