---
# ============================================================
# CLEANUP WORKER — Pulizia completa di tracce Velox
# ============================================================
# Rimuove: systemd units, Docker containers/images, vecchi bundle
# Uso:
#   ansible-playbook -i inventory.ini cleanup_worker.yml
#   ansible-playbook -i inventory.ini cleanup_worker.yml --limit host_51.222.204.158
# ============================================================

- name: Cleanup Velox worker traces
  hosts: velox_workers
  gather_facts: true
  vars:
    velox_dir: "/opt/velox"

  tasks:
    # ── STEP 1: Stop all services ─────────────────────────────
    - name: Cleanup | Stop all velox services
      ansible.builtin.shell: |
        set -euo pipefail
        for f in /etc/systemd/system/velox-worker*.service /etc/systemd/system/velox-worker*.timer /etc/systemd/system/velox-auto-update.*; do
          [ ! -f "$f" ] && continue
          BASE=$(basename "$f")
          systemctl stop "$BASE" 2>/dev/null || true
          systemctl disable "$BASE" 2>/dev/null || true
        done
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false

    # ── STEP 2: Remove all systemd units and overrides ────────
    - name: Cleanup | Remove all velox systemd unit files
      ansible.builtin.shell: |
        set -euo pipefail
        for f in /etc/systemd/system/velox-worker*.service /etc/systemd/system/velox-worker*.timer /etc/systemd/system/velox-auto-update.*; do
          [ ! -f "$f" ] && continue
          rm -f "$f"
          echo "Removed: $(basename "$f")"
        done
      args:
        executable: /bin/bash
      register: removed_units
      changed_when: "'Removed:' in (removed_units.stdout | default(''))"

    - name: Cleanup | Remove all velox override directories
      ansible.builtin.shell: |
        set -euo pipefail
        for d in /etc/systemd/system/velox-worker*.service.d; do
          [ ! -d "$d" ] && continue
          rm -rf "$d"
          echo "Removed dir: $(basename "$d")"
        done
      args:
        executable: /bin/bash
      register: removed_dirs
      changed_when: "'Removed dir:' in (removed_dirs.stdout | default(''))"

    - name: Cleanup | Daemon reload
      ansible.builtin.systemd:
        daemon_reload: true

    # ── STEP 3: Remove Docker containers and images ───────────
    - name: Cleanup | Stop and remove all velox Docker containers
      ansible.builtin.shell: |
        set -euo pipefail
        for c in $(docker ps -a --filter "name=velox" --format "{{.Names}}" 2>/dev/null); do
          docker rm -f "$c" 2>/dev/null || true
          echo "Removed container: $c"
        done
      args:
        executable: /bin/bash
      register: removed_containers
      changed_when: "'Removed container:' in (removed_containers.stdout | default(''))"

    - name: Cleanup | Remove velox Docker images
      ansible.builtin.shell: |
        set -euo pipefail
        docker images --filter "reference=velox-worker*" -q 2>/dev/null | xargs -r docker rmi 2>/dev/null || true
        echo "Images removed"
      args:
        executable: /bin/bash
      register: removed_images
      changed_when: false

    # ── STEP 4: Remove old bundle, cache, config files ────────
    - name: Cleanup | Remove current bundle directory
      ansible.builtin.file:
        path: "{{ velox_dir }}/current"
        state: absent

    # Step 6/8: scrub the legacy /app/RemoteCodex/assets_cache
    # bind-mount footprint when present. Post-cut-over this RB is
    # dead weight; transitional one-shot (idempotent: silently
    # does nothing when the dir is absent).
    - name: Cleanup | Remove legacy /app/RemoteCodex/assets_cache (Step 6/8)
      ansible.builtin.shell: |
        set -euo pipefail
        if [ -d /app/RemoteCodex/assets_cache ]; then
          rm -rf /app/RemoteCodex/assets_cache
          echo "Removed legacy: /app/RemoteCodex/assets_cache"
        fi
      args:
        executable: /bin/bash
      register: removed_legacy_cache
      changed_when: "'Removed legacy:' in (removed_legacy_cache.stdout | default(''))"
      failed_when: false

    - name: Cleanup | Remove staging directories
      ansible.builtin.shell: |
        rm -rf "{{ velox_dir }}/current.new" "{{ velox_dir }}/current.old"
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false

    - name: Cleanup | Clear cache directory
      ansible.builtin.shell: rm -rf {{ velox_dir }}/cache/*
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false

    - name: Cleanup | Remove worker config
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ velox_dir }}/worker_config.json"
        - /etc/velox-worker.env
        - /etc/velox-worker-{{ inventory_hostname }}.env

    # ── STEP 5: Verify clean state ────────────────────────────
    - name: Cleanup | Verify — remaining systemd units
      ansible.builtin.shell: |
        set +e
        ls /etc/systemd/system/velox-worker*.service 2>/dev/null | wc -l
      register: remaining_units
      changed_when: false
      failed_when: false

    - name: Cleanup | Verify — remaining Docker containers
      ansible.builtin.shell: |
        set +e
        docker ps -a --filter "name=velox" --format "{{.Names}}" 2>/dev/null | wc -l
      register: remaining_containers
      changed_when: false
      failed_when: false

    - name: Cleanup | Verify — remaining Docker images
      ansible.builtin.shell: |
        set +e
        docker images --filter "reference=velox-worker*" -q 2>/dev/null | wc -l
      register: remaining_images
      changed_when: false
      failed_when: false

    - name: Cleanup | Verify — remaining files in velox dir
      ansible.builtin.shell: |
        set +e
        ls {{ velox_dir }}/current/ 2>/dev/null || echo "empty"
      register: remaining_files
      changed_when: false
      failed_when: false

    - name: Cleanup | Summary
      ansible.builtin.debug:
        msg: |-
          ========================================
          CLEANUP COMPLETE — {{ inventory_hostname }}
          ========================================
          Systemd units:   {{ remaining_units.stdout | default('?') }} remaining
          Docker containers: {{ remaining_containers.stdout | default('?') }} remaining
          Docker images:    {{ remaining_images.stdout | default('?') }} remaining
          Files in {{ velox_dir }}/current: {{ remaining_files.stdout | default('empty') }}
          ========================================
