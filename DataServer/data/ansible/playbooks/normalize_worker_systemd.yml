---
# ============================================================
# NORMALIZE WORKER SYSTEMD — Pulizia e ricostruzione servizi
# ============================================================
# Obiettivo:
#   - Unmask servizio velox-worker
#   - Stop e disable di TUTTI i vecchi servizi (velox-worker-*.service)
#   - Rimozione vecchie unit file e override directories
#   - include deploy_worker_release (single source of truth)
#     → prepare_worker_image (image build) + canonical_worker_runtime
#       (env file, config, systemd unit, watchdog, auto-update)
#   - Verifica stato + heartbeat sul master
# ============================================================

- name: Normalize worker systemd
  hosts: velox_workers
  gather_facts: true
  vars:
    velox_dir: "/opt/velox"
    master_url: "{{ master_url | default('http://127.0.0.1:8000') }}"

  tasks:
    # ── STEP 1: Pulizia servizi vecchi ────────────────────────
    - name: Normalize | Stop all old velox-worker services
      ansible.builtin.shell: |
        set -euo pipefail
        for u in $(systemctl list-unit-files 'velox-worker*.service' --no-legend --no-pager 2>/dev/null | awk '{print $1}' | grep -v watchdog | grep -v auto-update || true); do
          systemctl stop "$u" 2>/dev/null || true
        done
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false

    - name: Normalize | Disable all old velox-worker services
      ansible.builtin.shell: |
        set -euo pipefail
        for u in $(systemctl list-unit-files 'velox-worker*.service' --no-legend --no-pager 2>/dev/null | awk '{print $1}' | grep -v watchdog | grep -v auto-update || true); do
          systemctl disable "$u" 2>/dev/null || true
        done
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false

    - name: Normalize | Unmask velox-worker service
      ansible.builtin.shell: |
        set -euo pipefail
        systemctl unmask "velox-worker-{{ inventory_hostname }}" 2>/dev/null || true
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false

    - name: Normalize | Stop and disable any generic velox-worker.service
      ansible.builtin.shell: |
        set -euo pipefail
        systemctl stop velox-worker.service 2>/dev/null || true
        systemctl disable velox-worker.service 2>/dev/null || true
        systemctl unmask velox-worker.service 2>/dev/null || true
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false

    # ── STEP 2: Rimuovi vecchie unit file ─────────────────────
    - name: Normalize | Remove old unit files (not the canonical one)
      ansible.builtin.shell: |
        set -euo pipefail
        KEEP="velox-worker-{{ inventory_hostname }}.service"
        for f in /etc/systemd/system/velox-worker-*.service; do
          [ ! -f "$f" ] && continue
          BASE=$(basename "$f")
          # Only keep the canonical unit. Watchdog / auto-update /
          # console are removed too: Step 7 assert forbids them in the
          # post-state enumeration (canonical-only contract).
          if [ "$BASE" != "$KEEP" ]; then
            rm -f "$f"
            echo "Removed: $f"
          fi
        done
      args:
        executable: /bin/bash
      register: removed_units
      changed_when: "'Removed:' in (removed_units.stdout | default(''))"

    - name: Normalize | Remove old override directories
      ansible.builtin.shell: |
        set -euo pipefail
        KEEP_DIR="velox-worker-{{ inventory_hostname }}.service.d"
        for d in /etc/systemd/system/velox-worker-*.service.d; do
          [ ! -d "$d" ] && continue
          BASE=$(basename "$d")
          if [ "$BASE" != "$KEEP_DIR" ]; then
            rm -rf "$d"
            echo "Removed dir: $d"
          fi
        done
      args:
        executable: /bin/bash
      register: removed_dirs
      changed_when: "'Removed dir:' in (removed_dirs.stdout | default(''))"

    # ── STEP 3: Unified deploy pipeline (single source of truth) ──
    # deploy_worker_release → stop → staging → validate → swap → Docker build → verify → rollback
    - name: Normalize | Deploy and rebuild worker
      ansible.builtin.include_tasks:
        file: tasks/deploy_worker_release.yml
      vars:
        bundle_zip_path: ""

    - name: Normalize | Get journal logs
      ansible.builtin.shell: |
        journalctl -u "velox-worker-{{ inventory_hostname }}" --no-pager -n 30 2>/dev/null || true
      args:
        executable: /bin/bash
      register: journal_output
      changed_when: false
      failed_when: false

    - name: Normalize | Show recent journal
      ansible.builtin.debug:
        msg: "{{ journal_output.stdout_lines | default([]) }}"

    # ── STEP 7: Assert Idempotency & Purity ───────────────────
    # Hard-fail if the post-normalization state is not canonical-only.
    #
    # Operationally this is a *stricter idempotency gate*: every run
    # must terminate with the host holding exactly one canonical
    # `velox-worker-<inventory_hostname>.service` plus the two named
    # siblings (watchdog, auto-update). Any other surviving unit, or
    # the absence of the canonical unit itself, fails the play.
    #
    # Notes:
    #   * `shell` runs the real `systemctl list-unit-files` even in
    #     `--check` mode; that intentional — we assert *actual* on-host
    #     state, not would-be state.
    #   * The loop runs over the live enumeration. Empty list = loop
    #     is a no-op, so the per-iteration assert is paired with a
    #     separate "canonical present" assert below.
    #   * `velox-worker-console.service` is a transient debug unit
    #     intentionally NOT whitelisted: a leftover console instance
    #     after a real production deploy would trip the gate.
    - name: Normalize | Enumerate surviving velox-worker units
      ansible.builtin.shell: |
        set -euo pipefail
        systemctl list-unit-files 'velox-worker*.service' --no-legend --no-pager 2>/dev/null \
          | awk '{print $1}'
      args:
        executable: /bin/bash
      register: check_remaining_units
      changed_when: false

    - name: Normalize | Assert canonical unit present (no-empty-state guard)
      ansible.builtin.assert:
        that:
          - check_remaining_units.stdout_lines | length > 0
          - "'velox-worker-' ~ inventory_hostname ~ '.service' in check_remaining_units.stdout_lines"
        fail_msg: >-
          Idempotency fail: canonical unit `velox-worker-{{ inventory_hostname }}.service`
          is missing from `systemctl list-unit-files`. Surviving: {{ check_remaining_units.stdout_lines | default([]) }}.
        success_msg: "OK canonical present: velox-worker-{{ inventory_hostname }}.service"

    - name: Normalize | Assert no non-canonical stragglers
      ansible.builtin.assert:
        that:
          - >-
            item in [
              'velox-worker-' ~ inventory_hostname ~ '.service',
              'velox-worker-watchdog.service',
              'velox-auto-update.service'
            ]
        fail_msg: >-
          Idempotency fail: non-canonical unit survived normalization -> {{ item }}.
          Surviving full list: {{ check_remaining_units.stdout_lines | default([]) }}.
        success_msg: "OK canonical: {{ item }}"
      loop: "{{ check_remaining_units.stdout_lines | default([]) }}"

    # ── STEP 8: Riepilogo finale ──────────────────────────────
    - name: Normalize | Final summary
      ansible.builtin.debug:
        msg: |-
          ========================================
          NORMALIZE COMPLETE — {{ inventory_hostname }}
          ========================================
          Worker ID: {{ worker_id | default(inventory_hostname) }}
          Service:   velox-worker-{{ inventory_hostname }}
          Env file:  /etc/velox-worker-{{ inventory_hostname }}.env
          Master:    {{ master_url }}
          ========================================
