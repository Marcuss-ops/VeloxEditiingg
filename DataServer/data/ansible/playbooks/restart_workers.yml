---
# ============================================================
# RESTART WORKERS — Riavvio servizio worker su computer remoti
# ============================================================
# Azioni:
#   - Test connesione SSH
#   - Riavvio servizio systemd velox-worker-HOST
#   - Verifica stato post-riavvio
# ============================================================

- name: Restart workers
  hosts: workers
  gather_facts: no

  tasks:
    # ── PRECHECK ─────────────────────────────────────────────
    - name: Restart | Test connesione SSH
      ansible.builtin.ping:

    # ── RIAVVIO ──────────────────────────────────────────────
    - name: Restart | Riavvia servizio worker
      ansible.builtin.systemd:
        name: "velox-worker-{{ inventory_hostname }}"
        state: restarted
        daemon_reload: yes
        enabled: yes
      register: restart_result

    - name: Restart | Attendi stabilizzazione servizio
      ansible.builtin.pause:
        seconds: 3

    # ── VERIFICA ─────────────────────────────────────────────
    - name: Restart | Verifica stato servizio
      ansible.builtin.systemd:
        name: "velox-worker-{{ inventory_hostname }}"
      register: final_status

    - name: Restart | Log risultato
      ansible.builtin.debug:
        msg: >-
          {% if final_status.status.ActiveState == 'active' %}
          ✅ Worker {{ inventory_hostname }} riavviato con successo
          {% else %}
          ⚠️  Worker {{ inventory_hostname }}: {{ final_status.status.ActiveState | default('unknown') }}
          ({{ final_status.status.SubState | default('') }})
          {% endif %}

    - name: Restart | Mostra log recenti del servizio
      ansible.builtin.shell: |
        journalctl -u "velox-worker-{{ inventory_hostname }}" --no-pager -n 10 2>/dev/null || true
      args:
        executable: /bin/bash
      register: journal_output
      changed_when: false
      failed_when: false

    - name: Restart | Ultime righe di log
      ansible.builtin.debug:
        msg: "{{ journal_output.stdout_lines | default([]) }}"
