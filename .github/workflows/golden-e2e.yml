# =============================================================================
# Velox Golden E2E Test — CI pipeline on a fedora-40 runner
#
# Follows the 19-June-2026 deploy recipe from docs/worker-reliability-fixes.md,
# using real mTLS test certs (scripts/gen-worker-certs.sh) instead of the
# dev-bypass flag. Tests against a self-hosted runner labeled fedora-40.
#
# Pipeline:
#   1. Install deps (Go, cmake, openssl, ffmpeg-devel, sqlite, python3)
#   2. Build: master (Go), worker-agent (Go), video-engine-cpp (cmake)
#   3. Generate mTLS test certs (scripts/gen-worker-certs.sh)
#   4. Bootstrap master with TLS on port 8180
#   5. Bootstrap worker with TLS, wait for registration in master log
#   6. Generate fixtures (voiceover.mp3, scene1.png)
#   7. Submit images.v1 job via /api/v1/script/generate-with-images
#   8. Poll SQLite until status=SUCCEEDED (up to ~7 minutes)
#   9. Assert ≥1 MP4 artifact exists in VELOX_STORAGE_DIR
#
# Triggers:
#   - workflow_dispatch (manual) — primary use: run the test on demand
#   - push to main touching the e2e harness or core components
# =============================================================================

name: golden-e2e

on:
  push:
    branches: [main]
    paths:
      - "scripts/gen-worker-certs.sh"
      - "scripts/ci/golden-e2e.sh"
      - "DataServer/**"
      - "RemoteCodex/**"
      - "shared/**"
      - "VERSION.txt"
      - ".github/workflows/golden-e2e.yml"
  workflow_dispatch:

# Golden tests must NOT cancel one another mid-flight.
concurrency:
  group: golden-e2e-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  golden-e2e:
    name: golden-e2e (fedora-40, ${{ matrix.profile }})
    # Self-hosted runner labelled 'fedora-40'. The runner MUST have:
    #   bash >= 4, coreutils, curl
    # Remaining deps (Go, cmake, g++, openssl, sqlite3, python3, ffmpeg)
    # are installed automatically in step 1.
    runs-on: [self-hosted, fedora-40]
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        profile: [small, production-shaped]

    steps:
      # ── 0. Checkout with full history for VERSION.txt + diff scopes ──────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 1. Install dependencies (fedora-40: dnf) ─────────────────────────
      - name: Install build & test dependencies
        run: |
          sudo dnf install -y \
            golang \
            cmake \
            gcc-c++ \
            openssl \
            sqlite \
            python3 \
            ffmpeg-devel \
            ffmpeg \
            libmp3lame-devel \
            findutils \
            bc

      # ── 2. Run golden e2e test ───────────────────────────────────────────
      - name: Run golden-e2e.sh
        timeout-minutes: 30
        run: |
          GOLDEN_PROFILE="${{ matrix.profile }}" bash scripts/ci/golden-e2e.sh 2>&1

      # ── 3. Upload logs + artifacts on failure ────────────────────────────
      - name: Upload debug artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-e2e-debug-${{ matrix.profile }}
          path: |
            /tmp/velox-golden-e2e/logs/
            /tmp/velox-golden-e2e/data/
            /tmp/velox-golden-e2e/storage/
            /tmp/velox-golden-e2e/certs/
            /tmp/velox-golden-e2e/worker.json
            /tmp/velox-golden-e2e/job.json
          retention-days: 7
          if-no-files-found: warn
