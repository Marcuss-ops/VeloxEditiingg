# =============================================================================
# ci-opaque-wire.yml — opaque wire contract CI guard (Residuo 3 closure).
#
# Purpose:
#   Forbid re-introduction of the legacy top-level `Platform` /
#   `AccountID` / `ChannelID` fields on
#   `socialclient.DeliverArtifactRequest` after the YouTube → Social
#   closure (Residuo 3 of PR-15.13 + Residuo 4 canonical rename of
#   `social_destination_id` -> `external_destination_id` via migration 092).
#   Velox does NOT know the platform, the account, the channel, or any
#   platform-specific concept — the social_repo is the authoritative
#   resolver from the opaque `external_destination_id`.
#
# Scope:
#   Targeted at `DataServer/internal/socialclient/` (where
#   `DeliverArtifactRequest` is defined, requested, and consumed).
#   Whole-tree scan was rejected because DataServer carries
#   legitimate `Platform` / `ChannelID` fields in unrelated domains:
#
#     * DataServer/internal/handlers/remote/livestream/livestream.go
#     * DataServer/internal/handlers/server/pipeline/pipeline_create.go
#     * DataServer/internal/store/sqlite_livestream.go
#     * DataServer/internal/store/sqlite_analytics.go
#
#   Those domains are NOT covered by Residuo 3 and would produce
#   permanent false positives in a whole-tree regex.
#
# Forbidden patterns (any one fires a failure):
#   * Platform   — old top-level field on DeliverArtifactRequest
#   * AccountID  — old top-level account reference
#   * ChannelID  — old top-level channel reference
#
# Regex anchor (Go-struct-field shape):
#   `^[[:space:]]+(Platform|AccountID|ChannelID)[[:space:]]+[A-Za-z*]`
#   Anchors each disjunct to a line-start + whitespace + identifier + whitespace + type
#   start. This is precisely the position a Go field declaration occupies
#   inside a `type X struct { ... }` block, AND any line whose struct tag is
#   `json:"platform"` / `json:"account_id"` / `json:"channel_id"`.
#   Crucially it does NOT false-positive on:
#     - Metadata sub-keys (`Metadata: map[string]any{"platform": "tiktok"}`)
#       which is opaque pass-through, NOT top-level routing plumbing.
#       Residuo 3 REMOVED Platform/AccountID/ChannelID as wire keys;
#       Metadata is documented to LEGITIMATELY carry them.
#     - Identifier suffixes (`LivestreamPlatform`, `PlatformKey`,
#       `someChannelIDList`) — common in unrelated domains.
#     - Comments (`// platform-agnostic`) — explanatory prose is allowed.
#     - Field accesses (`req.Platform`, `t.AccountID`) — would only
#       appear if the legacy fields were re-introduced, but tests can
#       use them and `**/*_test.go` is already excluded.
#
# Exclusions (pathspec-level, transparent — mirror of no-youtube-regression.yml):
#   * .github/workflows/ci-opaque-wire.yml
#     SELF-EXCLUSION: this workflow file's header rationale + REGEX env
#     env var + Hints block enumerate the forbidden disjuncts verbatim.
#     Audit the rest of the repo; exempt this file.
#   * **/*_test.go
#     Tests legitimately assert the ABSENCE of legacy fields
#     (TestClient_DeliverArtifact_WireShape_LegacyKeysNeverPresent in
#     client_test.go pins the regression invariant on wire keys).
#     The audit MUST NOT trip on negative-pinning assertions.
#   * **/testdata/**
#     Wire-shape fixture snapshots that may name legacy keys as
#     documented absence (mirrors of the canonical request body).
#   * **/*.md
#     NESTED markdown (docs/**, subdir READMEs) — git pathspec matches
#     any `dir/file.md` form.
#   * CHANGELOG.md
#     ROOT-level historical record — `**/*.md` does NOT match a
#     single top-level file at repo root. Add explicitly (mirrors
#     no-youtube-regression.yml).
#   * docs/**
#     ROOT-level NESTED docs directory — belt-and-suspenders for
#     `**/*.md` (mirrors no-youtube-regression.yml).
#   * **/migrations/**
#     Historical SQL migrations may carry forward-only references
#     to the YouTube → Social closure under comments that cite the
#     legacy field names. The audit MUST NOT trip on documented
#     history under migrations/ (symmetry with the YouTube guard).
#
# Triggers:
#   * push to main                              — immediate fail-fast
#   * pull_request to main                      — pre-merge gating
#     (NO paths-ignore — every PR runs the audit so a future
#      contributor can't slip a re-introduction through silently.)
#   * weekly Monday 06:00 UTC drift detector    — same model as
#     no-youtube-regression.yml (catches newly-disclosed exits
#     from other workflows' prune-trees).
#   * workflow_dispatch                         — manual re-run.
#
# Status check name in PR UI: "ci-opaque-wire".
# Author: Velox regression-guard initiative (Residuo 3 closure).
# =============================================================================

name: ci-opaque-wire

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # weekly Monday 06:00 UTC drift detector
  workflow_dispatch:

concurrency:
  group: ci-opaque-wire-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  audit:
    name: Opaque-wire CI guard (Residuo 3)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 makes the full history searchable so future
          # maintainers can `git blame` any match the audit surfaced.
          fetch-depth: 0

      - name: Run opaque-wire regression audit
        env:
          # Top-level field line-shape anchored. The bar-piped
          # disjuncts are EACH constrained by leading whitespace +
          # trailing identifier-start, so comments, identifier suffixes,
          # map sub-keys, and field accesses do NOT trigger the gate.
          # See the file header (Regex anchor) for the rationale.
          REGEX: '^[[:space:]]+(Platform|AccountID|ChannelID)[[:space:]]+[A-Za-z*\[]'
        run: |
          set -euo pipefail
          echo "🔍 Running opaque-wire regression audit in DataServer/internal/socialclient/..."

          matches=$(
            git grep -nE "${REGEX}" -- \
              DataServer/internal/socialclient/ \
              ':!.github/workflows/ci-opaque-wire.yml' \
              ':!**/*_test.go' \
              ':!**/testdata/**' \
              ':!**/migrations/**' \
              ':!**/*.md' \
              ':!CHANGELOG.md' \
              ':!docs/**' \
            || true
          )

          if [[ -n "${matches}" ]]; then
            echo
            echo "❌ Opaque-wire regression detected:"
            echo
            echo "Forbidden top-level Platform / AccountID / ChannelID surfaced"
            echo "in DataServer/internal/socialclient/ (the typed Velox-side"
            echo "boundary against social_repo)."
            echo
            echo "These fields ARE allowed in unrelated domains"
            echo "(DataServer/internal/handlers/remote/livestream/*,"
            echo "DataServer/internal/store/sqlite_livestream.go,"
            echo "DataServer/internal/store/sqlite_analytics.go,"
            echo "DataServer/internal/handlers/server/pipeline/*) because"
            echo "those domains are NOT covered by Residuo 3 — they predate"
            echo "the YouTube → Social closure and are outside the opaque-wire"
            echo "contract."
            echo
            echo "${matches}"
            echo
            echo "Hints (per disjunct):"
            echo "  * Platform / AccountID / ChannelID are the legacy"
            echo "    per-platform-fields top-level fields on"
            echo "    socialclient.DeliverArtifactRequest. Residuo 3"
            echo "    (PR-15.13) REMOVED them and replaced them with the"
            echo "    single opaque ExternalDestinationID. The social_repo"
            echo "    is the authoritative resolver from that opaque ID."
            echo "    See CHANGELOG.md \u00a715.13 for the closure record."
            echo "  * If a PR legitimately needs to express platform-specific"
            echo "    intent (title, description, tags, privacy, publish,"
            echo "    etc.), push it into the Metadata map[string]any"
            echo "    payload. Metadata is opaque pass-through to social_repo"
            echo "    and is documented to LEGITIMATELY contain sub-keys"
            echo "    like{\"platform\": \"tiktok\"}."
            echo "  * If the legacy names appear in a NEGATIVE-PINNING test"
            echo "    fixture (TestClient_DeliverArtifact_WireShape_Legacy"
            echo "    KeysNeverPresent in client_test.go for example), the"
            echo "    audit already excludes *_test.go \u2014 no operator"
            echo "    action is needed."
            echo "  * Identifier SUFFIXES (LivestreamPlatform, PlatformKey,"
            echo "    someChannelIDList) and COMMENTS that mention"
            echo "    legacy fields are NOT caught because the regex is"
            echo "    anchored to a Go struct-field line shape. If your"
            echo "    match IS in such a context, the regex anchor is"
            echo "    wrong \u2014 surface as a follow-up workflow tweak"
            echo "    instead of working around the gate."
            exit 1
          fi

          echo
          echo "✅ No opaque-wire regression found — clean."
