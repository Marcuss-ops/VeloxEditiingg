name: ci

# Runs on pushes to main, all pull requests, and on-demand dispatch.
# Concurrency cancels in-progress PR runs but never cancels pushes to main
# (push runs are cheap and we want to keep historical signals intact).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least-privilege. Tests do not need write access to any repo scope.
permissions:
  contents: read

env:
  GO_VERSION: "1.25"

jobs:
  # ── DataServer: vet + race-enabled test sweep ───────────────────────────
  dataserver-tests:
    name: DataServer (Go ${{ env.GO_VERSION }} + race)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # fetch-depth: 0 keeps BASE_REF resolvable for any future
        # scoped check (e.g. if this workflow begins running the
        # architectural invariants). Current jobs do not require it
        # but the cost is negligible.
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@0c52d547c9bc32b1aa3301fd7a9cb496313a4491 # v5.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: refactored/DataServer/go.sum

      - name: Download modules
        working-directory: refactored/DataServer
        run: |
          go mod download
          go mod verify

      - name: Vet
        working-directory: refactored/DataServer
        run: go vet ./...

      - name: Test (-race)
        working-directory: refactored/DataServer
        # -count=1 disables cache; t.Helper-friendly verbose for action log.
        run: go test -race -count=1 -v ./...

  # ── Worker agent: same matrix slice ─────────────────────────────────────
  worker-tests:
    name: worker-agent-go (Go ${{ env.GO_VERSION }} + race)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # fetch-depth: 0 keeps BASE_REF resolvable for any future
        # scoped check (e.g. if this workflow begins running the
        # architectural invariants). Current jobs do not require it
        # but the cost is negligible.
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@0c52d547c9bc32b1aa3301fd7a9cb496313a4491 # v5.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: refactored/RemoteCodex/native/worker-agent-go/go.sum

      - name: Download modules
        working-directory: refactored/RemoteCodex/native/worker-agent-go
        run: |
          go mod download
          go mod verify

      - name: Vet
        working-directory: refactored/RemoteCodex/native/worker-agent-go
        run: go vet ./...

      - name: Test (-race)
        working-directory: refactored/RemoteCodex/native/worker-agent-go
        run: go test -race -count=1 -v ./...

  # ── Ansible playbooks lint ──────────────────────────────────────────────
  ansible-lint:
    name: ansible-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # fetch-depth: 0 keeps BASE_REF resolvable for any future
        # scoped check. Cost is negligible on the ansible-lint runner.
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Install ansible-lint
        run: pip install --quiet ansible-lint

      - name: Lint playbooks
        working-directory: refactored/DataServer/data/ansible/playbooks
        run: |
          ansible-lint --version
          ansible-lint -v .
