name: Finalize requested long-file split

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: requested-long-files-finalizer
  cancel-in-progress: false

jobs:
  finalize:
    if: github.event_name != 'push' || contains(github.event.head_commit.message, '[finalize-requested-split]')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: DataServer/go.mod
          cache: false

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Split documentation and remaining requested files
        id: split
        shell: bash
        run: |
          set -euo pipefail
          git pull --ff-only origin main
          python3 scripts/ci/split-next-long-files.py
          export PATH="$(go env GOPATH)/bin:$PATH"
          goimports -w \
            DataServer/internal/grpcserver/handler_reports*.go \
            DataServer/internal/artifacts/retry_budget_*.go \
            DataServer/internal/ingest/service*_test.go \
            DataServer/internal/artifacts/service*_test.go

      - name: Validate requested packages
        id: validate
        working-directory: DataServer
        shell: bash
        run: |
          set -o pipefail
          {
            echo '== go test =='
            go test ./internal/grpcserver ./internal/artifacts ./internal/ingest
            echo '== go vet =='
            go vet ./internal/grpcserver ./internal/artifacts ./internal/ingest
          } 2>&1 | tee /tmp/requested-split-validation.log

      - name: Validate LOC and file layout
        id: loc
        shell: bash
        run: |
          set -o pipefail
          {
            bash scripts/ci/check-loc-thresholds.sh
            python3 - <<'PY'
          from pathlib import Path
          import re

          groups = {
              "grpcserver": list(Path("DataServer/internal/grpcserver").glob("handler_reports*.go")),
              "retry-budget": list(Path("DataServer/internal/artifacts").glob("retry_budget_*.go")),
              "ingest": list(Path("DataServer/internal/ingest").glob("service*_test.go")),
          }
          for name, paths in groups.items():
              tests = []
              for path in sorted(paths):
                  text = path.read_text(encoding="utf-8")
                  lines = len(text.splitlines())
                  print(f"{lines:4d} {path}")
                  if lines > 600:
                      raise SystemExit(f"{path} remains too large: {lines}")
                  tests.extend(re.findall(r"(?m)^func (Test\w+)\(", text))
              duplicates = sorted({test for test in tests if tests.count(test) > 1})
              if duplicates:
                  raise SystemExit(f"duplicate tests in {name}: {duplicates}")

          for path in (
              Path("docs/metrics/loc-baseline.md"),
              Path("docs/metrics/loc-baseline-policy.md"),
              Path("docs/metrics/loc-refactor-history.md"),
          ):
              lines = len(path.read_text(encoding="utf-8").splitlines())
              print(f"{lines:4d} {path}")
              if lines > 600:
                  raise SystemExit(f"{path} remains too large: {lines}")
          PY
          } 2>&1 | tee -a /tmp/requested-split-validation.log

      - name: Report validation failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo 'Automated validation failed on the requested long-file refactor.'
            echo
            echo '```text'
            tail -n 120 /tmp/requested-split-validation.log 2>/dev/null || true
            echo '```'
          } > /tmp/failure-comment.md
          gh issue comment 26 --repo "$GITHUB_REPOSITORY" --body-file /tmp/failure-comment.md || true

      - name: Remove temporary automation and transport text
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/refactor-split-large-files.yml
          rm -f .github/workflows/split-next-long-files.yml
          rm -f .github/workflows/issue-trigger-split-long-files.yml
          rm -f scripts/ci/split-next-long-files.py
          rm -f scripts/ci/split-requested-long-files.py
          rm -f scripts/ci/split-user-requested-files.py
          python3 - <<'PY'
          from pathlib import Path

          readme = Path("README.md")
          text = readme.read_text(encoding="utf-8")
          marker = "\n## Temporary snapshot transport\n"
          if marker in text:
              readme.write_text(text.split(marker, 1)[0].rstrip() + "\n", encoding="utf-8")

          ci = Path(".github/workflows/ci.yml")
          text = ci.read_text(encoding="utf-8")
          start_marker = "  # BEGIN ONE-SHOT REQUESTED LONG-FILE SPLIT\n"
          end_marker = "  # END ONE-SHOT REQUESTED LONG-FILE SPLIT\n"
          if start_marker in text and end_marker in text:
              start = text.index(start_marker)
              end = text.index(end_marker, start) + len(end_marker)
              ci.write_text(text[:start].rstrip() + "\n", encoding="utf-8")
          PY

      - name: Commit validated refactor directly to main
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git diff --cached --stat
          git commit -m "refactor(tests/docs): split requested long files"
          git pull --rebase origin main
          git push origin HEAD:main

          for issue in 21 22 23 24 26; do
            gh issue close "$issue" --repo "$GITHUB_REPOSITORY" --reason completed --comment "Requested long-file refactor completed and validated on main." || true
          done
