name: Split requested large files

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: split-requested-large-files
  cancel-in-progress: false

jobs:
  refactor:
    if: github.event.workflow_run.id == 27865879593
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: DataServer/go.mod
          cache: false

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Split requested files
        shell: bash
        run: |
          set -euo pipefail
          git pull --ff-only origin main
          python3 scripts/ci/split-user-requested-files.py

          export PATH="$(go env GOPATH)/bin:$PATH"
          goimports -w \
            DataServer/internal/ingest/service*_test.go \
            DataServer/internal/artifacts/service*_test.go \
            DataServer/internal/store/store_creator_forwardings*_test.go

          python3 - <<'PY'
          from pathlib import Path

          paths = [
              *Path("DataServer/internal/ingest").glob("service*_test.go"),
              *Path("DataServer/internal/artifacts").glob("service*_test.go"),
              *Path("DataServer/internal/store").glob("store_creator_forwardings*_test.go"),
              *Path("docs/archive").glob("architecture-pre-grpc*.md"),
          ]
          for path in sorted(set(paths)):
              lines = len(path.read_text(encoding="utf-8").splitlines())
              print(f"{lines:4d} {path}")
              if lines > 500:
                  raise SystemExit(f"{path} remains too large: {lines} lines")
          PY

      - name: Run targeted Go tests
        working-directory: DataServer
        run: go test ./internal/ingest ./internal/artifacts ./internal/store

      - name: Run LOC gate
        run: bash scripts/ci/check-loc-thresholds.sh

      - name: Commit directly to main
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/refactor-split-large-files.yml
          rm -f .github/workflows/issue-trigger-split-long-files.yml
          rm -f scripts/ci/split-requested-long-files.py
          rm -f scripts/ci/split-user-requested-files.py

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --stat
          git commit -m "refactor(tests/docs): split requested large files"
          git pull --rebase origin main
          git push origin HEAD:main
