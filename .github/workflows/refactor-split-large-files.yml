name: Split requested large files

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: split-requested-large-files
  cancel-in-progress: false

jobs:
  refactor:
    if: >-
      github.event.issue.title == '[velox] split requested large files v2' &&
      github.event.issue.user.login == github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: DataServer/go.mod
          cache: false

      - name: Split files by responsibility
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import subprocess

          def body_after_imports(text: str) -> str:
              package_at = text.index("package ")
              import_at = text.index("import (", package_at)
              import_end = text.index("\n)\n", import_at) + 3
              return text[import_end:].lstrip("\n")

          def write_go(path: str, package: str, imports: str, body: str, header: str = "") -> None:
              content = f"{header}package {package}\n\nimport (\n{imports.rstrip()}\n)\n\n{body.strip()}\n"
              Path(path).write_text(content, encoding="utf-8")

          ingest_path = Path("DataServer/internal/ingest/service_test.go")
          if ingest_path.exists():
              ingest = body_after_imports(ingest_path.read_text(encoding="utf-8"))
              identity_marker = "// TestIngestionService_ValidateIdentityTuple_WireAttemptIDMismatch:"
              result_marker = "// =====================================================================\n// Tests\n// ====================================================================="
              if identity_marker in ingest and result_marker in ingest:
                  identity_at = ingest.index(identity_marker)
                  result_at = ingest.index(result_marker)
                  write_go(
                      "DataServer/internal/ingest/service_support_test.go",
                      "ingest",
                      '''\t"context"
\t"errors"
\t"sync"
\t"time"

\t"velox-server/internal/jobs"
\t"velox-server/internal/placement"
\t"velox-server/internal/taskattempts"
\t"velox-server/internal/taskgraph"
\t"velox-server/internal/taskoutput_artifacts"''',
                      ingest[:identity_at],
                  )
                  write_go(
                      "DataServer/internal/ingest/service_identity_test.go",
                      "ingest",
                      '''\t"context"
\t"errors"
\t"testing"

\t"velox-server/internal/taskattempts"''',
                      ingest[identity_at:result_at],
                  )
                  write_go(
                      "DataServer/internal/ingest/service_result_test.go",
                      "ingest",
                      '''\t"context"
\t"errors"
\t"strings"
\t"testing"

\t"velox-server/internal/jobs"
\t"velox-server/internal/taskattempts"
\t"velox-server/internal/taskgraph"
\t"velox-server/internal/taskoutput_artifacts"''',
                      ingest[result_at:],
                  )
                  ingest_path.unlink()
              else:
                  print("ingest service tests already split; preserving current focused files")

          artifacts_path = Path("DataServer/internal/artifacts/service_test.go")
          if artifacts_path.exists():
              artifacts = body_after_imports(artifacts_path.read_text(encoding="utf-8"))
              begin_marker = "// =====================================================================\n// #region 1 — wrong worker (BeginUpload)"
              finalize_marker = "// =====================================================================\n// #region 8 — doppia finalizzazione (idempotent path)"
              if begin_marker in artifacts and finalize_marker in artifacts:
                  begin_at = artifacts.index(begin_marker)
                  finalize_at = artifacts.index(finalize_marker)
                  write_go(
                      "DataServer/internal/artifacts/service_support_test.go",
                      "artifacts",
                      '''\t"bytes"
\t"crypto/sha256"
\t"database/sql"
\t"encoding/hex"
\t"io"
\t"path/filepath"
\t"strings"
\t"sync"
\t"testing"
\t"time"

\t_ "github.com/mattn/go-sqlite3"
\t"github.com/stretchr/testify/require"

\t"velox-server/internal/store"
\t"velox-server/internal/store/migrations"''',
                      artifacts[:begin_at],
                      "// Package artifacts contains integration-test fixtures for the Service trust boundary.\n//\n",
                  )
                  write_go(
                      "DataServer/internal/artifacts/service_begin_receive_test.go",
                      "artifacts",
                      '''\t"context"
\t"errors"
\t"os"
\t"strings"
\t"testing"
\t"time"

\t"github.com/stretchr/testify/require"

\t"velox-server/internal/store"''',
                      artifacts[begin_at:finalize_at],
                  )
                  write_go(
                      "DataServer/internal/artifacts/service_finalize_test.go",
                      "artifacts",
                      '''\t"context"
\t"crypto/sha256"
\t"encoding/hex"
\t"errors"
\t"io"
\t"os"
\t"path/filepath"
\t"sync"
\t"testing"
\t"time"

\t"github.com/stretchr/testify/require"

\t"velox-server/internal/store"''',
                      artifacts[finalize_at:],
                  )
                  artifacts_path.unlink()
              else:
                  print("artifact service tests already split")

          forwarding_path = Path("DataServer/internal/store/store_creator_forwardings_test.go")
          if forwarding_path.exists():
              forwarding = body_after_imports(forwarding_path.read_text(encoding="utf-8"))
              crud_marker = "// ── Insert + Get"
              renew_marker = "// ── Renew"
              recovery_marker = "// ── Recovery"
              if all(marker in forwarding for marker in (crud_marker, renew_marker, recovery_marker)):
                  crud_at = forwarding.index(crud_marker)
                  renew_at = forwarding.index(renew_marker)
                  recovery_at = forwarding.index(recovery_marker)
                  write_go(
                      "DataServer/internal/store/store_creator_forwardings_support_test.go",
                      "store",
                      '''\t"context"
\t"path/filepath"
\t"testing"
\t"time"''',
                      forwarding[:crud_at],
                  )
                  write_go(
                      "DataServer/internal/store/store_creator_forwardings_claim_test.go",
                      "store",
                      '''\t"context"
\t"testing"
\t"time"''',
                      forwarding[crud_at:renew_at],
                  )
                  write_go(
                      "DataServer/internal/store/store_creator_forwardings_lifecycle_test.go",
                      "store",
                      '''\t"context"
\t"testing"
\t"time"''',
                      forwarding[renew_at:recovery_at],
                  )
                  write_go(
                      "DataServer/internal/store/store_creator_forwardings_recovery_test.go",
                      "store",
                      '''\t"context"
\t"testing"
\t"time"

\t"velox-server/internal/costmodel"
\t"velox-server/internal/jobs"
\t"velox-server/internal/taskgraph"''',
                      forwarding[recovery_at:],
                  )
                  forwarding_path.unlink()
              else:
                  print("creator forwarding tests already split")

          doc_path = Path("docs/archive/architecture-pre-grpc.md")
          if doc_path.exists():
              doc = doc_path.read_text(encoding="utf-8")
              markers = (
                  "## 1. Deploy del Master Server",
                  "## 4. Ciclo di Vita Completo di un Job",
                  "## 8. Progress Streaming (FFmpeg → Dashboard)",
              )
              if all(marker in doc for marker in markers):
                  section_1, section_4, section_8 = (doc.index(marker) for marker in markers)
                  archive_note = "> Snapshot storico mantenuto come riferimento; non descrive l'architettura canonica corrente."
                  Path("docs/archive/architecture-pre-grpc-deploy-workers.md").write_text(
                      f"# Velox Architecture Pre-gRPC — Deploy e Worker\n\n{archive_note}\n\n{doc[section_1:section_4].strip()}\n",
                      encoding="utf-8",
                  )
                  Path("docs/archive/architecture-pre-grpc-job-pipeline.md").write_text(
                      f"# Velox Architecture Pre-gRPC — Job e Video Pipeline\n\n{archive_note}\n\n{doc[section_4:section_8].strip()}\n",
                      encoding="utf-8",
                  )
                  Path("docs/archive/architecture-pre-grpc-runtime-artifacts.md").write_text(
                      f"# Velox Architecture Pre-gRPC — Runtime, Artifact e Delivery\n\n{archive_note}\n\n{doc[section_8:].strip()}\n",
                      encoding="utf-8",
                  )
                  doc_path.write_text(
                      f"""# Velox Architecture — Pre-gRPC Archive

{archive_note}

Il documento originale è stato separato per responsabilità:

- [Deploy, worker remoti e comunicazione con il master](architecture-pre-grpc-deploy-workers.md)
- [Ciclo di vita dei job, pipeline video nativa e contratto Go/C++](architecture-pre-grpc-job-pipeline.md)
- [Runtime, concorrenza, artifact pipeline, delivery e struttura storica](architecture-pre-grpc-runtime-artifacts.md)
""",
                      encoding="utf-8",
                  )
              else:
                  print("archived architecture document already split")

          go_files = sorted({
              *Path("DataServer/internal/ingest").glob("service*_test.go"),
              *Path("DataServer/internal/artifacts").glob("service*_test.go"),
              *Path("DataServer/internal/store").glob("store_creator_forwardings*_test.go"),
          })
          subprocess.run(["gofmt", "-w", *(str(path) for path in go_files)], check=True)

          checked = [
              *go_files,
              *Path("docs/archive").glob("architecture-pre-grpc*.md"),
          ]
          for path in sorted(set(checked)):
              lines = len(path.read_text(encoding="utf-8").splitlines())
              if lines > 500:
                  raise SystemExit(f"{path} remains too large: {lines} lines")
              print(f"{lines:4d} {path}")
          PY

      - name: Run targeted Go tests
        working-directory: DataServer
        run: go test ./internal/ingest ./internal/artifacts ./internal/store

      - name: Validate LOC thresholds
        run: bash scripts/ci/check-loc-thresholds.sh

      - name: Commit directly to main
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/refactor-split-large-files.yml
          rm -f .github/workflows/issue-trigger-split-long-files.yml
          rm -f scripts/ci/split-requested-long-files.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor(tests/docs): split requested large files"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Close trigger issue
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: gh issue close "$ISSUE_NUMBER" --comment "Refactor completato e pubblicato direttamente su main."
