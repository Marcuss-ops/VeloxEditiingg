name: Finalize requested long-file split

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: requested-long-files-finalizer
  cancel-in-progress: false

jobs:
  finalize:
    if: github.event_name != 'push' || contains(github.event.head_commit.message, '[finalize-requested-split]')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: DataServer/go.mod
          cache: false

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Split and validate requested files
        id: validate
        shell: bash
        run: |
          set -o pipefail
          {
            set -euo pipefail
            git pull --ff-only origin main
            python3 scripts/ci/split-user-requested-files.py

            export PATH="$(go env GOPATH)/bin:$PATH"
            goimports -w \
              DataServer/internal/ingest/service*_test.go \
              DataServer/internal/artifacts/service*_test.go \
              DataServer/internal/store/store_creator_forwardings*_test.go

            python3 - <<'PY'
          from pathlib import Path
          import re

          groups = {
              "ingest": list(Path("DataServer/internal/ingest").glob("service*_test.go")),
              "artifact-service": list(Path("DataServer/internal/artifacts").glob("service*_test.go")),
              "creator-forwardings": list(Path("DataServer/internal/store").glob("store_creator_forwardings*_test.go")),
          }
          for name, paths in groups.items():
              tests = []
              for path in sorted(paths):
                  text = path.read_text(encoding="utf-8")
                  lines = len(text.splitlines())
                  print(f"{lines:4d} {path}")
                  if lines > 500:
                      raise SystemExit(f"{path} remains too large: {lines}")
                  tests.extend(re.findall(r"(?m)^func (Test\w+)\(", text))
              duplicates = sorted({test for test in tests if tests.count(test) > 1})
              if duplicates:
                  raise SystemExit(f"duplicate tests in {name}: {duplicates}")

          for path in sorted(Path("docs/archive").glob("architecture-pre-grpc*.md")):
              lines = len(path.read_text(encoding="utf-8").splitlines())
              print(f"{lines:4d} {path}")
              if lines > 500:
                  raise SystemExit(f"{path} remains too large: {lines}")
          PY

            cd DataServer
            go test ./internal/ingest ./internal/artifacts ./internal/store
          } 2>&1 | tee /tmp/requested-split-validation.log

      - name: Report concise validation failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo 'Validation failed for the four requested long files.'
            echo
            echo '```text'
            grep -Ei 'fail|error|undefined|too large|duplicate|cannot|no such file|exit status' /tmp/requested-split-validation.log 2>/dev/null | tail -n 40 || true
            echo '--- final log lines ---'
            tail -n 30 /tmp/requested-split-validation.log 2>/dev/null || true
            echo '```'
          } > /tmp/failure-comment.md
          gh issue comment 26 --repo "$GITHUB_REPOSITORY" --body-file /tmp/failure-comment.md || true

      - name: Remove temporary automation
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/refactor-split-large-files.yml
          rm -f .github/workflows/split-next-long-files.yml
          rm -f .github/workflows/issue-trigger-split-long-files.yml
          rm -f scripts/ci/split-next-long-files.py
          rm -f scripts/ci/split-requested-long-files.py
          rm -f scripts/ci/split-user-requested-files.py

      - name: Commit validated refactor directly to main
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git diff --cached --stat
          git commit -m "refactor(tests/docs): split requested long files"
          git pull --rebase origin main
          git push origin HEAD:main

          for issue in 21 22 23 24 25 26 27; do
            gh issue close "$issue" --repo "$GITHUB_REPOSITORY" --reason completed --comment "Requested long-file refactor completed and validated on main." || true
          done
