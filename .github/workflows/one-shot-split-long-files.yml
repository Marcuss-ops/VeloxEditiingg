# One-shot workflow: the second push activates it after installation.
name: One-shot split long files

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/one-shot-split-long-files.yml

permissions:
  contents: write

concurrency:
  group: one-shot-split-long-files
  cancel-in-progress: false

jobs:
  split-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: DataServer/go.mod
          cache: false

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Split long files
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from __future__ import annotations

          import math
          import re
          from dataclasses import dataclass
          from pathlib import Path
          from typing import Callable

          ROOT = Path('.')

          @dataclass
          class TestDecl:
              name: str
              start: int
              end: int
              text: str

          def go_header(text: str) -> tuple[str, str]:
              pkg_match = re.search(r'(?m)^package\s+([A-Za-z_][A-Za-z0-9_]*)\s*$', text)
              if not pkg_match:
                  raise RuntimeError('package declaration not found')
              package = pkg_match.group(1)
              import_match = re.search(
                  r'(?ms)^import\s*\(.*?^\)\s*|(?m)^import\s+"[^"]+"\s*$',
                  text,
              )
              imports = import_match.group(0).strip() if import_match else ''
              return package, imports

          def matching_brace(text: str, open_pos: int) -> int:
              depth = 0
              state = 'normal'
              i = open_pos
              while i < len(text):
                  ch = text[i]
                  nxt = text[i + 1] if i + 1 < len(text) else ''
                  if state == 'normal':
                      if ch == '/' and nxt == '/': state = 'line_comment'; i += 2; continue
                      if ch == '/' and nxt == '*': state = 'block_comment'; i += 2; continue
                      if ch == '"': state = 'string'; i += 1; continue
                      if ch == '`': state = 'raw_string'; i += 1; continue
                      if ch == "'": state = 'rune'; i += 1; continue
                      if ch == '{': depth += 1
                      elif ch == '}':
                          depth -= 1
                          if depth == 0: return i + 1
                      i += 1; continue
                  if state == 'line_comment':
                      if ch == '\n': state = 'normal'
                      i += 1; continue
                  if state == 'block_comment':
                      if ch == '*' and nxt == '/': state = 'normal'; i += 2
                      else: i += 1
                      continue
                  if state == 'raw_string':
                      if ch == '`': state = 'normal'
                      i += 1; continue
                  if state in {'string', 'rune'}:
                      if ch == '\\': i += 2; continue
                      if (state == 'string' and ch == '"') or (state == 'rune' and ch == "'"): state = 'normal'
                      i += 1; continue
              raise RuntimeError('unbalanced Go function braces')

          def include_leading_comments(text: str, func_start: int, lower_bound: int) -> int:
              line_start = text.rfind('\n', lower_bound, func_start) + 1
              start = line_start
              cursor = line_start
              while cursor > lower_bound:
                  prev_end = cursor - 1
                  prev_start = text.rfind('\n', lower_bound, prev_end) + 1
                  line = text[prev_start:prev_end].strip()
                  if line == '' or line.startswith('//'):
                      start = prev_start; cursor = prev_start; continue
                  break
              return max(start, lower_bound)

          def extract_tests(text: str) -> list[TestDecl]:
              matches = list(re.finditer(r'(?m)^func\s+(Test[A-Za-z0-9_]+)\s*\(', text))
              tests: list[TestDecl] = []
              lower_bound = 0
              for match in matches:
                  open_pos = text.find('{', match.end())
                  if open_pos < 0: raise RuntimeError(f'opening brace not found for {match.group(1)}')
                  end = matching_brace(text, open_pos)
                  if end < len(text) and text[end] == '\r': end += 1
                  if end < len(text) and text[end] == '\n': end += 1
                  start = include_leading_comments(text, match.start(), lower_bound)
                  tests.append(TestDecl(match.group(1), start, end, text[start:end].strip()))
                  lower_bound = end
              return tests

          def remove_ranges(text: str, decls: list[TestDecl]) -> str:
              out = text
              for decl in reversed(decls): out = out[:decl.start] + out[decl.end:]
              return re.sub(r'\n{4,}', '\n\n\n', out).rstrip() + '\n'

          def write_test_file(path: Path, package: str, imports: str, decls: list[TestDecl]) -> None:
              if not decls: raise RuntimeError(f'empty split group for {path}')
              header = f'package {package}\n\n' + (imports + '\n\n' if imports else '')
              path.write_text(header + '\n\n'.join(d.text for d in decls).rstrip() + '\n', encoding='utf-8')

          def split_go_tests(source_path: str, destinations: list[str], grouper: Callable[[list[TestDecl]], list[list[TestDecl]]]) -> None:
              path = ROOT / source_path
              text = path.read_text(encoding='utf-8')
              package, imports = go_header(text)
              tests = extract_tests(text)
              groups = grouper(tests)
              if len(groups) != len(destinations) or any(not g for g in groups):
                  raise RuntimeError(f'{source_path}: invalid grouping {[len(g) for g in groups]}')
              path.write_text(remove_ranges(text, tests), encoding='utf-8')
              for destination, group in zip(destinations, groups, strict=True):
                  write_test_file(ROOT / destination, package, imports, group)
              print(f'{source_path}: moved {len(tests)} tests; groups={[len(g) for g in groups]}')

          def handler_groups(tests: list[TestDecl]) -> list[list[TestDecl]]:
              identity, metrics, acknowledgements = [], [], []
              for test in tests:
                  if 'Identity' in test.name or 'Spoof' in test.name: identity.append(test)
                  elif 'Ack' in test.name or 'ReportConflict' in test.name: acknowledgements.append(test)
                  else: metrics.append(test)
              return [identity, metrics, acknowledgements]

          def balanced_groups(tests: list[TestDecl], count: int) -> list[list[TestDecl]]:
              groups, remaining = [], list(tests)
              for idx in range(count):
                  take = math.ceil(len(remaining) / (count - idx))
                  groups.append(remaining[:take]); remaining = remaining[take:]
              return groups

          def ingest_groups(tests: list[TestDecl]) -> list[list[TestDecl]]:
              identity, core, rollup = [], [], []
              identity_words = ('Identity', 'Spoof', 'Imperson', 'LeaseMismatch', 'AttemptNumber')
              rollup_words = ('TransitionJob', 'Rollup', 'AwaitingArtifact', 'AllTasks', 'CommitGate', 'JobStatus')
              for test in tests:
                  if any(w in test.name for w in identity_words): identity.append(test)
                  elif any(w in test.name for w in rollup_words): rollup.append(test)
                  else: core.append(test)
              groups = [identity, core, rollup]
              return balanced_groups(tests, 3) if any(not g for g in groups) else groups

          split_go_tests('DataServer/internal/grpcserver/handler_reports_test.go', [
              'DataServer/internal/grpcserver/handler_reports_identity_test.go',
              'DataServer/internal/grpcserver/handler_reports_metrics_test.go',
              'DataServer/internal/grpcserver/handler_reports_ack_test.go'], handler_groups)
          split_go_tests('DataServer/internal/artifacts/retry_budget_propagation_test.go', [
              'DataServer/internal/artifacts/retry_budget_plan_test.go',
              'DataServer/internal/artifacts/retry_budget_limits_test.go'], lambda tests: balanced_groups(tests, 2))
          split_go_tests('DataServer/internal/ingest/service_test.go', [
              'DataServer/internal/ingest/service_identity_test.go',
              'DataServer/internal/ingest/service_result_test.go',
              'DataServer/internal/ingest/service_rollup_test.go'], ingest_groups)

          doc_path = ROOT / 'docs/metrics/loc-baseline.md'
          doc = doc_path.read_text(encoding='utf-8')
          marker = re.search(r'(?m)^##\s+15(?:\.|\s)', doc)
          if marker is None:
              headings = [h for h in re.finditer(r'(?m)^##\s+', doc) if h.start() > len(doc) // 2]
              if not headings: raise RuntimeError('loc-baseline.md: no suitable history split marker')
              marker = headings[0]
          baseline, history = doc[:marker.start()].rstrip(), doc[marker.start():].lstrip()
          (ROOT / 'docs/metrics/loc-refactor-history.md').write_text(
              '# LOC Refactor History — VeloxEditingg\n\n'
              '> Extracted from `loc-baseline.md` to keep the baseline focused and maintainable.\n'
              '> Historical section numbering is intentionally preserved for existing references.\n\n'
              + history.rstrip() + '\n', encoding='utf-8')
          doc_path.write_text(baseline + '\n\n---\n\n## 15. Refactor history\n\n'
              'The detailed round-by-round LOC reduction record now lives in '
              '[`loc-refactor-history.md`](./loc-refactor-history.md).\n', encoding='utf-8')
          PY

          export PATH="$(go env GOPATH)/bin:$PATH"
          goimports -w \
            DataServer/internal/grpcserver/handler_reports_test.go \
            DataServer/internal/grpcserver/handler_reports_identity_test.go \
            DataServer/internal/grpcserver/handler_reports_metrics_test.go \
            DataServer/internal/grpcserver/handler_reports_ack_test.go \
            DataServer/internal/artifacts/retry_budget_propagation_test.go \
            DataServer/internal/artifacts/retry_budget_plan_test.go \
            DataServer/internal/artifacts/retry_budget_limits_test.go \
            DataServer/internal/ingest/service_test.go \
            DataServer/internal/ingest/service_identity_test.go \
            DataServer/internal/ingest/service_result_test.go \
            DataServer/internal/ingest/service_rollup_test.go

          wc -l DataServer/internal/grpcserver/handler_reports*.go \
            DataServer/internal/artifacts/retry_budget_*.go \
            DataServer/internal/ingest/service*.go \
            docs/metrics/loc-baseline.md docs/metrics/loc-refactor-history.md

      - name: Validate targeted packages
        run: |
          set -euo pipefail
          cd DataServer
          go test ./internal/grpcserver/... ./internal/artifacts/... ./internal/ingest/...

      - name: Validate LOC gate
        run: bash scripts/ci/check-loc-thresholds.sh

      - name: Commit directly to main
        run: |
          set -euo pipefail
          rm .github/workflows/one-shot-split-long-files.yml
          git config user.name "Agentic CLI"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/one-shot-split-long-files.yml \
            DataServer/internal/grpcserver/handler_reports_test.go \
            DataServer/internal/grpcserver/handler_reports_identity_test.go \
            DataServer/internal/grpcserver/handler_reports_metrics_test.go \
            DataServer/internal/grpcserver/handler_reports_ack_test.go \
            DataServer/internal/artifacts/retry_budget_propagation_test.go \
            DataServer/internal/artifacts/retry_budget_plan_test.go \
            DataServer/internal/artifacts/retry_budget_limits_test.go \
            DataServer/internal/ingest/service_test.go \
            DataServer/internal/ingest/service_identity_test.go \
            DataServer/internal/ingest/service_result_test.go \
            DataServer/internal/ingest/service_rollup_test.go \
            docs/metrics/loc-baseline.md docs/metrics/loc-refactor-history.md
          git diff --cached --stat
          git commit -m "refactor(tests/docs): split remaining long files"
          git push origin HEAD:main
