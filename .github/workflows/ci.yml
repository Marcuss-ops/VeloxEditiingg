# ============================================================
# Velox CI — Go tests · Docker build · Ansible lint
# Runs on every push and pull request to main
# ============================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Go tests: DataServer ─────────────────────────────────────
  test-dataserver:
    name: Go test — DataServer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: refactored/DataServer/go.mod
          cache-dependency-path: |
            refactored/DataServer/go.sum
            shared/go.sum

      - name: Run tests
        working-directory: refactored/DataServer
        run: go test ./... -count=1 -short -race -timeout 120s

      - name: Build server binary
        working-directory: refactored/DataServer
        run: go build -o /dev/null ./cmd/server

  # ── Go tests: Worker Agent ───────────────────────────────────
  test-worker-agent:
    name: Go test — Worker Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: refactored/RemoteCodex/native/worker-agent-go/go.mod
          cache-dependency-path: |
            refactored/RemoteCodex/native/worker-agent-go/go.sum
            shared/go.sum

      - name: Run tests
        working-directory: refactored/RemoteCodex/native/worker-agent-go
        run: go test ./... -count=1 -short -race -timeout 120s

      - name: Build agent binary
        working-directory: refactored/RemoteCodex/native/worker-agent-go
        run: go build -o /dev/null ./cmd/velox-worker-agent

  # ── Docker build: Worker image ───────────────────────────────
  docker-build:
    name: Docker build — velox-worker
    runs-on: ubuntu-latest
    needs: [test-worker-agent]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: refactored/RemoteCodex/native/worker-agent-go/go.mod
          cache-dependency-path: |
            refactored/RemoteCodex/native/worker-agent-go/go.sum
            shared/go.sum

      - name: Build Go agent binary
        working-directory: refactored/RemoteCodex/native/worker-agent-go
        run: make agent

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: refactored/RemoteCodex
          file: refactored/RemoteCodex/native/worker-agent-go/Dockerfile
          push: false
          tags: velox-worker:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Ansible lint ─────────────────────────────────────────────
  ansible-lint:
    name: Ansible lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ansible-lint
        run: pipx install ansible-lint && pipx inject ansible-lint ansible

      - name: Syntax-check playbooks
        run: |
          ansible-playbook --syntax-check \
            -i refactored/DataServer/data/ansible/playbooks/inventory.example.ini \
            refactored/DataServer/data/ansible/playbooks/install_workers.yml \
            refactored/DataServer/data/ansible/playbooks/update_workers.yml \
            refactored/DataServer/data/ansible/playbooks/restart_workers.yml \
            refactored/DataServer/data/ansible/playbooks/preflight_workers.yml \
            refactored/DataServer/data/ansible/playbooks/normalize_worker_systemd.yml

      - name: Lint playbooks
        run: |
          ansible-lint \
            refactored/DataServer/data/ansible/playbooks/*.yml \
            refactored/DataServer/data/ansible/playbooks/tasks/*.yml \
            --skip-list yaml[line-length],name[template],role-name[path] \
            -x deprecated-command-syntax
