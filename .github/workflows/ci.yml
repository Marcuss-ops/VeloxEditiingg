name: CI
true:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: null
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  verify:
    name: make verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: DataServer/go.mod
      - name: Cache Go build module cache
        uses: actions/cache@v4
        with:
          path: '~/.cache/go-build

            ~/go/pkg/mod

            '
          key: ${{ runner.os }}-go-${{ hashFiles('DataServer/go.sum', 'RemoteCodex/native/worker-agent-go/go.sum', 'shared/go.sum')
            }}
          restore-keys: '${{ runner.os }}-go-

            '
      - name: Install cmake (native engine build)
        run: sudo apt-get update && sudo apt-get install -y cmake
      - name: "Guard \u2014 compute-outcome labels (spec \xA714)"
        run: ./scripts/ci/check-compute-outcome-labels.sh
      - name: "Guard \u2014 conflict-budget call pattern (Blocco 5)"
        run: ./scripts/ci/check-conflict-budget-call-pattern.sh
      - name: "Guard \u2014 sql-ownership shape"
        run: ./scripts/ci/check-sql-ownership.sh
      - name: "Guard \u2014 dsn busy-timeout shape (Blocco 5 / B1 follow-up)"
        run: ./scripts/ci/check-dsn-busy-timeout.sh
      - name: "Verify \u2014 architectural, Go, native, docker-image"
        run: make verify
      - name: "Invariants \u2014 completion protocol (Phase 1.5)"
        run: 'DB="$(mktemp /tmp/velox-cp-fixture.XXXXXX.db)"

          trap ''rm -f "$DB"'' EXIT

          (cd DataServer && go run ./cmd/seed-velox-db-fixture "$DB")

          ./scripts/ci/check-completion-protocol-invariants.sh "$DB"

          '
      - name: "LOC threshold gate"
        if: always()
        run: bash scripts/ci/check-loc-thresholds.sh
