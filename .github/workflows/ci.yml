name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: make verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: DataServer/go.mod
      - name: Cache Go build and module caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('DataServer/go.sum', 'RemoteCodex/native/worker-agent-go/go.sum', 'shared/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Install cmake
        run: sudo apt-get update && sudo apt-get install -y cmake
      - name: Guard — compute-outcome labels
        run: ./scripts/ci/check-compute-outcome-labels.sh
      - name: Guard — conflict-budget call pattern
        run: ./scripts/ci/check-conflict-budget-call-pattern.sh
      - name: Guard — sql-ownership shape
        run: ./scripts/ci/check-sql-ownership.sh
      - name: Guard — dsn busy-timeout shape
        run: ./scripts/ci/check-dsn-busy-timeout.sh
      - name: Verify — architecture, Go, native and Docker
        run: make verify
      - name: Invariants — completion protocol
        shell: bash
        run: |
          set -euo pipefail
          DB="$(mktemp /tmp/velox-cp-fixture.XXXXXX.db)"
          trap 'rm -f "$DB"' EXIT
          (cd DataServer && go run ./cmd/seed-velox-db-fixture "$DB")
          ./scripts/ci/check-completion-protocol-invariants.sh "$DB"
      - name: LOC threshold gate
        if: always()
        run: bash scripts/ci/check-loc-thresholds.sh

