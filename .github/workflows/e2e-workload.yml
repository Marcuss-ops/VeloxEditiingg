# =============================================================================
# Velox CI — dedicated E2E workload smoke test (PRs + on-demand)
# =============================================================================
# Runs `make e2e-workload` on every PR to main and on manual dispatch.
# NOT triggered on push:to:main because ci.yml already owns the
# integrity-suite path.
#
# Why dedicated:
#   * The integrity suite in ci.yml runs the architectural + Go -race
#     checks, not end-to-end. The workload builds master+worker binaries,
#     spawns them, submits a job over the worker protocol, polls until
#     SUCCEEDED, then asserts V1–V6 (artifact, ffprobe, sha256, worker
#     registry, metrics, DB state) — all of which is orthogonal to the
#     fast verify tier.
#   * ffmpeg + sqlite3 + python3 need to be on the runner; bundling them
#     in a separate workflow keeps ci.yml's apt surface minimal.
#
# Timeout: 30 min. Wall-clock budget covers cold Go cache (≈2 min) +
# bin build (≈1.5 min) + ffmpeg fixture gen (≈20s) + V1–V6 polls (up to
# 5 min for the SUCCEEDED wait). 30 min is also a soft cap on repeated
# retries if a runner is unhealthy.
#
# Required env (recorded for the operator who needs to reproduce locally):
#   E2E_EXPECTED_SHA256 must be set in the workflow for the SHA-256
#   assertion (V3) to pass. We surface this as a workflow input on
#   workflow_dispatch, and use the canonical pinned value on PR runs.
#   Override the pin only via workflow_dispatch input; CI PR jobs should
#   not silently accept the SHA baselined locally.
# =============================================================================

name: E2E workload (real)

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      e2e_expected_sha256:
        description: >-
          Pin the rendered artifact SHA-256 (V3 enforcement). Leave blank
          to use the canonical pinned baseline for the matching platform.
        required: false
        default: ''
      e2e_workdir:
        description: >-
          WORKDIR override (default /tmp/velox-e2e-workload). Useful when
          reproducing the test against a pre-built binary.
        required: false
        default: ''

concurrency:
  group: e2e-workload-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  e2e-workload:
    name: make e2e-workload (Hello→Artifact→SUCCEEDED)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: DataServer/go.mod
          cache: true
          cache-dependency-path: |
            DataServer/go.sum
            RemoteCodex/native/worker-agent-go/go.sum
            shared/go.sum

      # Install / verify the OS-level deps that tests/e2e/workload/run.sh
      # preflight checks: ffmpeg + sqlite3 + python3 + curl. Ubuntu-latest
      # runners ship most of these but `ffmpeg` is intermittently absent
      # on minimal containers — apt-get idem-potent here.
      - name: Install ffmpeg/sqlite/python runtime deps
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            sqlite3 \
            python3 \
            jq 2>/dev/null || true
          ffmpeg -version 2>&1 | head -1
          sqlite3 -version
          python3 --version
          command -v curl && curl --version | head -1
          echo "deps present"

      # Resolve E2E_EXPECTED_SHA256: PR runs always pin the canonical
      # baseline; workflow_dispatch lets the operator override for
      # platform-specific regenerations.
      - name: Pin E2E_EXPECTED_SHA256
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.e2e_expected_sha256 }}" ]; then
            echo "E2E_EXPECTED_SHA256=${{ inputs.e2e_expected_sha256 }}" >> "$GITHUB_ENV"
            echo "Using operator-supplied SHA baseline (workflow_dispatch input)"
          elif [ -n "${E2E_EXPECTED_SHA256:-}" ]; then
            echo "E2E_EXPECTED_SHA256 already set in env"
          else
            echo "::error::E2E_EXPECTED_SHA256 MUST be set on PR runs (pin in repo secret or override via workflow_dispatch input)." >&2
            exit 1
          fi

      - name: Run e2e-workload
        timeout-minutes: 25
        env:
          E2E_EXPECTED_SHA256: ${{ env.E2E_EXPECTED_SHA256 }}
        run: |
          if [ -n "${{ inputs.e2e_workdir }}" ]; then
            export E2E_WORKDIR="${{ inputs.e2e_workdir }}"
          fi
          make e2e-workload

      - name: Upload debug artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-workload-debug
          path: |
            /tmp/velox-e2e-workload/
          retention-days: 7
          if-no-files-found: warn
