# =============================================================================
# Routing Invariants — CI gate that locks the typed routing-method contracts.
#
# Why a dedicated file?
# The routing-layer surface (ForwardingKey.InjectIntoPayload,
# InternalRoutingMetadata.InjectIntoPayload, sibling typed methods on
# PipelineID and ExecutorRef) carries the canonical sym guards across the
# forwarding pipeline (creatorflow -> enqueue -> worker). A silent
# asymmetry would let an empty ForwardingKey write a zero-value entry,
# or let the InternalRoutingMetadata variant accidentally write under a
# not-yet-defined key. We lock the contract with focused unit tests in
# internal/routing/metadata_test.go AND with this CI gate that runs the
# exact go-test invocation a future regression would have to thread.
#
# Runs on every push to main, every PR, and on-demand dispatch. Status
# check name in the PR UI: "Routing Invariants". Concurrency group is
# independent of the canonical ci workflow so this gate runs in parallel
# with make verify rather than being hidden inside its log.
#
# Trigger: push to main / pull_request / workflow_dispatch.
# Permissions: contents: read (least-privilege, mirrors ci.yml).
# =============================================================================

name: Routing Invariants

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: routing-invariants-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  gate:
    name: Routing Invariants
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # fetch-depth: 1 is sufficient — this gate does not use BASE_REF
          # or any deep-history diff-aware logic. Mirrors the shallow
          # checkout policy from non-branch-diff workflows.
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Mirrors ci.yml. Use go-version-file so the Go toolchain
          # version tracks DataServer/go.mod (single-source-of-truth)
          # rather than a hardcoded "1.x" that drifts.
          go-version-file: DataServer/go.mod

      - name: Cache Go build module cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          # Mirror the canonical ci workflow's key shape so the two
          # jobs warm the SAME cache (running in parallel on the same
          # runner populates the cache once, both gates hit it).
          key: ${{ runner.os }}-go-${{ hashFiles('DataServer/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run Routing Invariant Tests
        working-directory: DataServer
        # -short : Go's testing.Short() gate; tests that explicitly
        #          skip in short mode are bypassed for fast feedback.
        # -count=1 : disable Go test result caching so the gate ALWAYS
        #           physically runs every test, never serves stale
        #           PASS from a cached result.
        # ./internal/{creatorflow,routing,forwarding}/... : the three
        #   packages whose typed routing surface is locked by
        #   metadata_test.go.
        run: go test -short -count=1 ./internal/creatorflow/... ./internal/routing/... ./internal/forwarding/...
