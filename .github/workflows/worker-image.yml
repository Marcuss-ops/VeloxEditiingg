---
# PR D — Worker Docker image release pipeline.
# ─────────────────────────────────────────────────────────────────────────────
# Triggers:
#   * push tag matching worker-v*  (e.g. refs/tags/worker-v1.2.3)
#   * workflow_dispatch with `version` + `no_push` inputs
#
# What this workflow does:
#   1. Resolves effective version from tag or input.
#   2. Runs `go test -race` on the worker agent (fail-fast on regression).
#   3. Builds the Go binary via the project's Makefile (bin/velox-worker-agent).
#   4. Builds the Debian-slim Docker image from native/worker-agent-go/Dockerfile.
#   5. Tags the image as `<owner>/velox-worker:<semver>` + `sha-<short>` — explicitly
#      NO `:latest` tag.
#   6. Generates SBOM + provenance attestations via BuildKit (baked into the
#      OCI manifest, surfaced by GHCR).
#   7. Extracts the digest, exports it to `$GITHUB_STEP_SUMMARY`, and uploads
#      it as a `worker-image-digest` workflow artifact consumable by the
#      deploy scripts.
#   8. Signs the image with `cosign` using keyless OIDC against GitHub's
#      Sigstore-compliant oidc issuer (requires `id-token: write`).
#   9. Smoke-tests the image: `docker run` + assert container is still
#      Running after 5 s. We intentionally do not await HEALTHCHECK here
#      because the worker agent's HEALTHCHECK depends on a live gRPC
#      handshake to the master, which is not mockable in a CI runner.
#
# Operators wanting a fully-pinned deploy should consume the digest artifact
# via `velox-deploy-worker.sh --image ghcr.io/<owner>/velox-worker@<digest>`.

name: Worker image release

on:
  push:
    tags:
      - 'worker-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label (e.g. 1.2.3 or v1.2.3-rc1). The leading v is optional.'
        required: true
        default: ''
      no_push:
        description: 'Build + sign skipped locally — do NOT push, do NOT sign.'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: velox-worker
  BUILD_DIR: RemoteCodex/native/worker-agent-go
  DOCKERFILE: RemoteCodex/native/worker-agent-go/Dockerfile
  # PR-3: build context is the repo root so that the agent's go.mod
  # `replace velox-shared v0.0.0 => ../../../shared` resolves to the
  # in-tree shared/ tree at /src/shared inside the go-builder stage.
  BUILD_CONTEXT: .

jobs:
  build-publish:
    name: Build, test, push, sign
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Read VERSION.txt (canonical source of truth per docs/architecture/OWNERSHIP.md,
      # enforced as exactly-one at the repo root by scripts/ci/check-architecture.sh).
      # Routed through a step because GitHub Actions cannot read a repo file directly
      # into a workflow_dispatch input default.
      - name: Read VERSION.txt (canonical source)
        id: read-version
        run: |
          set -euo pipefail
          VERSION="$(tr -d '[:space:]' < VERSION.txt)"
          if [ -z "$VERSION" ]; then
            echo "::error::VERSION.txt is empty — refusing to publish." >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version from VERSION.txt: ${VERSION}"

      - name: Resolve effective version + determine push
        id: version
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            # Strip the canonical "worker-v" prefix so TAG becomes a clean
            # semver (no leading "v"). Trigger is `worker-v*` per `on.push.tags`
            # above so GITHUB_REF_NAME here is always worker-vXXX.
            # e.g. refs/tags/worker-v1.2.3-rc1 → "1.2.3-rc1"
            TAG="${GITHUB_REF_NAME#worker-v}"
          elif [ -n "${{ inputs.version }}" ]; then
            # workflow_dispatch: operator-supplied value (may have leading 'v')
            INPUT="${{ inputs.version }}"
            TAG="${INPUT#v}"
          else
            # workflow_dispatch with empty input: fall back to canonical VERSION.txt
            TAG="${{ steps.read-version.outputs.version }}"
          fi
          if [ -z "$TAG" ]; then
            echo "::error::Could not resolve version (push ref empty, dispatch input missing, VERSION.txt empty)." >&2
            exit 1
          fi
          # RW-PROD-005 audit: refuse to publish when the resolved tag
          # disagrees with the canonical VERSION.txt. Without this guard
          # an operator can tag refs/tags/worker-v9.9.9 while the binary
          # built by Dockerfile (which reads VERSION.txt via the Makefile)
          # reports 1.2.0 — silent version drift.
          EXPECTED="${{ steps.read-version.outputs.version }}"
          if [ -n "$EXPECTED" ] && [ "$TAG" != "$EXPECTED" ]; then
            echo "::error::Resolved tag ($TAG) does not match canonical VERSION.txt ($EXPECTED). Refusing to publish." >&2
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          # Compute commit-count-based pre-release marker so PR previews don't
          # collide with release tags without ambiguity.
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          # Skip push when explicitly dry-run on a tag push is impossible
          # (tag pushes always perform full publish). For dispatch, honor `no_push`.
          if [ "${{ github.event_name }}" = "push" ]; then
            SHOULD_PUSH="true"
          else
            if [ "${{ inputs.no_push }}" = "true" ]; then
              SHOULD_PUSH="false"
            else
              SHOULD_PUSH="true"
            fi
          fi
          echo "push=${SHOULD_PUSH}" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache-dependency-path: ${{ env.BUILD_DIR }}/go.sum

      - name: Run tests with race detector (fail-fast gate)
        working-directory: ${{ env.BUILD_DIR }}
        run: go test -race -timeout 5m ./internal/... ./pkg/...

      # PR-3: the pre-Docker `make agent` step is no longer required.
      # The worker Dockerfile now compiles the Go binary inline inside
      # the go-builder stage with the same LDFLAGS the Makefile used
      # (-X main.Version=$VERSION -X main.BuildTime=$BUILD_TIME),
      # fed via the build-args below. The standalone `go test -race`
      # above remains as a separate fail-fast gate so a broken test
      # short-circuits before the much slower Docker build.

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.version.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Compute image tags (NO :latest)"
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          # RW-PROD-005 audit: prior block used `type=match,pattern=worker-v(.*)`
          # which only fires on push.tag (GITHUB_REF_NAME=worker-vX.Y.Z). On
          # workflow_dispatch the ref is a BRANCH so the pattern never matches
          # and the operator-supplied inputs.version was silently dropped.
          # Use `type=raw,value=${{ steps.version.outputs.tag }}` so both push
          # and dispatch publish the same resolved tag (already validated
          # against VERSION.txt above). Combined with the sha-tag this gives
          # `velox-worker:<semver>` + `velox-worker:sha-<short>`.
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}
            type=sha,prefix=sha-,format=short
          # Disable all default tag types (including :latest). Order matters:
          # metadata-action prefers earliest tags, so the two explicit tags
          # above take precedence over any default.
          flavor: |
            latest=false

      - name: Build + push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          push: ${{ steps.version.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # PR-3: NO build-args are passed. The Dockerfile's go-builder
          # stage delegates to the project's Makefile (`make BIN_DIR=/out
          # agent`), which is the single source of truth for the
          # LDFLAGS pattern + VERSION.txt enforcement + Reproducible
          # Builds BUILD_TIME chain. The Makefile reads VERSION.txt
          # (copied into the builder container) and falls back to a
          # deterministic short_sha-based timestamp when SOURCE_DATE_EPOCH
          # is unavailable. See RemoteCodex/native/worker-agent-go/Makefile
          # for the contract.
          # BuildKit-native provenance + SBOM carry the image digest
          # through the OCI manifest; no separate build-arg is needed.
          provenance: true
          sbom: true
          # Per-ref cache scope prevents layer-cache poisoning across
          # unrelated feature branches and keeps build-warming local
          # to the branch that produced the layers.
          cache-from: type=gha,scope=${{ github.workflow }}-${{ github.ref_name }}
          cache-to:   type=gha,mode=max,scope=${{ github.workflow }}-${{ github.ref_name }}

      - name: Extract image digest
        id: digest
        if: steps.build.outputs.digest != ''
        run: |
          set -euo pipefail
          echo "digest=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"
          echo "${{ steps.build.outputs.digest }}" > image-digest.txt
          echo "## Image digest" >> "$GITHUB_STEP_SUMMARY"
          echo ":package: \`${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Tags:" >> "$GITHUB_STEP_SUMMARY"
          for t in ${{ steps.meta.outputs.tags }}; do
            echo "- \`$t\`" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Upload digest artifact
        if: steps.build.outputs.digest != ''
        uses: actions/upload-artifact@v4
        with:
          name: worker-image-digest
          path: image-digest.txt
          if-no-files-found: error

      - name: Install cosign
        if: steps.digest.outputs.digest != '' && steps.version.outputs.push == 'true'
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Cosign keyless sign (OIDC)
        if: steps.digest.outputs.digest != '' && steps.version.outputs.push == 'true'
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          set -euo pipefail
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}@${{ steps.digest.outputs.digest }}"
          echo "Signing image: $IMAGE"
          cosign sign --yes "$IMAGE"

      - name: "Smoke test: entrypoint stays up (no immediate crash)"
        if: steps.digest.outputs.digest != '' && steps.version.outputs.push == 'true'
        run: |
          set -euo pipefail
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}@${{ steps.digest.outputs.digest }}"
          echo "Smoke testing entrypoint of: $IMAGE"
          # Run container with bogus master URL — the worker will retry
          # connection but should NOT crash.
          docker run --rm -d \
            --name worker-smoke \
            -e VELOX_WORKER_ID=ci-smoke \
            -e VELOX_GRPC_MASTER_URL=127.0.0.1:9999 \
            -p 8081:8081 \
            "$IMAGE"
          sleep 5
          STATUS="$(docker inspect --format='{{.State.Running}}' worker-smoke || true)"
          if [ "$STATUS" != "true" ]; then
            echo "::error::Worker container did not stay running after 5s"
            docker logs worker-smoke || true
            docker rm -f worker-smoke || true
            exit 1
          fi
          echo "Smoke OK — container stayed up."
          docker rm -f worker-smoke
