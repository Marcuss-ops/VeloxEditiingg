name: One-shot split next long files

on:
  push:
    branches:
      - main

concurrency:
  group: split-next-long-files
  cancel-in-progress: false

jobs:
  split:
    if: contains(github.event.head_commit.message, '[split-next-long-files]')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: DataServer/go.mod
          cache: false

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Split requested files
        run: python3 scripts/ci/split-next-long-files.py

      - name: Format artifact service tests
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          goimports -w \
            DataServer/internal/artifacts/service_test.go \
            DataServer/internal/artifacts/service_begin_upload_test.go \
            DataServer/internal/artifacts/service_receive_test.go \
            DataServer/internal/artifacts/service_finalize_test.go

      - name: Run targeted artifact tests
        working-directory: DataServer
        run: go test ./internal/artifacts/...

      - name: Run LOC gate
        run: bash scripts/ci/check-loc-thresholds.sh

      - name: Show resulting line counts
        run: |
          wc -l \
            DataServer/internal/grpcserver/handler_reports_test.go \
            DataServer/internal/artifacts/retry_budget_propagation_test.go \
            DataServer/internal/ingest/service_test.go \
            DataServer/internal/artifacts/service_test.go \
            DataServer/internal/artifacts/service_begin_upload_test.go \
            DataServer/internal/artifacts/service_receive_test.go \
            DataServer/internal/artifacts/service_finalize_test.go \
            docs/metrics/loc-baseline.md \
            docs/metrics/loc-baseline-policy.md \
            docs/metrics/loc-refactor-history.md \
            docs/archive/architecture-pre-grpc.md \
            docs/archive/architecture-pre-grpc-contract-and-runtime.md \
            docs/archive/architecture-pre-grpc-artifacts-and-assets.md

      - name: Commit directly to main and remove one-shot automation
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          rm -f .github/workflows/split-next-long-files.yml
          rm -f scripts/ci/split-next-long-files.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git diff --cached --stat
          git commit -m "refactor(tests/docs): split next long files"
          git pull --rebase origin main
          git push origin HEAD:main
