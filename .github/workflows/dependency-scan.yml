name: dependency-scan

# PR-5 5f — periodic dependency vulnerability scan. Runs scan-deps.sh against
# the Go modules, the locally-built Docker images, and the frontend_standalone
# npm deps. CRITICAL/MEDIUM vulnerabilities fail the build; LOW is logged.
#
# Triggered:
#   * on every push to main       (catches new vulns as soon as they appear)
#   * weekly cron (Monday 06:00 UTC) (catches newly-disclosed vulns in deps
#     that haven't changed in this repo)
#
# Tools installed on the runner (ubuntu-latest) before scan-deps.sh runs:
#   * Go (latest stable; pinned via go.mod toolchain if applicable)
#   * govulncheck (via `go install golang.org/x/vuln/cmd/govulncheck@latest`)
#   * syft + grype (via official Debian packages from anchore)
#   * Node.js LTS + npm (frontend_standalone only)
#
# scan-deps.sh exits non-zero on vulnerabilities, which fails the workflow.
# Operators triage in the workflow run output and the SARIF artifact.

on:
  push:
    branches:
      - main
  schedule:
    # Mondays at 06:00 UTC. Catches newly-public CVEs against deps that
    # haven't changed in our repo. Adjust cadence if volume becomes noise.
    - cron: '0 6 * * 1'
  workflow_dispatch:
    # Manual trigger for ad-hoc scans (e.g. before a release tag).

permissions:
  contents: read
  # Pull requests: write so the scan can fail PR checks if applicable
  pull-requests: read

jobs:
  scan-deps:
    name: govulncheck + syft/grype + npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          # Full history so go.sum and go.work.sum are populated correctly.
          fetch-depth: 0

      - name: install Go toolchain
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: install syft + grype
        run: |
          # anchore official install script (preferred over apt for staleness)
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: install npm (frontend_standalone)
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: 'frontend_standalone/package-lock.json'

      - name: run scan-deps.sh
        env:
          # CI mode: stricter. The script exits non-zero on vulns.
          SCAN_DEPS: 1
        run: bash scripts/ci/scan-deps.sh

      - name: upload SARIF (govulncheck future-mode)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-deps-output
          path: |
            /tmp/velox-sbom.spdx.json
            scan-deps.log
          if-no-files-found: warn
