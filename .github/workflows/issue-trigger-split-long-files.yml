name: Issue-triggered long-file split

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: issue-triggered-long-file-split
  cancel-in-progress: false

jobs:
  split-and-publish:
    if: >-
      github.event.issue.title == '[automation] split remaining long files' &&
      github.event.issue.user.login == github.repository_owner
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: DataServer/go.mod
          cache: false

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Split requested files
        shell: bash
        run: |
          set -euo pipefail
          git pull --ff-only origin main
          python3 scripts/ci/split-next-long-files.py

          export PATH="$(go env GOPATH)/bin:$PATH"
          goimports -w \
            DataServer/internal/grpcserver/handler_reports*.go \
            DataServer/internal/artifacts/retry_budget_*.go \
            DataServer/internal/ingest/service*_test.go \
            DataServer/internal/artifacts/service_test.go \
            DataServer/internal/artifacts/service_begin_upload_test.go \
            DataServer/internal/artifacts/service_receive_test.go \
            DataServer/internal/artifacts/service_finalize_test.go

      - name: Run targeted validation
        working-directory: DataServer
        run: |
          set -euo pipefail
          go test ./internal/grpcserver ./internal/artifacts ./internal/ingest
          go vet ./internal/grpcserver ./internal/artifacts ./internal/ingest

      - name: Run LOC and layout validation
        run: |
          set -euo pipefail
          bash scripts/ci/check-loc-thresholds.sh
          python3 - <<'PY'
          from pathlib import Path
          import re

          groups = {
              "grpcserver": list(Path("DataServer/internal/grpcserver").glob("handler_reports*.go")),
              "retry-budget": list(Path("DataServer/internal/artifacts").glob("retry_budget_*.go")),
              "ingest": list(Path("DataServer/internal/ingest").glob("service*_test.go")),
              "artifact-service": [
                  Path("DataServer/internal/artifacts/service_test.go"),
                  Path("DataServer/internal/artifacts/service_begin_upload_test.go"),
                  Path("DataServer/internal/artifacts/service_receive_test.go"),
                  Path("DataServer/internal/artifacts/service_finalize_test.go"),
              ],
          }
          for name, paths in groups.items():
              tests = []
              for path in sorted(paths):
                  text = path.read_text(encoding="utf-8")
                  lines = len(text.splitlines())
                  print(f"{lines:4d} {path}")
                  if lines > 600:
                      raise SystemExit(f"{path} remains too large: {lines}")
                  tests.extend(re.findall(r"(?m)^func (Test\w+)\(", text))
              duplicates = sorted({test for test in tests if tests.count(test) > 1})
              if duplicates:
                  raise SystemExit(f"duplicate tests in {name}: {duplicates}")

          docs = (
              Path("docs/metrics/loc-baseline.md"),
              Path("docs/metrics/loc-baseline-policy.md"),
              Path("docs/metrics/loc-refactor-history.md"),
              Path("docs/archive/architecture-pre-grpc.md"),
              Path("docs/archive/architecture-pre-grpc-contract-and-runtime.md"),
              Path("docs/archive/architecture-pre-grpc-artifacts-and-assets.md"),
          )
          for path in docs:
              text = path.read_text(encoding="utf-8")
              lines = len(text.splitlines())
              print(f"{lines:4d} {path}")
              if lines > 600:
                  raise SystemExit(f"{path} remains too large: {lines}")
              if text.count("```") % 2:
                  raise SystemExit(f"unbalanced Markdown fences: {path}")
          PY

      - name: Commit directly to main
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          rm -f .split-next-long-files-trigger
          rm -f .github/workflows/issue-trigger-split-long-files.yml
          rm -f .github/workflows/refactor-split-large-files.yml
          rm -f .github/workflows/split-next-long-files.yml
          rm -f scripts/ci/split-next-long-files.py
          rm -f scripts/ci/split-requested-long-files.py
          rm -f scripts/ci/split-user-requested-files.py

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git diff --cached --stat
          git commit -m "refactor(tests/docs): split requested long files"
          git pull --rebase origin main
          git push origin HEAD:main

          gh issue close "${{ github.event.issue.number }}" --repo "$GITHUB_REPOSITORY" --reason completed --comment "Requested long-file refactor completed and validated on main."
