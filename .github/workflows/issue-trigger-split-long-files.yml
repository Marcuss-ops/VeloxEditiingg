name: Issue-triggered long-file split

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: issue-triggered-long-file-split
  cancel-in-progress: false

jobs:
  split-and-publish:
    if: >-
      github.event.issue.title == '[automation] split remaining long files' &&
      github.event.issue.user.login == github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: DataServer/go.mod
          cache: false

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Split requested files
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/ci/split-requested-long-files.py

          export PATH="$(go env GOPATH)/bin:$PATH"
          goimports -w \
            DataServer/internal/grpcserver/handler_reports_test.go \
            DataServer/internal/grpcserver/handler_reports_identity_test.go \
            DataServer/internal/grpcserver/handler_reports_metrics_test.go \
            DataServer/internal/grpcserver/handler_reports_ack_test.go \
            DataServer/internal/artifacts/retry_budget_propagation_test.go \
            DataServer/internal/artifacts/retry_budget_plan_test.go \
            DataServer/internal/artifacts/retry_budget_limits_test.go \
            DataServer/internal/ingest/service_test.go \
            DataServer/internal/ingest/service_identity_test.go \
            DataServer/internal/ingest/service_result_test.go \
            DataServer/internal/ingest/service_rollup_test.go

          wc -l DataServer/internal/grpcserver/handler_reports*.go \
            DataServer/internal/artifacts/retry_budget_*.go \
            DataServer/internal/ingest/service*.go \
            docs/metrics/loc-baseline.md docs/metrics/loc-refactor-history.md

      - name: Run targeted tests
        working-directory: DataServer
        run: go test ./internal/grpcserver/... ./internal/artifacts/... ./internal/ingest/...

      - name: Run LOC gate
        run: bash scripts/ci/check-loc-thresholds.sh

      - name: Commit directly to main
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/issue-trigger-split-long-files.yml
          rm scripts/ci/split-requested-long-files.py
          git config user.name "Agentic CLI"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --stat
          git commit -m "refactor(tests/docs): split remaining long files"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Close trigger issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          curl --fail-with-body -L \
            -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/issues/${ISSUE_NUMBER}" \
            -d '{"state":"closed","state_reason":"completed"}'
