# =============================================================================
# no-youtube-regression.yml — YouTube-domain CI guard.
#
# Purpose:
#   Forbid re-introduction of any direct Velox-side YouTube integration after
#   the YouTube → Social API closure (PR-15.8, PR-15.9, PR-15.10 + Residuo 4).
#   Migration 090_drop_youtube_domain.sql + 091_opaque_destination.sql +
#   092_rename_social_to_external_destination_id.sql + the typed model +
#   validator + runner + socialclient + provider chains already CLOSED the
#   domain. This workflow exists to keep it closed.
#
# Forbidden patterns (any one fires a failure):
#   * google.golang.org/api/youtube       — direct YouTube Go API import
#   * youtubeanalytics                    — direct YouTube analytics import
#   * VELOX_YOUTUBE                       — deprecated env var prefix
#   * youtube_oauth                       — OAuth subdomain
#   * internal/integrations/youtube       — old integration directory
#   * handlers/server/youtube             — old handler directory
#   * providers.NewYouTubeProvider        — old provider constructor call
#
# Exclusions (pathspec-level, category-based + 3 explicit root-level .md
#            carve-outs, transparent):
#   * .github/workflows/no-youtube-regression.yml
#     SELF-EXCLUSION: this workflow file's header rationale + REGEX env
#     var + Hints comment enumerate the forbidden disjuncts verbatim.
#     Audit the rest of the repo; exempt this file.
#   * **/migrations/**                           — historical SQL
#     migrations carry forward-only YouTube references under the
#     003_youtube_*.sql / 011_youtube_oauth_tokens.sql /
#     012_youtube_groups_rename.sql chain that MUST NOT be edited
#     (violates the forward-only invariant of
#     DataServer/internal/store/migrations/README.md).
#   * **/testdata/**                             — migration byte-mirror
#     fixtures + snapshot data referenced by the migration runner.
#   * **/*_test.go                               — Go test files may
#     legitimately assert YouTube as a FORBIDDEN contract surface
#     (e.g. delivery_destination_opaque_test.go pins "no
#     youtube-prefixed field in Destination struct"). The audit MUST
#     NOT trip on negative-pinning tests.
#   * **/*.example                               — operator-facing
#     templates that warn against re-introduction (deploy vault,
#     env templates, ansible secrets examples).
#   * **/*.md                                    — NESTED documentation
#     record: docs/** + any future docs under subdirectories all cite
#     "internal/integrations/youtube", "providers.NewYouTubeProvider"
#     as REMOVED artefacts. The audit MUST NOT trip on documented
#     history under any subdirectory.
#   * CHANGELOG.md                               — ROOT-level historical
#     record. Git pathspec `**/*.md` matches `path/file.md` but does
#     NOT match `file.md` at repo root (requires at least one path
#     component). Add CHANGELOG.md explicitly.
#   * MILESTONE_PR_YOUTUBE_SOCIAL_SEPARATION.md  — ROOT-level milestone
#     doc that intentionally cites the audit pattern verbatim as a
#     record of "this string should never re-appear in active code".
#   * **/socialcontract/** + **/social_contract/— forward-looking
#     carve-outs for the social_repo boundary tests that may pin
#     YouTube as FORBIDDEN contract markers (zero-cost on current
#     main; reserved for the integration suite landing under
#     DataServer/internal/integration_test/).
#
# Two-file carve-out (with explanatory comment):
#   * DataServer/internal/jobs/enqueue/delivery_plan_validator.go
#   * DataServer/internal/store/delivery_plan_payload.go
#     Both files carry a NOTE block documenting the canonical rename
#     intent (PR-15.8: "YouTubeGroup → DestinationGroupID, ... "). The
#     literal `youtube_oauth_tokens` is cited as a DROPPED legacy table
#     ("Velox no longer SELECTs youtube_channels, youtube_oauth_tokens,
#     or youtube_groups"). The carve-out is intentional — the NOTE is a
#     documentation block for future contributors who would otherwise
#     try to reintroduce a YouTube-prefixed field. When (and only when)
#     a future contributor removes those NOTE blocks, they MUST also
#     delete the corresponding carve-out exclusions inline below.
#
# Triggers:
#   * push to main                                 — immediate fail-fast
#   * pull_request to main                         — pre-merge gating
#     (NO paths-ignore — every PR runs the audit so a doc-only edit
#      introducing a YouTube pattern cannot slip through silently)
#   * weekly Monday 06:00 UTC drift detector       — same model as
#     dependency-scan.yml (catches newly-disclosed YouTube patterns
#     in PRs that bypass direct CI somehow).
#   * workflow_dispatch                            — manual re-run.
#
# Status check name in PR UI: "no-youtube-regression".
# Author: Velox regression-guard initiative (Residuo 4 closure).
# =============================================================================

name: no-youtube-regression

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # weekly Monday 06:00 UTC drift detector
  workflow_dispatch:

concurrency:
  group: no-youtube-regression-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  audit:
    name: YouTube regression guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 makes the full history searchable so future
          # maintainers can `git blame` any match the audit surfaced.
          fetch-depth: 0

      - name: Run YouTube regression audit
        env:
          # Verbatim regex from the user-provided spec.
          REGEX: 'google\.golang\.org/api/youtube|youtubeanalytics|VELOX_YOUTUBE|youtube_oauth|internal/integrations/youtube|handlers/server/youtube|providers.NewYouTubeProvider'
        run: |
          set -euo pipefail
          echo "🔍 Running YouTube regression audit (active code paths)..."

          matches=$(
            git grep -nE "${REGEX}" -- \
              ':!.github/workflows/no-youtube-regression.yml' \
              ':!**/migrations/**' \
              ':!**/testdata/**' \
              ':!**/*_test.go' \
              ':!**/*.example' \
              ':!**/*.md' \
              ':!CHANGELOG.md' \
              ':!MILESTONE_PR_YOUTUBE_SOCIAL_SEPARATION.md' \
              ':!**/socialcontract/**' \
              ':!**/social_contract/**' \
              ':!DataServer/internal/jobs/enqueue/delivery_plan_validator.go' \
              ':!DataServer/internal/store/delivery_plan_payload.go' \
            || true
          )

          if [[ -n "${matches}" ]]; then
            echo
            echo "❌ YouTube regression detected:"
            echo
            echo "Removed-from-Velox patterns surfaced in active code / config."
            echo "Pick the migrator for the caught disjunct:"
            echo
            echo "${matches}"
            echo
            echo "Hints (per disjunct):"
            echo "  * google.golang.org/api/youtube | youtubeanalytics"
            echo "      direct Go imports — run:"
            echo "        cd DataServer && go mod tidy"
            echo "      and remove the dependency."
            echo "  * VELOX_YOUTUBE"
            echo "      env var prefix — migrate to canonical SOCIAL_API_* names."
            echo "      See PR-15.10 (deprecation cycle closed)."
            echo "  * youtube_oauth"
            echo "      OAuth subdomain — closures live in PR-15.8 + PR-15.9."
            echo "  * internal/integrations/youtube"
            echo "      legacy integration directory — closures live in PR-15.8."
            echo "  * handlers/server/youtube"
            echo "      legacy handler directory — closures live in PR-15.8."
            echo "  * providers.NewYouTubeProvider"
            echo "      legacy provider constructor — use social_gateway."
            exit 1
          fi

          echo
          echo "✅ No YouTube regression found — clean."
