run:
  timeout: 5m

# Minimal linter set focused on the four cross-module correctness checks
# requested for Velox: typecheck (govet), imports (goimports),
# ineffassign, and unused.
#
# Notes:
#   - `govet` always enables `typecheck` (Go's standard type-checker).
#     Additional sub-rules (e.g. shadow) are intentionally NOT enabled.
#   - `goimports` covers the "imports" rule: grouping, ordering, local
#     prefix detection. Configure local-prefixes per module via env if
#     needed; left empty here because each module's local prefix differs
#     (velox-server / velox-worker-agent / velox-shared) and the
#     default empty value is enough for the four required checks.
linters:
  disable-all: true
  enable:
    - govet      # typecheck + standard Go vet
    - goimports  # imports (grouping, formatting)
    - ineffassign
    - unused

issues:
  exclude-rules:
    # Generated code (migrations, generated mocks, …)
    - path: ".*\\.generated\\.go"
      linters:
        - all
    # Intentional blank identifiers in test helpers / cleanup paths
    - linters:
        - errcheck
      text: "Error return value of .* is not checked"
