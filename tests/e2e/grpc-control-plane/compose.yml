# =============================================================================
# PR 3 — Docker Compose Reference for the gRPC Control-Plane E2E Matrix
# =============================================================================
# IMPORTANT: This file only orchestrates WORKERS. The `velox-server` master
# MUST run on the host (or in another compose project) at localhost:50051
# because (a) the workers use `network_mode: host` to match the mTLS
# SAN=DNS:localhost cert, and (b) the test matrix in run.sh owns the
# master's lifecycle. Operators using this compose file standalone must
# start velox-server first:
#
#   go build -o /tmp/velox-e2e-grpc/bin/velox-server ./DataServer/cmd/server
#   /tmp/velox-e2e-grpc/bin/velox-server --config <env-file>
#
# This file is a REFERENCE. The primary entrypoint for the matrix is
# tests/e2e/grpc-control-plane/run.sh, which spawns HOST-NATIVE processes
# (the velox-server binary built from DataServer/, and velox-worker-agent
# built from RemoteCodex/native/worker-agent-go/). Operators who prefer
# containerised workers can use this compose file directly:
#
#   docker compose build worker-agent          # one-time per case
#   docker compose up worker-tls-valid         # attaches workers to a host master
#
# `network_mode: host` is intentional: the matrix runs against a master on
# localhost:50051 (or wherever the host VELOX_GRPC_MASTER_URL points). A
# bridge network adds a NAT hop that breaks the mTLS SAN=DNS:localhost match.
#
# All paths below use $VELOX_E2E_ROOT so the same compose file works
# regardless of where the operator cloned the repo.
# =============================================================================

name: velox-e2e-grpc

services:
  worker-agent-builder:
    image: golang:1.25-bookworm
    container_name: e2e-worker-builder
    profiles: ["build"]   # only invoked once via `docker compose build worker-agent`
    working_dir: /src
    volumes:
      - ${VELOX_E2E_ROOT:-..}/..:/src:rw
      # Without this /out bind-mount the build's output is lost on container
      # exit; worker services then fail with "binary not found".
      - ${VELOX_E2E_BIN:-/tmp/velox-e2e-grpc/bin}:/out
    command: >
      bash -c "
        cd /src/RemoteCodex/native/worker-agent-go &&
        CGO_ENABLED=0 go build -ldflags='-s -w' -o /out/velox-worker-agent ./cmd/velox-worker-agent
      "

  worker-tls-valid:
    image: debian:bookworm-slim
    container_name: e2e-worker-tls-valid
    depends_on:
      worker-agent-builder:
        condition: service_completed_successfully
    network_mode: host
    user: "0:0"
    working_dir: /opt/velox/work
    volumes:
      - ${VELOX_E2E_BIN:-/tmp/velox-e2e-grpc/bin}/velox-worker-agent:/opt/velox/bin/velox-worker-agent:ro
      - ./configs/worker-tls.json:/opt/velox/worker_config.json:ro
      - ${E2E_CERT_DIR_TLS_VALID:-/tmp/velox-e2e-grpc/pki/case-2-valid}:/opt/velox/certs:ro
    environment:
      VELOX_WORKER_ID: e2e-worker-tls-valid
      VELOX_GRPC_MASTER_URL: ${VELOX_GRPC_MASTER_URL:-localhost:50051}
      VELOX_WORK_DIR: /opt/velox/work
    command: >
      bash -c "
        apt-get update -qq && apt-get install -y -qq libstdc++6 ca-certificates >/dev/null 2>&1 ;
        exec /opt/velox/bin/velox-worker-agent --config /opt/velox/worker_config.json
      "

  worker-tls-bad-cert:
    image: debian:bookworm-slim
    container_name: e2e-worker-tls-bad-cert
    depends_on:
      worker-agent-builder:
        condition: service_completed_successfully
