    user: "0:0"
    working_dir: /opt/velox/work
    volumes:
      - ${VELOX_E2E_BIN:-/tmp/velox-e2e-grpc/bin}/velox-worker-agent:/opt/velox/bin/velox-worker-agent:ro
      - ./configs/worker-tls.json:/opt/velox/worker_config.json:ro
      - ${E2E_CERT_DIR_TLS_BAD:-/tmp/velox-e2e-grpc/pki/case-3-bad}:/opt/velox/certs:ro
    environment:
      VELOX_WORKER_ID: e2e-worker-tls-bad-cert
      VELOX_GRPC_MASTER_URL: ${VELOX_GRPC_MASTER_URL:-localhost:50051}
      VELOX_WORK_DIR: /opt/velox/work
    command: >
      bash -c "
        apt-get update -qq && apt-get install -y -qq libstdc++6 ca-certificates >/dev/null 2>&1 ;
        exec /opt/velox/bin/velox-worker-agent --config /opt/velox/worker_config.json
      "

  worker-wrong-ca:
    image: debian:bookworm-slim
    container_name: e2e-worker-wrong-ca
    depends_on:
      worker-agent-builder:
        condition: service_completed_successfully
    network_mode: host
    user: "0:0"
    working_dir: /opt/velox/work
    volumes:
      - ${VELOX_E2E_BIN:-/tmp/velox-e2e-grpc/bin}/velox-worker-agent:/opt/velox/bin/velox-worker-agent:ro
      - ./configs/worker-tls.json:/opt/velox/worker_config.json:ro
      - ${E2E_CERT_DIR_WRONG_CA:-/tmp/velox-e2e-grpc/pki/case-4-worker-ca-b}:/opt/velox/certs:ro
    environment:
      VELOX_WORKER_ID: e2e-worker-wrong-ca
      VELOX_GRPC_MASTER_URL: ${VELOX_GRPC_MASTER_URL:-localhost:50051}
      VELOX_WORK_DIR: /opt/velox/work
    command: >
      bash -c "
        apt-get update -qq && apt-get install -y -qq libstdc++6 ca-certificates >/dev/null 2>&1 ;
        exec /opt/velox/bin/velox-worker-agent --config /opt/velox/worker_config.json
      "

  worker-plaintext:
    image: debian:bookworm-slim
    container_name: e2e-worker-plaintext
    depends_on:
      worker-agent-builder:
        condition: service_completed_successfully
    network_mode: host
    user: "0:0"
    working_dir: /opt/velox/work
    volumes:
      - ${VELOX_E2E_BIN:-/tmp/velox-e2e-grpc/bin}/velox-worker-agent:/opt/velox/bin/velox-worker-agent:ro
      - ./configs/worker-plaintext.json:/opt/velox/worker_config.json:ro
    environment:
      VELOX_WORKER_ID: e2e-worker-plaintext
      VELOX_GRPC_MASTER_URL: ${VELOX_GRPC_MASTER_URL:-localhost:50051}
      VELOX_WORK_DIR: /opt/velox/work
    command: >
