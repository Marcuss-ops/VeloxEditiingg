---
# Velox — non-secret group variables.
# ────────────────────────────────────────────────────────────────────────────
# This file is committed to the repo. NEVER put secrets here.
# For secrets: define them as `vault_velox_*` in `deploy/group_vars/vault.yml`
# (encrypted with `ansible-vault`).

# ── Versions ─────────────────────────────────────────────────────────────────
velox_version: "1.2.0"

# ── Master networking ────────────────────────────────────────────────────────
velox_master_port: 8000
velox_grpc_port: 9000
# Public URL the master advertises to clients and worker agents.
# In the current public deployment this should be the master's public IP
# or a real DNS name that resolves from the worker hosts.
velox_master_public_url: "https://CHANGE_ME_MASTER_HOST" # operator MUST replace with a real hostname before production use

# ── Master filesystem layout ────────────────────────────────────────────────
velox_runtime_dir: /var/lib/velox
velox_data_dir: /var/lib/velox/data
velox_db_path: /var/lib/velox/data/velox.db
velox_videos_dir: /var/lib/velox/videos
velox_secrets_dir: /etc/velox/secrets
velox_youtube_tokens_dir: /etc/velox/secrets/youtube/tokens
velox_youtube_credentials_dir: /etc/velox/secrets/youtube/credentials

# ── Worker policy ───────────────────────────────────────────────────────────
# Each value MUST match a `worker_id` declared on the [velox_workers]
# hostgroup in deploy/inventory/production.ini (1:1 mapping). Changing this
# list without a matching inventory update will gate workers out of the fleet.
#
# Public-host topology: any N >= 1 remote workers. The fleet size is NOT
# bounded — operators may scale up or down freely. The canonical invariant
# (non-empty, no wildcard '*', unique IDs) is enforced by
# ValidateProductionWorkers (DataServer/internal/config/workers_validator.go).
# Real IDs are injected at deploy time via the ansible vault
# (deploy/group_vars/vault.yml → velox_allowed_workers override) or
# the master env file. The versioned list below carries placeholders
# ONLY; commits that ship real worker IDs/IPs/hostnames MUST be
# reverted before merge.
#
# VAULT OVERRIDE FORMAT (important):
#   The Jinja template deploy/templates/velox-server.env.j2 renders
#   `velox_allowed_workers` VERBATIM into VELOX_ALLOWED_WORKERS=.
#   Operators MUST override it as a SCALAR STRING (CSV), NOT a YAML
#   list, to keep the rendered env file a valid shell-sourceable form:
#     Correct:   velox_allowed_workers: "worker-1,worker-2"
#     Incorrect: velox_allowed_workers: [worker-1, worker-2]
#                → renders as VELOX_ALLOWED_WORKERS=['worker-1', 'worker-2']
#                  (Python repr, NOT a CSV; master fails to start.)
#   The smoke-test at deploy/scripts/validate-jinja-render.py catches
#   this regression on every render of the master env.
velox_allowed_workers: CHANGE_ME_ALLOWED_WORKERS
velox_max_job_attempts: 3
velox_worker_heartbeat_timeout: 120

# ── Worker image (consumed by future PR D/E playbooks) ──────────────────────
velox_worker_image_repository: ghcr.io/marcuss-ops/velox-worker
velox_server_image: "CHANGE_ME_SERVER_IMAGE"

# ── SSH hardening drop-in tail (consumed by bootstrap-ssh.yml) ──────────────
# Free-form snippet appended to /etc/ssh/sshd_config.d/99-velox-hardening.conf.
# Leave empty unless the operator needs an additional AllowUsers / Match block.
sshd_hardening_extra: ""

# ── Backup root (consumed by rollback.yml) ──────────────────────────────────
velox_env_backup_root: /var/backups/velox
