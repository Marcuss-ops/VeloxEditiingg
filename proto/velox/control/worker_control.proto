syntax = "proto3";

// Proto definition for Velox Worker-Control bidirectional stream.
// Both master (DataServer) and worker (worker-agent-go) use this contract
// for typed, versioned control-plane communication.
//
// Phase 2 (typed protobuf): message types are strongly typed with oneof
// instead of the legacy TransportMessage { string type; Struct payload; }.
// google.protobuf.Struct is retained only for genuinely dynamic fields
// (capabilities, extra, job_payload, params, configuration).
//
// Phase E cutover (May 2026): the MasterToWorkerEnvelope oneof no longer
// emits a forward-only JobAvailable notification. The wire-level field
// number 21 is reserved-but-unused to preserve field-number compatibility
// with previously-deployed workers/masters. New clients MUST NOT expect
// JobAvailable on this oneof; gRPC is the single delivery channel post
// cutover.

package velox.control;

option go_package = "velox-shared/controltransport/pb";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

// ---------------------------------------------------------
// Worker -> Master
// ---------------------------------------------------------
message WorkerToMasterEnvelope {
  string message_id = 1;
  string worker_id = 2;
  string session_id = 3;
  int64 sequence_number = 4;
  google.protobuf.Timestamp sent_at = 5;
  string protocol_version = 6;

  oneof msg {
    Hello hello = 10;
    Heartbeat heartbeat = 11;
    // 12 (LeaseRenewal) — superseded by TaskLeaseRenewal (23). Reserved.
    // 13 (JobAccepted)  — superseded by TaskAccepted (20). Reserved.
    // 14 (JobRejected)  — superseded by TaskRejected (21). Reserved.
    // 15 (JobProgress)  — informational only; new workers use heartbeat extra.
    TaskAccepted task_accepted = 20;
    TaskRejected task_rejected = 21;
    TaskResult task_result = 22;
    TaskLeaseRenewal task_lease_renewal = 23;
    CommandAck command_ack = 16;
    // 17 (JobResult) — job-keyed execution report; superseded by TaskResult.
    ArtifactUploaded artifact_uploaded = 18;
    Goodbye goodbye = 19;
  }

  // Reserved tags for messages removed in cleanup/remove-job-control-protocol.
  // These are the wire-format field numbers of LeaseRenewal (12),
  // JobAccepted (13), JobRejected (14), JobProgress (15), and JobResult (17);
  // reserving them prevents accidental reuse in future oneof additions and
  // makes the proto decoder reject legacy worker messages with these tags
  // rather than silently accepting them.
  reserved 12, 13, 14, 15, 17;
}

message Hello {
  string worker_name = 1;
  string hostname = 2;
  string version = 3;
  string bundle_version = 4;
  string bundle_hash = 5;
  string engine_version = 6;
  string credential_hash = 7;
  google.protobuf.Struct capabilities = 8;
}

message Heartbeat {
  string worker_name = 1;
  string worker_status = 2;
  string status = 3;
  string current_job = 4;
  string code_version = 5;
  string bundle_version = 6;
  string bundle_hash = 7;
  string protocol_version = 8;
  string engine_version = 9;
  int64 jobs_completed = 10;
  int64 jobs_failed = 11;
  int32 active_jobs_count = 12;
  google.protobuf.Struct extra = 13;
}

message CommandAck {
  string command_id = 1;
  string command = 2;
  string error = 3;
}

// TaskResult is the task-native execution report (PR #5).
// Sent by the worker after completing or failing a task.
//
// PR #5 (feat/task-result): output_artifacts carries the list of
// artifacts produced by this task execution; the master registers
// them via the artifact service. lease_id is the CAS token the
// worker received with the TaskOffer.
message TaskResult {
  string task_id = 1;
  string job_id = 2;
  string attempt_id = 3;
  string status = 4; // "succeeded" or "failed"
  string error_code = 5;
  string error_detail = 6;
  google.protobuf.Struct metrics = 7;
  repeated PhaseMarker phase_markers = 8;
  string executor_id = 9;
  string executor_key = 10;
  repeated google.protobuf.Struct output_artifacts = 11;
  string lease_id = 12;
}

// TaskLeaseRenewal is the task-native lease-extension request (PR-03 /
// fix/task-lease-renewal-protocol). Replaces LeaseRenewal which was
// keyed by job_id; the task-native path CAS-extends the task lease via
// taskgraph.Repository.RenewLease on the (task_id, attempt_id,
// worker_id, lease_id) tuple with status IN ('LEASED','RUNNING').
//
// The master is the clock authority: requested_expiry is interpreted
// as a hint, not a directive — the master clamps to its lease TTL
// policy and writes UTC RFC3339 into tasks.lease_expires_at.
message TaskLeaseRenewal {
  string task_id = 1;
  string attempt_id = 2;
  string lease_id = 3;
  google.protobuf.Timestamp requested_expiry = 4;
}

// PhaseMarker records one canonical phase timing.
message PhaseMarker {
  string name = 1;
  google.protobuf.Timestamp started_at = 2;
  google.protobuf.Timestamp completed_at = 3;
  string status = 4;
  string notes = 5;
}

message ArtifactUploaded {
  // ArtifactUploaded — master-authoritative artifact boundary.
  //
  // The master is the authoritative source of truth for each artifact's
// size and content hash; every other worker-supplied field is recomputed
// by the master from the streamed bytes.
  // The worker is only allowed to declare WHICH artifact it uploaded (via
  // the upload_id returned by Service.BeginUpload); every other field the
  // worker submits is recomputed by the master from the streamed bytes.
  //
  // DEPRECATED FIELDS (kept on the wire for compat with pre-cutover workers;
  // master ignores them entirely):
  // by the master): artifact_path (4), artifact_size (5), upload_status (6),
  // error (7). The master recomputes size / sha / mime from the streamed
  // bytes; the worker-supplied path and size are NEVER used as sources of
  // truth in the new pipeline authorized via Service.Finalize.
  //
  // NEW REQUIRED FIELDS:
  //   - upload_id (8)        — the master-side session identifier returned
  //     by Service.BeginUpload. The worker forwards
  //     this and the master uses it to recover the
  //     artifact_uploads row + the streamed bytes.
  //   - lease_id   (9)       — copied from the JOB_RUNNING state, CAS-gated
  //     in Service.FinalizeArtifactAndCompleteJob.
  //   - attempt    (10)      — attempt_number the worker finished.
  //   - expected_revision (11) — the job.revision the worker observed when
  //     it accepted the lease; CAS-gated in
  //     Service.FinalizeArtifactAndCompleteJob.
  string job_id = 1;
  string artifact_id = 2;
  string artifact_type = 3;
  string artifact_path = 4;
  int64 artifact_size = 5;
  string upload_status = 6;
  string error = 7;
  string upload_id = 8;
  string lease_id = 9;
  int32 attempt = 10;
  int32 expected_revision = 11;
}

message Goodbye {}

// ---------------------------------------------------------
// Master -> Worker
// ---------------------------------------------------------
message MasterToWorkerEnvelope {
  string message_id = 1;
  string worker_id = 2;
  string session_id = 3;
  int64 sequence_number = 4;
  google.protobuf.Timestamp sent_at = 5;
  string protocol_version = 6;

  // JobAvailable removed in Phase E (forward-only notification, dropped in gRPC cutover).
  //
  // The matching `reserved 21;` directive in the message-level reserved block
  // below exists for wire-level compatibility with previously-deployed
  // workers/masters: it prevents tag 21 from being accidentally reused in
  // future oneof additions. It does NOT participate in descriptor init — the
  // pre-existing `slice bounds out of range [:22] with capacity 21` init panic
  // (PR-3.11) was caused by `worker_control.pb.go` having drifted from this
  // schema after Phase E, not by the absence of a reserved directive. The
  // canonical fix is `bash scripts/gen-proto.sh`, which regenerates the
  // descriptor with `--go_opt=module=velox-shared` so the file lands at
  // `shared/controltransport/pb/worker_control.pb.go`.
  oneof msg {
    HelloAck hello_ack = 20;
    // 22 (JobOffer)         — superseded by TaskOffer (30). Reserved.
    TaskOffer task_offer = 30;
    // 23 (JobLeaseGranted)  — superseded by TaskLeaseGranted (31). Reserved.
    TaskLeaseGranted task_lease_granted = 31;
    Command command = 24;
    CancelJob cancel_job = 25;
    Drain drain = 26;
    ConfigurationUpdate configuration_update = 27;
    LeaseRevoked lease_revoked = 28;
    Ping ping = 29;
  }

  // Reserved tags in MasterToWorkerEnvelope — wire-level safety for the
  // forward-only JobAvailable oneof member removed in Phase E (tag 21)
  // and the legacy JobOffer (22) / JobLeaseGranted (23) messages removed
  // in cleanup/remove-job-control-protocol. See the long-form comment
  // above the oneof for the rationale and the reference to
  // `scripts/gen-proto.sh` for regenerating the descriptor.
  reserved 21, 22, 23;
}

message HelloAck {}

// TaskOffer is the task-native dispatch message (PR #4).
// Replaces JobOffer for task-based dispatching: the dispatcher claims
// a READY Task, creates a TaskAttempt, and sends this message.
message TaskOffer {
  string task_id = 1;
  string job_id = 2;
  string attempt_id = 3;
  string executor_id = 4;
  int32 executor_version = 5;
  google.protobuf.Struct task_spec = 6;
  string lease_id = 7;
  google.protobuf.Timestamp lease_deadline = 8;
  google.protobuf.Struct requirements = 9;
  google.protobuf.Struct output_contract = 10;
  int32 attempt_number = 11;
}

// TaskAccepted is sent by a worker when it accepts a TaskOffer.
message TaskAccepted {
  string task_id = 1;
  string job_id = 2;
  string attempt_id = 3;
  string lease_id = 4;
}

// TaskRejected is sent by a worker when it rejects a TaskOffer.
message TaskRejected {
  string task_id = 1;
  string reason = 2;
}

// TaskLeaseGranted is the task-scoped grant (PR #5 followup).
// Replaces JobLeaseGranted for task-native dispatch: the master
// sends this after the worker accepts a TaskOffer and the task
// transitions LEASED→RUNNING.
message TaskLeaseGranted {
  string task_id = 1;
  string lease_id = 2;
  string attempt_id = 3;
  string job_id = 4;
}

message Command {
  string command_id = 1;
  string command = 2;
  google.protobuf.Timestamp timestamp = 3;
  google.protobuf.Struct params = 4;
}

message CancelJob {
  string job_id = 1;
}

message Drain {
  string reason = 1;
}

message ConfigurationUpdate {
  google.protobuf.Struct configuration = 1;
}

message LeaseRevoked {
  string job_id = 1;
  string reason = 2;
}

message Ping {}

// ---------------------------------------------------------
// RPC Service
// ---------------------------------------------------------
service WorkerControl {
  // Stream establishes a bidirectional control channel with typed messages.
  rpc Stream (stream WorkerToMasterEnvelope) returns (stream MasterToWorkerEnvelope);
}
