name: ci

# Runs on pushes to main, all pull requests, and on-demand dispatch.
# Concurrency cancels in-progress PR runs but never cancels pushes to main
# (push runs are cheap and we want to keep historical signals intact).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least-privilege. Tests do not need write access to any repo scope.
permissions:
  contents: read

env:
  GO_VERSION: "1.25"

jobs:
  # ── Canonical verify: dispatches to make verify (scripts/ci/verify.sh) ──
  # Replaces the previous manual go-vet + go-test steps per module.
  # verify.sh runs architecture checks, gofmt/vet/test (-race) on every
  # Go module (DataServer, worker-agent-go, shared), legacy guard, cmake
  # build + ctest for the C++ video engine, and Docker image builds.
  verify:
    name: make verify (Go 1.25 + race + cmake + ctest + docker)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@0c52d547c9bc32b1aa3301fd7a9cb496313a4491 # v5.0.0
        with:
          go-version: "1.25"
          cache: true
          # Cache across all three modules — setup-go scans go.sum files
          # recursively under the cache-dependency-path.
          cache-dependency-path: |
            DataServer/go.sum
            RemoteCodex/native/worker-agent-go/go.sum
            shared/go.sum

      - name: make verify
        run: make verify

  # ── Ansible playbooks lint (fast, parallel with verify) ──────────────────
  ansible-lint:
    name: ansible-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # fetch-depth: 0 keeps BASE_REF resolvable for any future
        # scoped check. Cost is negligible on the ansible-lint runner.
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Install ansible-lint
        run: pip install --quiet ansible-lint

      - name: Lint playbooks
        working-directory: deploy/playbooks
        run: |
          ansible-lint --version
          ansible-lint -v .
