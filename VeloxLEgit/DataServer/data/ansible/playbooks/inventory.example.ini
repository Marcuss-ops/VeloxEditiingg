# Velox worker inventory (TEMPLATE — DataServer data/ansible subset).
# ────────────────────────────────────────────────────────────────────────────
# Inventory example for the DataServer-internal ansible surface (`hosts:
# velox_workers`). DO NOT commit `inventory.ini` (it is excluded by the
# root .gitignore: `**/inventory.ini`).
#
# Fleet size is NOT bounded — operators may add any N >= 1 workers. The
# canonical invariant (non-empty, non-wildcard, unique worker_id) is
# enforced server-side by ValidateProductionWorkers
# (DataServer/internal/config/workers_validator.go) and at the Ansible
# preflight (tasks/prechecks.yml → each worker declares a non-empty
# worker_id distinct from any other entry).
#
# Each worker points at its reachable public IP/DNS. The master
# terminates the worker's gRPC control stream on port 9000 (TLS); the
# worker authenticates against VELOX_ALLOWED_WORKERS via its declared
# worker_id, NOT its IP. See deploy/velox-server.env.example.
# ────────────────────────────────────────────────────────────────────────────

[velox_workers]
# worker_1
velox-worker-1 ansible_host=CHANGE_ME_PUBLIC_IP ansible_user=velox-deploy worker_id=velox-worker-1
# worker_2
velox-worker-2 ansible_host=CHANGE_ME_PUBLIC_IP ansible_user=velox-deploy worker_id=velox-worker-2

[velox_workers:vars]
# Prefer SSH keys over passwords. Set ssh_private_key_file if needed.
# ansible_ssh_private_key_file=~/.ssh/id_ed25519
# ansible_become_pass=VAULT_ENCRYPTED_PASSWORD
