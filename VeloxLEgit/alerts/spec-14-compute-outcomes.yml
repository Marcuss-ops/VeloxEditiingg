# Prometheus alerting rules — spec §14 compute outcomes.
#
# Scope: this file MUST consume metrics from the single-family shape
#   velox_compute_seconds_total{outcome=...}
# and the sibling family for failure-reason attribution:
#   velox_compute_failure_reasons_total{reason=...}
#
# The 4 retired split-out family names
#   velox_compute_seconds_total_{failed,cancelled,stale,useful}
# are FORBIDDEN — scripts/ci/check-compute-outcome-labels.sh fails CI
# on any match in dashboards/, prometheus/, alerts/.
#
# Validate with `promtool check rules alerts/spec-14-compute-outcomes.yml`
# before opening the PR.

groups:
  - name: velox.compute_outcomes
    interval: 30s
    rules:
      # Useful-compute ratio SLO. Reuse the single-family shape: ratio
      # of `outcome="useful"` seconds over the union of conclusive
      # outcomes (useful + failed + cancelled + stale). The +Inf
      # `speculative_lost` outcome is excluded — it's a scheduler
      # signal, not a quality signal.
      - alert: VeloxUsefulComputeRatioSLOBreach
        expr: |
          (
            sum(rate(velox_compute_seconds_total{outcome="useful"}[1h]))
            /
            clamp_min(
              sum(rate(velox_compute_seconds_total{outcome=~"useful|failed|cancelled|stale"}[1h])),
              0.001
            )
          ) < 0.85
        for: 15m
        labels:
          severity: warning
          slo: useful_compute_ratio
        annotations:
          summary: "Useful compute ratio below 85% (1h rolling)"
          description: |
            The fleet's useful compute ratio has been below 85% for 15
            minutes. Inspect top failure reasons via
            velox_compute_failure_reasons_total and the failure-reasons
            dashboard.

      # Stale outcomes indicate lease-expiry-reaper traffic: a worker
      # was leasing but never reported. Sharp spikes correlate with
      # a worker crash-loop, network partition, or scheduler storm.
      - alert: VeloxStaleAttemptsSpike
        expr: |
          sum(rate(velox_compute_seconds_total{outcome="stale"}[5m])) > 4
        for: 10m
        labels:
          severity: warning
          outcome: stale
        annotations:
          summary: "Stale compute outcomes > 4/sec (5m rolling)"
          description: |
            Stale attempts have exceeded 4/second for 10 minutes.
            Check worker lease-expiry rate on the master; correlate
            with worker heartbeat age via
            velox_master_worker_heartbeat_age_seconds.

      # Failure-reason tail. If a single reason accounts for more than
      # 50% of all failures over 30 minutes, fire so ops can drill in
      # via the failure-reasons dashboard.
      - alert: VeloxSingleReasonDominates
        expr: |
          (
            max by (reason) (sum by (reason) (rate(velox_compute_failure_reasons_total[30m])))
            /
            clamp_min(sum(rate(velox_compute_failure_reasons_total[30m])), 0.001)
          ) > 0.5
        for: 30m
        labels:
          severity: warning
          domain: failure_reasons
        annotations:
          summary: "Single failure reason drives >50% of fleet failures (30m)"
          description: |
            A single failure-reason label dominates the fleet's
            failure mix. Drill into the failure-reasons Grafana
            dashboard to identify the offender.

  - name: velox.compute_outcomes_strict_slo
    interval: 30s
    rules:
      # Strict-SLO breach: useful ratio under 70% sustained 1h —
      # eligible for paging if `severity=critical`.
      - alert: VeloxUsefulComputeRatioCritical
        expr: |
          (
            sum(rate(velox_compute_seconds_total{outcome="useful"}[1h]))
            /
            clamp_min(
              sum(rate(velox_compute_seconds_total{outcome=~"useful|failed|cancelled|stale"}[1h])),
              0.001
            )
          ) < 0.7
        for: 1h
        labels:
          severity: critical
          slo: useful_compute_ratio
        annotations:
          summary: "Useful compute ratio below 70% for 1h"
          description: |
            The fleet's useful compute ratio has been below 70% for 1
            hour. Page on-call; check worker health, scheduler state,
            and the outbox backlog (velox_master_outbox_pending).
