---
# PR E — Standardised worker runtime for the single co-located worker pair.
# ─────────────────────────────────────────────────────────────────────────────
# One worker per host. `container_name` is parameterised by VELOX_WORKER_ID
# so the schema accommodates future staging workers on the same host without
# collision. The image reference MUST be set by the operator via
# `${VELOX_WORKER_IMAGE}` (typically exported by prepare-host.sh from a
# CI digest artifact). The deploy-time gate in prepare-host.sh additionally
# enforces sha256-pinning so :latest and other mutable refs are rejected.
#
# read-only root + tmpfs /tmp + cap_drop ALL + no-new-privileges are
# deliberate hardening. NET_BIND_SERVICE is NOT granted — bind ports >=1024.
# Adjust per-host resource ceilings below if a specific worker host has
# tighter envelopes (then pull this file into a host-specific override).

name: velox-worker

services:
  velox-worker:
    image: ${VELOX_WORKER_IMAGE:?VELOX_WORKER_IMAGE must be set — pin to ghcr.io/<owner>/velox-worker@sha256:<digest>}

    container_name: velox-worker-${VELOX_WORKER_ID:?VELOX_WORKER_ID must be set}

    restart: unless-stopped
    # Docker-injected minimal init reaps the C++ engine child processes on
    # shutdown — without this, orphans can survive `docker compose down`.
    init: true

    env_file:
      - /etc/velox-worker/worker.env

    # The Dockerfile default CMD is `["-master", "http://master:8000"]`. We
    # override here so the binary actually reads VELOX_GRPC_MASTER_URL and
    # VELOX_WORK_DIR from env_file.
    command:
      - "-master"
      - "${VELOX_GRPC_MASTER_URL}"
      - "-work-dir"
      - "${VELOX_WORK_DIR:-/var/lib/velox-worker/work}"

    # Bind the health endpoint to the host`s loopback on VELOX_HEALTH_PORT.
    # The compose healthcheck probes the container`s localhost directly; this
    # binding additionally lets `curl http://127.0.0.1:${VELOX_HEALTH_PORT}/health/ready`
    # from the host (used by deploy/runtime/checklist-verify.sh §12 and the
    # systemd ExecStartPost) reach the endpoint without `docker exec`. Bound
    # to 127.0.0.1 so it`s NEVER exposed on the public interface.
    #
    # When multiple workers share a single host, override VELOX_HEALTH_PORT
    # on each per-worker env_file so the loopback ports do not collide.
    ports:
      - "127.0.0.1:${VELOX_HEALTH_PORT:-8081}:${VELOX_HEALTH_PORT:-8081}"

    volumes:
      # Persistent state — survives container recreation.
      - /var/lib/velox-worker:/var/lib/velox-worker
      # Worker config — bind-mounted read-only at the path the Go binary
      # expects by default (/opt/velox/worker_config.json, hard-coded in
      # main.go). The host-side file lives at
      # /var/lib/velox-worker/worker_config.json so it stays out of /etc.
      - /var/lib/velox-worker/worker_config.json:/opt/velox/worker_config.json:ro
      # TLS certs and per-worker credentials — read-only mounts into /run.
      # prepare-host.sh chowns the host-side dirs to root:10001 with mode
      # 0750 so the in-container velox user (uid 10001) can traverse +
      # read the worker.key + worker_credential at mode 0640.
      - /etc/velox-worker/certs:/run/velox/certs:ro
      - /etc/velox-worker/secrets:/run/velox/secrets:ro

    # Hardened filesystem posture.
    read_only: true
    tmpfs:
      # /tmp is the working set for C++ engine + ffmpeg scratch. 4g is a
      # reasonable upper bound for normal jobs; bump per-host if larger
      # payloads are routinely processed.
      - /tmp:size=4g,mode=1777

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL
    # NET_BIND_SERVICE is intentionally NOT added: the worker only binds
      # to high (>1024) ports. Should a future worker host require binding to 80/443,
      # add `cap_add: [NET_BIND_SERVICE]` to a per-host override.

    # Healthcheck mirrors the Dockerfile HEALTHCHECK directive so that
    # `docker compose ps` reports the result.
    #
    # RW-PROD-004 §3 A5 migration: the readiness probe now points at
    # /health/ready (NOT /health) so a freshly-booted worker returning
    # 503 for still-pending prerequisites (bootstrap, executors, cache,
    # blob, disk) does NOT cause docker to spin-restart the container.
    # /health/live would never return 503 (process+liveness only),
    # while /health (legacy) returns a misleading "ok" without surfacing
    # the readiness taxonomy.
    #
    # start_period: 30s (was 120s pre-RW-PROD-004) — within the
    # /health/ready "first sample lands before traffic" envelope
    # (composition-root disk watcher initialises immediately on
    # goroutine start).
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "curl -sf http://localhost:${VELOX_HEALTH_PORT:-8081}/health/ready || exit 1"]
      interval: 10s
      timeout: 3s
      start_period: 30s
      retries: 5

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        labels: "service,version"

    # Resource envelopes (adjust per host if needed).
    pids_limit: 256
    mem_limit: 4g
    # cpuset: "0-3"  # uncomment + tune for hosts with fixed reservations
    stop_grace_period: 60s
