---
# Galaxy collections required for Velox deploy playbooks.
# ────────────────────────────────────────────────────────────────────────────
# Run before invoking any playbook in deploy/playbooks/:
#   ansible-galaxy collection install -r deploy/requirements.yml
#
# In CI: bake this into an image layer or run as a setup step before
# `ansible-playbook`. The bootstrap-ssh.yml playbook additionally declares
# `ansible.posix` at play level so missing-collection errors surface at
# parse time, not run time.
collections:
  - name: ansible.posix
    # Pin to the 2.x line: ansible.posix 3.0+ removed `synchronize`
    # (used by DataServer/data/ansible/playbooks/install_workers.yml),
    # so a fresh `ansible-galaxy collection install` must not transparently
    # jump past 2.x. 2.x keeps `authorized_key` (singular) shipped.
    version: ">=2.0.0,<3.0.0"
