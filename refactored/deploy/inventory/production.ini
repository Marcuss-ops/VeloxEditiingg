; Velox — REAL production Ansible inventory (operator-local, NOT on main).
; ─────────────────────────────────────────────────────────────────────────────
; Generated from the live Tailscale mesh on this host.
;
; How this was built:
;   tailscale status --json  (local box 100.74.74.124, peers as listed)
;   getent hosts <peer>      (Falls back to bare-name DNS via Tailscale MagicDNS)
;
; THIS FILE IS NOT COMMITTED ON MAIN. It lives on the side branch
; `inventory-prod`. Push only after the operator verifies reachability +
; makes a deliberate decision about including the Windows peer
; (`velox-worker-2`).
;
; Hosts in this inventory:
;   * velox-master    — local box. Acts as the master for tests. Public LAN
;                        IP 51.91.11.36 is intentionally NOT used: master goes
;                        through the tailnet (100.x) so workers reach it
;                        without exposing anything to the public internet.
;   * velox-worker-1  — vps-21accdce, Linux peer. SSH-22 OPEN on 100.120.146.5.
;                        gRPC-9000 refused at the time of generation (no
;                        Velox master reachable yet — expected pre-bootstrap).
;   * velox-worker-2  — youtube_king, Windows peer. SSH-22 CLOSED; the host
;                        responds on IPv6 only per getent. To use as a worker
;                        you'll need WinRM instead of SSH. Change the host
;                        vars block at the bottom when you decide to onboard it.
;
; Where to fill missing data:
;   Anything the operator hasn't finalised yet: mark as `var=CHANGE_ME`.
;   The bootstrap-ssh playbook refuses to push keys to any host still
;   carrying an unresolved CHANGE_ME placeholder.
;
; Connection requirements:
;   * SSH key-based auth as `velox-deploy` (created by bootstrap-ssh).
;   * sudo from `velox-deploy` to root (passwordless).
;   * Python 3 on Linux targets; PowerShell 5+ on Windows targets (WinRM).

[velox_master]
velox-master ansible_host=100.74.74.124 ansible_user=velox-deploy

[velox_workers]
velox-worker-1 ansible_host=100.120.146.5 ansible_user=velox-deploy worker_id=velox-worker-1
velox-worker-2 ansible_host=100.103.136.50 ansible_user=CHANGE_ME worker_id=velox-worker-2 ansible_connection=CHANGE_ME

[velox_master:vars]
ansible_python_interpreter=/usr/bin/python3

[velox_workers:vars]
ansible_python_interpreter=/usr/bin/python3

; ── Per-host overrides (Linux worker)
; vps-21accdce is a Linux peer with SSH-22 listening. No override needed
; beyond the hostgroup vars above.

; ── Future: Windows worker (youtube_king via WinRM)
; To onboard youtube_king, uncomment and edit the block below, then
; `ansible-inventory -i deploy/inventory/production.ini --list` will
; pick it up.
;
; [velox_workers:children]
; velox_workers_windows
;
; [velox_workers_windows]
; velox-worker-2 ansible_host=100.103.136.50 ansible_user=CHANGE_ME ansible_connection=winrm ansible_winrm_transport=credssp ansible_winrm_server_cert_validation=ignore worker_id=velox-worker-2

; ── Future: extra CHANGE_ME fields
; Inline host vars the operator may want to override at host scope:
;   ansible_ssh_private_key_file=CHANGE_ME   ; path on the ansible runner box
;   ansible_become_password=CHANGE_ME        ; if not using passwordless sudo
;   vault_velox_admin_token=CHANGE_ME        ; if injecting at runtime
