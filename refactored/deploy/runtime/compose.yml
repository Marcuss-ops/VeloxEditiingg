---
# PR E — Standardised worker runtime across the 3 OVH hosts.
# ─────────────────────────────────────────────────────────────────────────────
# One worker per host. `container_name` is parameterised by VELOX_WORKER_ID
# so the schema accommodates future staging workers on the same host without
# collision. The image reference MUST be set by the operator via
# `${VELOX_WORKER_IMAGE}` (typically exported by prepare-host.sh from a
# CI digest artifact).
#
# read-only root + tmpfs /tmp + cap_drop ALL + no-new-privileges are
# deliberate hardening. NET_BIND_SERVICE is NOT granted — bind ports >=1024.
# Adjust per-host resource ceilings below if a specific OVH has tighter
# envelopes (then pull this file into a host-specific override).

name: velox-worker

services:
  velox-worker:
    image: ${VELOX_WORKER_IMAGE:?VELOX_WORKER_IMAGE must be set — pin to ghcr.io/<owner>/velox-worker@sha256:<digest>}

    container_name: velox-worker-${VELOX_WORKER_ID:?VELOX_WORKER_ID must be set}

    restart: unless-stopped
    # Docker-injected minimal init reaps the C++ engine child processes on
    # shutdown — without this, orphans can survive `docker compose down`.
    init: true

    env_file:
      - /etc/velox-worker/worker.env

    # The Dockerfile default CMD is `["-master", "http://master:8000"]`. We
    # override here so the binary actually reads VELOX_GRPC_MASTER_URL and
    # VELOX_WORK_DIR from env_file.
    command:
      - "-master"
      - "${VELOX_GRPC_MASTER_URL}"
      - "-work-dir"
      - "${VELOX_WORK_DIR:-/var/lib/velox-worker/work}"

    volumes:
      # Persistent state — survives container recreation.
      - /var/lib/velox-worker:/var/lib/velox-worker
      # TLS certs and per-worker credentials — read-only mounts into /run.
      - /etc/velox-worker/certs:/run/velox/certs:ro
      - /etc/velox-worker/secrets:/run/velox/secrets:ro

    # Hardened filesystem posture.
    read_only: true
    tmpfs:
      # /tmp is the working set for C++ engine + ffmpeg scratch. 4g is a
      # reasonable upper bound for normal jobs; bump per-host if larger
      # payloads are routinely processed.
      - /tmp:size=4g,mode=1777

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL
    # NET_BIND_SERVICE is intentionally NOT added: the worker only binds
      # to high (>1024) ports. Should a future OVH require binding to 80/443,
      # add `cap_add: [NET_BIND_SERVICE]` to a per-host override.

    # Healthcheck mirrors the Dockerfile HEALTHCHECK directive so that
    # `docker compose ps` reports the result.
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "curl -sf http://localhost:${VELOX_HEALTH_PORT:-8081}/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 120s
      retries: 3

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        labels: "service,version"

    # Resource envelopes (adjust per host if needed).
    pids_limit: 256
    mem_limit: 4g
    # cpuset: "0-3"  # uncomment + tune for hosts with fixed reservations
    stop_grace_period: 60s
