[defaults]
# Velox deploy defaults — applied automatically when ansible-playbook is
# invoked from inside deploy/. Operators may still override any of these
# via command-line flags (`ansible-playbook -f 10 …`).
#
# `vars_files: ../group_vars/all.yml` references in playbooks resolve
# relative to the playbook file, not the cwd, so it works regardless of
# how the operator navigates. This file standardizes transport defaults
# so behaviour is reproducible across operator laptops and CI.
#
# Host-key checking is INTENTIONALLY LEFT ENABLED (the Ansible default).
# Operators on managed CI hosts who want to disable it should set
# `ANSIBLE_HOST_KEY_CHECKING=False` as an environment variable when
# invoking ansible-playbook, NOT weaken this default config — first-
# contact verification protects against typos in `inventory/production.ini`
# silently MITM'ing SSH.
retry_files_enabled = False
forks = 5
stdout_callback = default

[ssh_connection]
pipelining = True
