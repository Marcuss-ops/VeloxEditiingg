---
# ============================================================
# PREFLIGHT WORKERS — Verifica stato computer remoti
# ============================================================
# Azioni:
#   - Test connesione SSH (ping)
#   - Verifica disco, Python3, ffmpeg, Docker
#   - Stato servizio worker
#
# Usato anche per: test_ssh (solo ping + check basici)
# ============================================================

- name: Preflight workers
  hosts: workers
  gather_facts: yes
  vars:
    velox_dir: "{{ velox_dir | default('/opt/velox') }}"
    min_disk_gb: 10
    required_commands:
      - python3
      - ffmpeg
      - docker
      - curl
    required_python_modules:
      - zipfile

  tasks:
    # ── SSH CONNESSIONE ─────────────────────────────────────
    - name: Preflight | Test connesione SSH (ping)
      ansible.builtin.ping:
      register: ping_result

    - name: Preflight | Log ping result
      ansible.builtin.debug:
        msg: "✅ SSH OK — {{ inventory_hostname }} ({{ ansible_host | default(inventory_hostname) }})"

    # ── DISCO ────────────────────────────────────────────────
    - name: Preflight | Verifica spazio disco
      ansible.builtin.setup:
        filter: ansible_mounts
      register: disk_info

    - name: Preflight | Log spazio disco
      ansible.builtin.debug:
        msg: >-
          {% for m in ansible_mounts %}
          {{ m.mount }}: {{ (m.size_total / 1073741824) | round(1) }}G totale,
          {{ (m.size_available / 1073741824) | round(1) }}G libero
          {% if not loop.last %}; {% endif %}
          {% endfor %}

    - name: Preflight | Fail se disco root < min_disk_gb GB
      ansible.builtin.fail:
        msg: "Spazio disco insufficiente su {{ item.mount }}: {{ (item.size_available / 1073741824) | round(1) }}G libero (min: {{ min_disk_gb }}G)"
      when: item.mount == '/' and (item.size_available / 1073741824) < min_disk_gb
      loop: "{{ ansible_mounts }}"
      ignore_errors: yes

    # ── SISTEMA OPERATIVO ────────────────────────────────────
    - name: Preflight | Verifica OS e kernel
      ansible.builtin.debug:
        msg: "OS: {{ ansible_distribution }} {{ ansible_distribution_version }} | Kernel: {{ ansible_kernel }}"

    # ── COMANDI RICHIESTI ────────────────────────────────────
    - name: Preflight | Verifica comandi richiesti
      ansible.builtin.command: "which {{ item }}"
      register: cmd_checks
      changed_when: false
      failed_when: false
      loop: "{{ required_commands }}"

    - name: Preflight | Log comandi trovati
      ansible.builtin.debug:
        msg: "✅ {{ item.item }}: {{ item.stdout }}"
      loop: "{{ cmd_checks.results }}"
      when: item.rc == 0

    - name: Preflight | Warning comandi mancanti
      ansible.builtin.debug:
        msg: "⚠️  {{ item.item }}: NON TROVATO — potrebbe servire"
      loop: "{{ cmd_checks.results }}"
      when: item.rc != 0

    # ── PYTHON MODULI ────────────────────────────────────────
    - name: Preflight | Verifica moduli Python richiesti
      ansible.builtin.command: "python3 -c 'import {{ item }}'"
      register: py_checks
      changed_when: false
      failed_when: false
      loop: "{{ required_python_modules }}"

    - name: Preflight | Log moduli Python ok
      ansible.builtin.debug:
        msg: "✅ Python {{ item.item }}: OK"
      loop: "{{ py_checks.results }}"
      when: item.rc == 0

    - name: Preflight | Warning moduli Python mancanti
      ansible.builtin.debug:
        msg: "⚠️  Python {{ item.item }}: NON DISPONIBILE"
      loop: "{{ py_checks.results }}"
      when: item.rc != 0

    # ── WORKER SERVICE ───────────────────────────────────────
    - name: Preflight | Verifica stato servizio worker
      ansible.builtin.systemd:
        name: "velox-worker-{{ inventory_hostname }}"
      register: worker_service_status
      failed_when: false

    - name: Preflight | Log stato worker
      ansible.builtin.debug:
        msg: >-
          {% if worker_service_status.status is defined %}
          Worker: {{ worker_service_status.status.ActiveState | default('unknown') }}
          ({{ worker_service_status.status.SubState | default('') }})
          {% else %}
          Servizio worker non trovato
          {% endif %}

    # ── DOCKER ────────────────────────────────────────────────
    - name: Preflight | Verifica Docker funzionante
      ansible.builtin.command: docker info --format '{{ "{{.ServerVersion}}" }}'
      register: docker_version
      changed_when: false
      failed_when: false

    - name: Preflight | Log versione Docker
      ansible.builtin.debug:
        msg: "{% if docker_version.rc == 0 %}✅ Docker: {{ docker_version.stdout }}{% else %}⚠️  Docker non funzionante{% endif %}"

    - name: Preflight | Verifica immagine Docker worker
      ansible.builtin.command: docker image ls --filter "reference=velox-worker*" --format '{% raw %}{{.Repository}}:{{.Tag}}{% endraw %}'
      register: docker_image_check
      changed_when: false
      failed_when: false

    - name: Preflight | Log immagine Docker
      ansible.builtin.debug:
        msg: "{% if docker_image_check.rc == 0 and docker_image_check.stdout | length > 0 %}✅ Worker image(s): {{ docker_image_check.stdout | replace('\n', ', ') }}{% else %}⚠️  No worker image found{% endif %}"

    # ── RIEPILOGO ────────────────────────────────────────────
    - name: Preflight | Riepilogo finale
      ansible.builtin.debug:
        msg: "✅ Preflight completato per {{ inventory_hostname }}"
