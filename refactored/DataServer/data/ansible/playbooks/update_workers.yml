---
# ============================================================
# UPDATE WORKERS — Aggiorna codice worker su computer remoti
# ============================================================
# Azioni:
#   - Scarica bundle worker piu recente dal master
#   - Ricostruisce immagine Docker
#   - Riavvia servizio worker
# ============================================================

- name: Update workers
  hosts: workers
  gather_facts: no
  vars:
    velox_dir: "/opt/velox"
    master_url: "{{ master_url | default('http://127.0.0.1:8000') }}"
    version_number: "{{ lookup('file', playbook_dir + '/../../../../../VERSION.txt') | trim }}"

  tasks:
    # ── PRE-CHECK: connesione ────────────────────────────────
    - name: Update | Test connesione SSH
      ansible.builtin.ping:

    - name: Update | Verifica master_url impostato
      ansible.builtin.assert:
        that:
          - master_url | length > 0
        fail_msg: "master_url non impostato — impossibile scaricare bundle"

    - name: Update | Verifica bundle locale aggiornato sul controller
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../../worker_downloads/worker_code.zip"
      delegate_to: localhost
      become: false
      run_once: true
      register: local_bundle_zip

    # ── BUILD BINARIO GO SULLA MACCHINA DI CONTROLLO ─────────
    # Il bundle aggiornato viene poi estratto sul worker remoto; qui
    # ricompiliamo l'agente sul controller e lo reiniettiamo nel tree
    # estratto prima del rebuild Docker, così il binario non dipende
    # da copie manuali nel container.
    - name: Update | Build Go worker agent on controller
      ansible.builtin.shell: |
        set -euo pipefail
        AGENT_DIR="{{ playbook_dir }}/../../../../RemoteCodex/native/worker-agent-go"
        BINARY="$AGENT_DIR/bin/velox-worker-agent"

        if [ -f "$BINARY" ]; then
          NEWER=$(find "$AGENT_DIR" -name '*.go' -newer "$BINARY" -print -quit 2>/dev/null)
          if [ -z "$NEWER" ]; then
            echo "SKIP: binary up-to-date"
            exit 0
          fi
        fi

        cd "$AGENT_DIR"
        make agent
        echo "BUILT"
      args:
        executable: /bin/bash
      delegate_to: localhost
      become: false
      run_once: true
      register: agent_build
      changed_when: "'BUILT' in (agent_build.stdout | default(''))"

    # ── DOWNLOAD NUOVO BUNDLE ────────────────────────────────
    - name: Update | Copia bundle locale aggiornato sul worker
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../worker_downloads/worker_code.zip"
        dest: "/tmp/velox_worker_update.zip"
        mode: "0644"
      when: local_bundle_zip.stat.exists | default(false)
      register: bundle_download

    - name: Update | Scarica bundle worker dal master
      ansible.builtin.get_url:
        url: "{{ master_url }}/api/worker/bundle?platform=linux&arch=x86_64"
        dest: "/tmp/velox_worker_update.zip"
        timeout: 120
        force: yes
      when: not (local_bundle_zip.stat.exists | default(false))
      register: bundle_download
      failed_when: false

    - name: Update | Verifica download bundle
      ansible.builtin.stat:
        path: "/tmp/velox_worker_update.zip"
      register: bundle_stat

    - name: "Update | Fallback: scarica bundle via curl"
      ansible.builtin.shell: |
        set -euo pipefail
        curl -sf --max-time 120 "{{ master_url }}/api/worker/bundle?platform=linux&arch=x86_64" \
          -o /tmp/velox_worker_update.zip
      args:
        executable: /bin/bash
      when: bundle_download is failed or not bundle_stat.stat.exists or bundle_stat.stat.size == 0
      register: bundle_fallback
      failed_when: false

    - name: Update | Verifica bundle scaricato
      ansible.builtin.stat:
        path: "/tmp/velox_worker_update.zip"
      register: bundle_final
      failed_when: not bundle_final.stat.exists or bundle_final.stat.size == 0

    # ── ESTRAI BUNDLE ──────────────────────────────────────────
    - name: "Update | Estrai bundle in {{ velox_dir }}/current"
      ansible.builtin.unarchive:
        src: /tmp/velox_worker_update.zip
        dest: "{{ velox_dir }}/current"
        remote_src: yes
        mode: "0755"
      register: bundle_extract
      failed_when: false
      when: bundle_final.stat is defined and bundle_final.stat.exists and bundle_final.stat.size > 0

    - name: Update | Flatten legacy refactored bundle root into current
      ansible.builtin.shell: |
        set -euo pipefail
        if [ -d "{{ velox_dir }}/current/refactored" ]; then
          shopt -s dotglob nullglob
          mv -f "{{ velox_dir }}/current/refactored"/* "{{ velox_dir }}/current"/ || true
          rm -rf "{{ velox_dir }}/current/refactored"
        fi
      args:
        executable: /bin/bash
      changed_when: false

    - name: Update | Remove legacy refactored tree if still present
      ansible.builtin.file:
        path: "{{ velox_dir }}/current/refactored"
        state: absent

    - name: Update | Verifica estrazione (cerca Dockerfile)
      ansible.builtin.stat:
        path: "{{ velox_dir }}/current/RemoteCodex/native/worker-agent-go/Dockerfile"
      register: dockerfile_check

    - name: Update | Set layout paths
      ansible.builtin.set_fact:
        bundle_root: "{{ velox_dir }}/current"

    - name: Update | Fail if worker bundle layout is missing
      ansible.builtin.fail:
        msg: "Impossibile individuare il layout del bundle worker in {{ velox_dir }}/current"
      when: not dockerfile_check.stat.exists

    - name: Update | Ensure worker agent binary directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ bundle_root }}/RemoteCodex/bin"
        - "{{ bundle_root }}/RemoteCodex/native/worker-agent-go/bin"

    - name: Update | Copy fresh worker agent binary into extracted bundle
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../../../RemoteCodex/native/worker-agent-go/bin/velox-worker-agent"
        dest: "{{ item }}"
        mode: "0755"
      loop:
        - "{{ bundle_root }}/RemoteCodex/bin/velox-worker-agent"
        - "{{ bundle_root }}/RemoteCodex/native/worker-agent-go/bin/velox-worker-agent"
      register: worker_agent_copy

    - name: Update | Copy fresh C++ engine helper scripts into extracted bundle
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../../../RemoteCodex/scripts/{{ item.src }}"
        dest: "{{ bundle_root }}/RemoteCodex/scripts/{{ item.dest }}"
        mode: "0755"
      loop:
        - { src: "build-video-engine.sh", dest: "build-video-engine.sh" }
        - { src: "worker-entrypoint.sh", dest: "worker-entrypoint.sh" }
      register: worker_script_copy

    - name: Update | Log estrazione
      ansible.builtin.debug:
        msg: >-
          {% if dockerfile_check.stat.exists %}
          ✅ Bundle estratto, Dockerfile trovato
          {% else %}
          ⚠️  Dockerfile non trovato in {{ velox_dir }}/current/RemoteCodex/native/worker-agent-go/
          {% endif %}

    # ── RIAPPLICA PIPELINE SYSTEMD AGGIORNATA ────────────────
    # L'include di systemd_setup.yml gestisce: env file, Docker build
    # (sempre, con --pull), generazione config, systemd unit, watchdog.
    # Non serve un build Docker separato qui.
    - name: Update | Riapplica setup systemd worker aggiornato
      ansible.builtin.include_tasks:
        file: tasks/systemd_setup.yml
      vars:
        install_showlog_wrapper: false

    - name: Update | Verifica stato servizio dopo update
      ansible.builtin.systemd:
        name: "velox-worker-{{ inventory_hostname }}"
      register: service_status

    - name: Update | Log risultato
      ansible.builtin.debug:
        msg: >-
          {% if service_status.status.ActiveState == 'active' %}
          ✅ Worker {{ inventory_hostname }} aggiornato e attivo
          {% else %}
          ⚠️  Worker {{ inventory_hostname }}: {{ service_status.status.ActiveState | default('unknown') }}
          {% endif %}

    # ── PULIZIA ──────────────────────────────────────────────
    - name: Update | Rimuovi bundle temporaneo
      ansible.builtin.file:
        path: "/tmp/velox_worker_update.zip"
        state: absent
      when: bundle_final.stat is defined and bundle_final.stat.exists
