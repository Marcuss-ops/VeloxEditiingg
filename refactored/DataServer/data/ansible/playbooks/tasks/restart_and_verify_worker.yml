# ============================================================
# SHARED — RESTART AND VERIFY (single cycle)
# ============================================================
# Restarts the worker once and runs full verification.
# Used by stability_restart_test.yml loop.
#
# Required vars:
#   _restart_attempt    — loop counter (1, 2, 3)
#   master_url          — master API base URL
#   inventory_hostname  — set automatically by Ansible
#   version_number      — current version
# ============================================================

- name: RestartVerify | Restart worker (attempt {{ _restart_attempt }})
  ansible.builtin.systemd:
    name: "velox-worker-{{ inventory_hostname }}"
    state: restarted

- name: RestartVerify | Wait for stabilisation
  ansible.builtin.pause:
    seconds: 5

- name: RestartVerify | Verify after restart
  ansible.builtin.include_tasks:
    file: verify_worker_post_deploy.yml
