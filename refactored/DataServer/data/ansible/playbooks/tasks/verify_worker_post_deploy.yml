# ============================================================
# SHARED — VERIFY WORKER POST-DEPLOY (BLOCKING)
# ============================================================
# Single source of truth for worker health verification.
# Uses ansible.builtin.assert for hard failures — no failed_when: false
# on critical checks. All gates must pass or the playbook stops.
#
# Required vars:
#   master_url          — master API base URL
#   master_verify_url   — master API base URL used for post-deploy verification
#   inventory_hostname  — set automatically by Ansible
#   version_number      — current version (for heartbeat match)
#
# Checks:
#   1. systemd unit active + running
#   2. Docker container exists
#   3. Image entrypoint is worker-entrypoint.sh
#   4. C++ engine binary present and runnable
#   5. Health endpoint responds (with retries)
#   6. Worker heartbeat on master with version match
# ============================================================

- name: Verify | Read worker systemd service
  ansible.builtin.systemd:
    name: "velox-worker-{{ inventory_hostname }}"
  register: _worker_service

- name: Verify | Assert service is active and running
  ansible.builtin.assert:
    that:
      - _worker_service.status.ActiveState == "active"
      - _worker_service.status.SubState == "running"
    fail_msg: >-
      Worker {{ inventory_hostname }} systemd not operational:
      ActiveState={{ _worker_service.status.ActiveState | default('unknown') }},
      SubState={{ _worker_service.status.SubState | default('unknown') }}

- name: Verify | Inspect Docker container
  ansible.builtin.command:
    argv:
      - docker
      - inspect
      - "velox-worker-{{ inventory_hostname }}"
  register: _worker_container
  changed_when: false

- name: Verify | Assert container exists
  ansible.builtin.assert:
    that:
      - _worker_container.rc == 0
    fail_msg: "Worker {{ inventory_hostname }} Docker container not found"

- name: Verify | Check image entrypoint
  ansible.builtin.command:
    argv:
      - docker
      - image
      - inspect
      - "{{ _worker_image_tag | default('velox-worker:latest') }}"
      - --format
      - "{{ '{{json .Config.Entrypoint}}' }}"
  register: _image_entrypoint
  changed_when: false

- name: Verify | Assert canonical entrypoint
  ansible.builtin.assert:
    that:
      - "'/usr/local/bin/worker-entrypoint.sh' in _image_entrypoint.stdout"
    fail_msg: >-
      Worker image entrypoint is not worker-entrypoint.sh:
      {{ _image_entrypoint.stdout | default('unknown') }}

- name: Verify | Check C++ engine binary
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "velox-worker-{{ inventory_hostname }}"
      - bash
      - -lc
      - >-
        test -x /usr/local/bin/velox_video_engine &&
        ! ldd /usr/local/bin/velox_video_engine | grep -q 'not found' &&
        /usr/local/bin/velox_video_engine --help >/dev/null
  register: _cpp_engine
  changed_when: false

- name: Verify | Assert C++ engine operational
  ansible.builtin.assert:
    that:
      - _cpp_engine.rc == 0
    fail_msg: >-
      C++ engine /usr/local/bin/velox_video_engine not operational on
      worker {{ inventory_hostname }} (rc={{ _cpp_engine.rc }})

- name: Verify | Health endpoint (with retries)
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ velox_worker_health_port }}/health"
    status_code: 200
    timeout: 10
  register: _worker_health
  retries: 12
  delay: 5
  until: _worker_health.status == 200

- name: Verify | Assert worker health reports registration
  ansible.builtin.assert:
    that:
      - _worker_health.json is defined
      - _worker_health.json.status | default('') == 'ok'
      - _worker_health.json.registered | default(false) | bool
      - _worker_health.json.worker_id | default(inventory_hostname) == inventory_hostname
    fail_msg: >-
      Worker {{ inventory_hostname }} health endpoint does not report a successful
      registration yet: {{ _worker_health.json | default({}) }}

- name: Verify | Heartbeat snapshot on master
  ansible.builtin.uri:
    url: "{{ master_verify_url | default(master_url) }}/api/v1/workers/status"
    method: GET
    return_content: yes
    status_code: 200
    timeout: 10
  register: _workers_status
  delegate_to: localhost
  become: no
  retries: 12
  delay: 5
  until: _workers_status.status == 200
  ignore_errors: true

- name: Verify | Worker list fallback on master
  ansible.builtin.uri:
    url: "{{ master_verify_url | default(master_url) }}/api/v1/workers"
    method: GET
    return_content: yes
    status_code: 200
    timeout: 10
  register: _workers_list
  delegate_to: localhost
  become: no
  retries: 12
  delay: 5
  until: _workers_list.status == 200
  ignore_errors: true

- name: Verify | Assert worker registered on master
  ansible.builtin.assert:
    that:
      - >-
        (_workers_status.status | default(0) == 200) or
        (_workers_list.status | default(0) == 200)
      - >-
        (
          (_workers_status.json | default({})).workers
          | default([])
          | selectattr('worker_id', 'equalto', inventory_hostname)
          | list
          | length
        ) > 0 or (
          (_workers_list.json | default({})).workers
          | default([])
          | selectattr('worker_id', 'equalto', inventory_hostname)
          | list
          | length
        ) > 0
    fail_msg: >-
      Worker {{ inventory_hostname }} not registered on master
      (master status: {{ _workers_status.status | default('error') }},
      master workers: {{ _workers_list.status | default('error') }})

- name: Verify | Log success
  ansible.builtin.debug:
    msg: >-
      ✅ Worker {{ inventory_hostname }} verified:
      systemd active, container running, entrypoint canonical,
      C++ engine OK, health OK, registration visible on master
