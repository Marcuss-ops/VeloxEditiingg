---
# ============================================================
# INSTALL WORKERS — Reinstallazione completa worker
# ============================================================
# Azioni:
#   - Preflight checks (OS, comandi, disco)
#   - Setup directory worker
#   - Docker build immagine worker
#   - Config systemd + watchdog + auto-update
#   - Avvio servizio
#
# Incluse: tasks/systemd_setup.yml (single source of truth)
# ============================================================

- name: Install workers
  hosts: workers
  gather_facts: yes
  become: true
  vars:
    velox_dir: "/opt/velox"
    master_url: "{{ master_url | default('http://127.0.0.1:8000') }}"

  tasks:
    # ── PREREQUISITI ─────────────────────────────────────────
    - name: Install | Test connesione SSH
      ansible.builtin.ping:

    - name: Install | Verifica OS supportato
      ansible.builtin.assert:
        that:
          - ansible_os_family == "Debian"
        fail_msg: "OS {{ ansible_os_family }} non supportato — richiesto Debian/Ubuntu"

    - name: Install | Verifica architettura
      ansible.builtin.assert:
        that:
          - ansible_architecture in ["x86_64", "aarch64"]
        fail_msg: "Architettura {{ ansible_architecture }} non supportata"

    - name: Install | Verifica comandi essenziali
      ansible.builtin.command: "which {{ item }}"
      register: required_cmds
      changed_when: false
      failed_when: false
      loop:
        - python3
        - curl
        - docker
        - systemctl

    - name: Install | Fail se comandi essenziali mancanti
      ansible.builtin.fail:
        msg: "Comando mancante: {{ item.item }}"
      loop: "{{ required_cmds.results }}"
      when: item.rc != 0

    # ── DIRECTORY WORKER ─────────────────────────────────────
    - name: Install | Crea directory worker
      ansible.builtin.file:
        path: "{{ velox_dir }}/{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - cache
        - bin

    - name: Install | Crea directory per override systemd
      ansible.builtin.file:
        path: "/etc/systemd/system/velox-worker-{{ inventory_hostname }}.service.d"
        state: directory
        mode: "0755"

    # ── BUILD GO AGENT ON CONTROLLER (idempotent) ─────────────
    - name: Install | Build Go worker agent on controller
      ansible.builtin.shell: |
        set -euo pipefail
        AGENT_DIR="{{ playbook_dir }}/../../../../RemoteCodex/native/worker-agent-go"
        BINARY="$AGENT_DIR/bin/velox-worker-agent"

        # Skip build if binary exists and no .go source is newer than it
        if [ -f "$BINARY" ]; then
          NEWER=$(find "$AGENT_DIR" -name '*.go' -newer "$BINARY" -print -quit 2>/dev/null)
          if [ -z "$NEWER" ]; then
            echo "SKIP: binary up-to-date"
            exit 0
          fi
        fi

        cd "$AGENT_DIR"
        make agent
        echo "BUILT"
      args:
        executable: /bin/bash
      delegate_to: localhost
      become: false
      run_once: true
      register: agent_build
      changed_when: "'BUILT' in (agent_build.stdout | default(''))"

    # ── SYNC CODE FROM CONTROLLER ─────────────────────────────
    - name: Install | Ensure code directory exists and is writable
      ansible.builtin.file:
        path: "{{ velox_dir }}/current"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Install | Synchronize worker code from controller to host
      ansible.posix.synchronize:
        src: "{{ playbook_dir }}/../../../../"
        dest: "{{ velox_dir }}/current/"
        delete: true
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=secrets"
          - "--exclude=.velox"
          - "--exclude=bin/velox-server"
          - "--exclude=*.md"
          - "--exclude=DataServer"
      delegate_to: localhost
      become: false

    # ── UNIFIED DEPLOY (shared task) ─────────────────────────
    # deploy_worker_release copies current → current.new, validates,
    # swaps atomically, builds Docker, configures systemd, and verifies.
    - name: "Install | Deploy worker release (no bundle: code is in current/)"
      ansible.builtin.include_tasks:
        file: tasks/deploy_worker_release.yml
      vars:
        bundle_zip_path: ""
        reinject_agent_src: "{{ playbook_dir }}/../../../../RemoteCodex/native/worker-agent-go/bin/velox-worker-agent"
        reinject_scripts_dir: "{{ playbook_dir }}/../../../../RemoteCodex/scripts"

    - name: Install | Riepilogo installazione
      ansible.builtin.debug:
        msg: |-
          ✅ Installazione completata per {{ inventory_hostname }}

          Servizio: velox-worker-{{ inventory_hostname }}
          Docker: {{ _worker_image_tag | default('velox-worker:latest') }}
          Directory: {{ velox_dir }}
          Master: {{ master_url }}
